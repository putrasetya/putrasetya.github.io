<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AZKO Sertifikat Generator</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- JSPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    linear-gradient(135deg,#f3f3f3,#ebebeb);

    font-family:'Poppins',sans-serif;

    padding:30px;

    min-height:100vh;

}

/* =========================
CONTAINER
========================= */

.container{

    max-width:1000px;

    margin:auto;

    background:white;

    border-radius:30px;

    padding:40px;

    box-shadow:
    0 20px 60px rgba(0,0,0,0.08);

}

/* =========================
HEADER
========================= */

h1{

    font-family:'Cinzel',serif;

    font-size:42px;

    color:#222;

    margin-bottom:10px;

}

.subtitle{

    color:#666;

    line-height:1.9;

    margin-bottom:35px;

}

/* =========================
FORM
========================= */

label{

    display:block;

    margin-bottom:12px;

    font-weight:600;

    color:#222;

    font-size:17px;

}

textarea{

    width:100%;

    height:320px;

    border:1px solid #ddd;

    border-radius:24px;

    padding:24px;

    resize:none;

    outline:none;

    font-size:16px;

    line-height:1.9;

    background:#fafafa;

    transition:0.3s;

    font-family:'Poppins',sans-serif;

}

textarea:focus{

    border-color:#c89b57;

    background:white;

    box-shadow:
    0 0 0 5px rgba(200,155,87,0.12);

}

/* =========================
BUTTON
========================= */

.button-group{

    display:flex;

    gap:18px;

    margin-top:28px;

    flex-wrap:wrap;

}

button{

    flex:1;

    min-width:220px;

    border:none;

    padding:20px;

    border-radius:22px;

    color:white;

    font-size:17px;

    font-weight:700;

    cursor:pointer;

    transition:0.35s;

}

.preview-btn{

    background:
    linear-gradient(135deg,#444,#777);

}

.generate-btn{

    background:
    linear-gradient(135deg,#b78744,#d7b476);

}

button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 15px 35px rgba(0,0,0,0.18);

}

button:disabled{

    opacity:0.85;

    cursor:not-allowed;

}

/* =========================
LOADING
========================= */

.loading{

    display:none;

    margin-top:35px;

    text-align:center;

}

.spinner{

    width:70px;

    height:70px;

    border:6px solid #eee;

    border-top:6px solid #c89b57;

    border-radius:50%;

    margin:auto;

    animation:spin 1s linear infinite;

}

.loading-text{

    margin-top:18px;

    font-size:18px;

    font-weight:600;

    color:#555;

}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:768px){

    body{
        padding:15px;
    }

    .container{
        padding:25px;
    }

    h1{
        font-size:32px;
    }

    button{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="container">

    <h1>AZKO Sertifikat Generator</h1>

    <div class="subtitle">
        Generate otomatis banyak sertifikat ukuran F4 landscape HD siap print dengan preview realtime.
    </div>

    <label>
        Input Nama Peserta
        <br>
        <small>(1 nama per baris)</small>
    </label>

    <textarea id="names">
budi santoso
siti rahma
ahmad fauzi
    </textarea>

    <!-- BUTTON -->
    <div class="button-group">

        <button class="preview-btn" onclick="previewCertificate()">
            LIHAT HASIL
        </button>

        <button class="generate-btn" onclick="generatePDF()" id="generateBtn">
            GENERATE PDF
        </button>

    </div>

    <!-- LOADING -->
    <div class="loading" id="loading">

        <div class="spinner"></div>

        <div class="loading-text">
            Menyiapkan sertifikat HD...
        </div>

    </div>

</div>

<script>

/* =========================
FORMAT NAMA
========================= */

function capitalizeName(name){

    return name
        .toLowerCase()
        .split(' ')
        .map(word => {

            if(word.length === 0) return '';

            return word.charAt(0).toUpperCase() + word.slice(1);

        })
        .join(' ');

}

/* =========================
CREATE CERTIFICATE HTML
========================= */

function createCertificateHTML(names){

    return `

        <html>

        <head>

            <title>Preview Sertifikat</title>

            <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">

            <style>

                *{
                    margin:0;
                    padding:0;
                    box-sizing:border-box;
                }

                body{

                    background:#111;

                    font-family:Arial,sans-serif;

                    padding:30px;

                }

                .title{

                    color:white;

                    text-align:center;

                    margin-bottom:35px;

                    font-size:30px;

                    font-weight:bold;

                }

                .certificate{

                    position:relative;

                    width:1400px;

                    max-width:100%;

                    margin:0 auto 50px;

                    border-radius:14px;

                    overflow:hidden;

                    box-shadow:
                    0 20px 60px rgba(0,0,0,0.4);

                }

                .certificate img{

                    width:100%;

                    display:block;

                }

                .name{

                    position:absolute;

                    top:41.5%;

                    left:50%;

                    transform:translate(-50%, -50%);

                    width:85%;

                    text-align:center;

                    font-size:58px;

                    font-family:'Cinzel', serif;

                    font-weight:600;

                    letter-spacing:1px;

                    line-height:1.3;

                    color:rgb(176,137,72);

                }

                .number{

                    position:absolute;

                    top:20px;

                    right:20px;

                    background:rgba(0,0,0,0.7);

                    color:white;

                    padding:10px 16px;

                    border-radius:12px;

                    font-size:14px;

                    font-weight:bold;

                }

            </style>

        </head>

        <body>

            <div class="title">
                Preview Sertifikat Peserta
            </div>

            ${names.map((name,index)=>`

                <div class="certificate">

                    <img src="sertifikat.png">

                    <div class="number">
                        Sertifikat ${index + 1}
                    </div>

                    <div class="name">
                        ${name}
                    </div>

                </div>

            `).join('')}

        </body>

        </html>

    `;

}

/* =========================
PREVIEW
========================= */

function previewCertificate(){

    const names = document
        .getElementById('names')
        .value
        .split('\n')
        .map(name => capitalizeName(name.trim()))
        .filter(name => name !== '');

    if(names.length === 0){

        alert("Masukkan minimal 1 nama peserta");

        return;

    }

    const previewWindow = window.open('', '_blank');

    previewWindow.document.write(
        createCertificateHTML(names)
    );

}

/* =========================
GENERATE PDF
========================= */

async function generatePDF(){

    const loading = document.getElementById('loading');

    const button = document.getElementById('generateBtn');

    loading.style.display = 'block';

    button.disabled = true;

    button.innerHTML = 'MEMPROSES...';

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({

        orientation:'landscape',

        unit:'mm',

        format:[210,330],

        compress:true

    });

    const templateImage = "sertifikat.png";

    const names = document
        .getElementById('names')
        .value
        .split('\n')
        .map(name => capitalizeName(name.trim()))
        .filter(name => name !== '');

    if(names.length === 0){

        alert("Masukkan minimal 1 nama peserta");

        loading.style.display = 'none';

        button.disabled = false;

        button.innerHTML = 'GENERATE PDF';

        return;

    }

    /* PREVIEW HASIL SAMA PERSIS */
    const previewWindow = window.open('', '_blank');

    previewWindow.document.write(
        createCertificateHTML(names)
    );

    const img = new Image();

    img.src = templateImage;

    img.onload = async () => {

        for(let i = 0; i < names.length; i++){

            if(i > 0){

                pdf.addPage([210,330],'landscape');

            }

            /* TEMPLATE */

            pdf.addImage(
                img,
                'PNG',
                0,
                0,
                330,
                210
            );

            /* FONT */

            pdf.setFont('times','italic');

            pdf.setTextColor(176,137,72);

            let fontSize = 36;

            if(names[i].length > 18){
                fontSize = 32;
            }

            if(names[i].length > 28){
                fontSize = 27;
            }

            if(names[i].length > 38){
                fontSize = 23;
            }

            pdf.setFontSize(fontSize);

            /* CENTER */

            const pageWidth = pdf.internal.pageSize.getWidth();

            pdf.text(
                names[i],
                pageWidth / 2,
                84,
                {
                    align:'center'
                }
            );

        }

        setTimeout(() => {

            pdf.save("AZKO-Sertifikat-F4.pdf");

            loading.style.display = 'none';

            button.disabled = false;

            button.innerHTML = 'GENERATE PDF';

        },1200);

    }

    img.onerror = () => {

        loading.style.display = 'none';

        button.disabled = false;

        button.innerHTML = 'GENERATE PDF';

        alert(
            "Template sertifikat.png tidak ditemukan."
        );

    }

}

</script>

</body>
</html>
