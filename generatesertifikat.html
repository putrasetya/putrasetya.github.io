<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Generator Sertifikat Coffee Maker</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f3f3;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:20px;
    color:#222;
}

label{
    font-weight:bold;
    margin-bottom:10px;
    display:block;
}

textarea{
    width:100%;
    height:250px;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    resize:none;
    font-size:16px;
    margin-bottom:20px;
}

button{
    background:#b98b45;
    color:#fff;
    border:none;
    padding:15px 25px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

.info{
    margin-top:15px;
    color:#666;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

    <h1>Generator Sertifikat PDF F4</h1>

    <label>
        Input Nama Peserta (1 nama per baris)
    </label>

    <textarea id="names">
Budi Santoso
Siti Aisyah
Ahmad Fauzi
    </textarea>

    <button onclick="generatePDF()">
        Generate PDF Sertifikat
    </button>

    <div class="info">
        • Ukuran otomatis F4<br>
        • Nama otomatis muncul di bagian "Diberikan Kepada"<br>
        • Semua sertifikat langsung tergabung dalam 1 file PDF
    </div>

</div>

<script>

async function generatePDF(){

    const { jsPDF } = window.jspdf;

    // Ukuran F4 Landscape
    const pdf = new jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: [210, 330]
    });

    // GANTI DENGAN FILE SERTIFIKAT ANDA
    const templateImage = "sertifikat.png";

    const names = document
        .getElementById('names')
        .value
        .split('\n')
        .map(n => n.trim())
        .filter(n => n !== '');

    const img = new Image();

    img.src = templateImage;

    img.onload = async () => {

        for(let i = 0; i < names.length; i++){

            if(i > 0){
                pdf.addPage([210,330], 'landscape');
            }

            // Background sertifikat full F4
            pdf.addImage(
                img,
                'PNG',
                0,
                0,
                330,
                210
            );

            // Nama peserta
            pdf.setFont("times","italic");
            pdf.setTextColor(180,140,70);

            // Ukuran font otomatis
            let fontSize = 28;

            if(names[i].length > 25){
                fontSize = 22;
            }

            if(names[i].length > 35){
                fontSize = 18;
            }

            pdf.setFontSize(fontSize);

            // Posisi nama
            pdf.text(
                names[i],
                82,
                72,
                {
                    align:'center'
                }
            );

        }

        pdf.save("Sertifikat-CoffeeMaker-F4.pdf");

    }

}

</script>

</body>
</html>
