<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AZKO Sertifikat Generator</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- JSPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    linear-gradient(135deg,#f3f3f3,#ebebeb);

    font-family:'Poppins',sans-serif;

    padding:30px;

    min-height:100vh;

}

/* =========================
CONTAINER
========================= */

.container{

    max-width:1000px;

    margin:auto;

    background:white;

    border-radius:30px;

    padding:40px;

    box-shadow:
    0 20px 60px rgba(0,0,0,0.08);

}

/* =========================
HEADER
========================= */

h1{

    font-family:'Cinzel',serif;

    font-size:42px;

    color:#222;

    margin-bottom:10px;

}

.subtitle{

    color:#666;

    line-height:1.9;

    margin-bottom:35px;

}

/* =========================
FORM
========================= */

label{

    display:block;

    margin-bottom:12px;

    font-weight:600;

    color:#222;

    font-size:17px;

}

textarea{

    width:100%;

    height:320px;

    border:1px solid #ddd;

    border-radius:24px;

    padding:24px;

    resize:none;

    outline:none;

    font-size:16px;

    line-height:1.9;

    background:#fafafa;

    transition:0.3s;

    font-family:'Poppins',sans-serif;

}

textarea:focus{

    border-color:#c89b57;

    background:white;

    box-shadow:
    0 0 0 5px rgba(200,155,87,0.12);

}

/* =========================
BUTTON
========================= */

.button-group{

    margin-top:30px;

}

button{

    width:100%;

    border:none;

    padding:22px;

    border-radius:22px;

    color:white;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    transition:0.35s;

}

.generate-btn{

    background:
    linear-gradient(135deg,#b78744,#d7b476);

}

button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 15px 35px rgba(0,0,0,0.18);

}

button:disabled{

    opacity:0.85;

    cursor:not-allowed;

}

/* =========================
LOADING
========================= */

.loading{

    display:none;

    margin-top:35px;

    text-align:center;

}

.spinner{

    width:70px;

    height:70px;

    border:6px solid #eee;

    border-top:6px solid #c89b57;

    border-radius:50%;

    margin:auto;

    animation:spin 1s linear infinite;

}

.loading-text{

    margin-top:18px;

    font-size:18px;

    font-weight:600;

    color:#555;

}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:768px){

    body{
        padding:15px;
    }

    .container{
        padding:25px;
    }

    h1{
        font-size:32px;
    }

}

</style>

</head>

<body>

<div class="container">

    <h1>AZKO Sertifikat Generator</h1>

    <div class="subtitle">
        Generate otomatis sertifikat F4 landscape HD siap print.
    </div>

    <!-- INPUT NAMA -->

    <label>
        Input Nama Peserta
        <br>
        <small>(1 nama per baris)</small>
    </label>

    <textarea id="names">
budi santoso
siti rahma
ahmad fauzi
    </textarea>

    <!-- BUTTON -->

    <div class="button-group">

        <button class="generate-btn" onclick="generatePDF()" id="generateBtn">
            GENERATE PDF
        </button>

    </div>

    <!-- LOADING -->

    <div class="loading" id="loading">

        <div class="spinner"></div>

        <div class="loading-text">
            Menyiapkan sertifikat HD...
        </div>

    </div>

</div>

<script>

/* =========================
FORMAT NAMA
========================= */

function capitalizeName(name){

    return name
        .toLowerCase()
        .split(' ')
        .map(word => {

            if(word.length === 0) return '';

            return word.charAt(0).toUpperCase() + word.slice(1);

        })
        .join(' ');

}

/* =========================
GENERATE PDF
========================= */

async function generatePDF(){

    const loading = document.getElementById('loading');

    const button = document.getElementById('generateBtn');

    loading.style.display = 'block';

    button.disabled = true;

    button.innerHTML = 'MEMPROSES...';

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({

        orientation:'landscape',

        unit:'mm',

        format:[210,330],

        compress:true

    });

    const templateImage = "sertifikat.png";

    const names = document
        .getElementById('names')
        .value
        .split('\n')
        .map(name => capitalizeName(name.trim()))
        .filter(name => name !== '');

    if(names.length === 0){

        alert("Masukkan minimal 1 nama peserta");

        loading.style.display = 'none';

        button.disabled = false;

        button.innerHTML = 'GENERATE PDF';

        return;

    }

    /* =========================
    SETTING FIX
    ========================= */

    const posisiX = 107;

    const posisiY = 70;

    const baseFontSize = 36;

    const r = 176;
    const g = 137;
    const b = 72;

    const img = new Image();

    img.src = templateImage;

    img.onload = async () => {

        for(let i = 0; i < names.length; i++){

            if(i > 0){

                pdf.addPage([210,330],'landscape');

            }

            /* TEMPLATE */

            pdf.addImage(
                img,
                'PNG',
                0,
                0,
                330,
                210
            );

            /* FONT */

            pdf.setFont('times','italic');

            pdf.setTextColor(r,g,b);

            let fontSize = baseFontSize;

            if(names[i].length > 18){
                fontSize -= 4;
            }

            if(names[i].length > 28){
                fontSize -= 5;
            }

            if(names[i].length > 38){
                fontSize -= 5;
            }

            pdf.setFontSize(fontSize);

            /* TEXT */

            pdf.text(
                names[i],
                posisiX,
                posisiY,
                {
                    align:'center'
                }
            );

        }

        setTimeout(() => {

            pdf.save("AZKO-Sertifikat-F4.pdf");

            loading.style.display = 'none';

            button.disabled = false;

            button.innerHTML = 'GENERATE PDF';

        },1200);

    }

    img.onerror = () => {

        loading.style.display = 'none';

        button.disabled = false;

        button.innerHTML = 'GENERATE PDF';

        alert(
            "Template sertifikat.png tidak ditemukan.\n\nPastikan file template berada di folder yang sama dengan file HTML."
        );

    }

}

</script>

</body>
</html>
