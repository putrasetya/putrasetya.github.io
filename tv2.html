<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO ULTRA TV DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    overflow:hidden;

    font-family:'Poppins',sans-serif;

    color:white;

    background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 35%),
        radial-gradient(circle at top right,#facc15 0%,transparent 20%),
        radial-gradient(circle at bottom,#0f172a 0%,#020617 75%);

    position:relative;
}

/* =========================
ANIMATED BG
========================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
        linear-gradient(
            130deg,
            rgba(255,255,255,.03),
            transparent 30%,
            rgba(255,255,255,.02)
        );

    pointer-events:none;
}

body::after{

    content:"";

    position:fixed;

    width:220%;
    height:220%;

    top:-60%;
    left:-60%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.03),
            transparent
        );

    transform:rotate(25deg);

    animation:bgMove 14s linear infinite;

    pointer-events:none;
}

@keyframes bgMove{

    from{

        transform:
            translateX(-15%)
            rotate(25deg);
    }

    to{

        transform:
            translateX(15%)
            rotate(25deg);
    }
}

/* =========================
SLIDE
========================= */

.slide{

    position:absolute;

    inset:0;

    padding:
        2vh
        2vw;

    display:flex;

    flex-direction:column;

    opacity:0;

    visibility:hidden;

    transition:
        opacity .8s ease,
        visibility .8s ease;
}

.slide.active{

    opacity:1;

    visibility:visible;
}

/* =========================
HEADER
========================= */

.hero{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:2vh;
}

.hero-left h1{

    font-size:4vw;

    line-height:1;

    font-weight:900;

    letter-spacing:5px;

    text-transform:uppercase;

    text-shadow:
        0 0 25px rgba(255,255,255,.15);
}

.hero-left p{

    margin-top:1vh;

    font-size:1vw;

    letter-spacing:4px;

    opacity:.8;
}

.hero-badge{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    padding:
        .8vh
        1vw;

    border-radius:999px;

    margin-bottom:1.5vh;

    font-size:.8vw;

    font-weight:800;

    letter-spacing:2px;
}

.top-badge{

    background:
        linear-gradient(
            135deg,
            #facc15,
            #f59e0b
        );

    color:#111827;
}

.bottom-badge{

    background:
        linear-gradient(
            135deg,
            #dc2626,
            #7f1d1d
        );
}

.clock-box{

    padding:
        1.2vh
        1.8vw;

    border-radius:24px;

    background:
        rgba(255,255,255,.08);

    backdrop-filter:blur(14px);

    border:
        1px solid rgba(255,255,255,.08);

    font-size:1vw;

    font-weight:700;

    box-shadow:
        0 0 20px rgba(0,0,0,.25);
}

/* =========================
GRID
========================= */

.performance-grid{

    flex:1;

    display:grid;

    grid-template-columns:
        repeat(3,1fr);

    gap:1.5vw;
}

/* =========================
CARD
========================= */

.performance-card{

    position:relative;

    overflow:hidden;

    border-radius:34px;

    padding:
        2vh
        1.5vw;

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(14px);

    transform:
        translateY(40px);

    opacity:0;
}

.performance-card.show{

    animation:
        cardIn .9s forwards;
}

@keyframes cardIn{

    to{

        opacity:1;

        transform:
            translateY(0);
    }
}

/* =========================
TOP THEME
========================= */

.top-theme{

    background:
        linear-gradient(
            160deg,
            rgba(250,204,21,.28),
            rgba(255,255,255,.06),
            rgba(245,158,11,.18)
        );
}

/* =========================
BOTTOM THEME
========================= */

.bottom-theme{

    background:
        linear-gradient(
            160deg,
            rgba(127,29,29,.65),
            rgba(30,41,59,.35),
            rgba(220,38,38,.3)
        );
}

/* =========================
CARD CATEGORY
========================= */

.card-category{

    position:absolute;

    top:20px;
    right:20px;

    font-size:.75vw;

    font-weight:800;

    letter-spacing:3px;

    opacity:.7;
}

/* =========================
PHOTO
========================= */

.card-photo{

    width:100%;

    height:30vh;

    display:flex;

    justify-content:center;

    align-items:flex-end;
}

.card-photo img{

    width:100%;

    height:100%;

    object-fit:contain;

    filter:
        drop-shadow(0 12px 18px rgba(0,0,0,.35));
}

/* =========================
INFO
========================= */

.card-name{

    margin-top:1vh;

    font-size:1.8vw;

    font-weight:900;

    text-transform:uppercase;
}

.card-dept{

    margin-top:.4vh;

    font-size:.9vw;

    letter-spacing:2px;

    opacity:.8;
}

.card-score{

    margin-top:2vh;

    font-size:3vw;

    font-weight:900;
}

.card-label{

    font-size:.8vw;

    letter-spacing:3px;

    opacity:.7;
}

/* =========================
ACH
========================= */

.ach-wrap{

    margin-top:2vh;
}

.ach-bar{

    width:100%;

    height:14px;

    border-radius:999px;

    overflow:hidden;

    background:
        rgba(255,255,255,.08);
}

.ach-fill{

    height:100%;

    border-radius:999px;
}

.green{

    background:
        linear-gradient(
            90deg,
            #22c55e,
            #4ade80
        );
}

.yellow{

    background:
        linear-gradient(
            90deg,
            #f59e0b,
            #facc15
        );
}

.red{

    background:
        linear-gradient(
            90deg,
            #dc2626,
            #ef4444
        );
}

.ach-text{

    margin-top:.8vh;

    font-size:.95vw;

    font-weight:800;
}

/* =========================
STATUS
========================= */

.overlay-status{

    position:fixed;

    top:20px;
    left:20px;

    z-index:9999;

    padding:
        12px
        22px;

    border-radius:20px;

    background:
        rgba(15,23,42,.85);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(14px);

    font-size:13px;

    font-weight:800;

    letter-spacing:2px;

    opacity:0;

    transition:.3s ease;
}

.overlay-status.show{

    opacity:1;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    body{
        overflow:auto;
    }

    .slide{
        position:relative;
        min-height:100vh;
    }

    .performance-grid{

        grid-template-columns:1fr;
    }

    .hero{

        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    .hero-left h1{
        font-size:36px;
    }

    .hero-left p{
        font-size:12px;
    }

    .hero-badge{
        font-size:10px;
        padding:8px 14px;
    }

    .clock-box{
        font-size:12px;
    }

    .card-category{
        font-size:10px;
    }

    .card-name{
        font-size:22px;
    }

    .card-dept{
        font-size:11px;
    }

    .card-score{
        font-size:38px;
    }

    .card-label{
        font-size:10px;
    }

    .ach-text{
        font-size:12px;
    }
}

</style>
</head>

<body>

<div class="overlay-status" id="overlayStatus">
    ▶ PLAYING
</div>

<!-- =========================
TOP PERFORMANCE
========================= -->

<section class="slide active">

    <div class="hero">

        <div class="hero-left">

            <div class="hero-badge top-badge">
                AZKO CITIMALL TUBAN
            </div>

            <h1>
                TOP PERFORMANCE
            </h1>

            <p>
                BEST SALES • PROTEKSI • TRX
            </p>

        </div>

        <div class="clock-box" id="clockTop">
            UPDATE : -
        </div>

    </div>

    <div class="performance-grid" id="topContainer"></div>

</section>

<!-- =========================
BOTTOM PERFORMANCE
========================= -->

<section class="slide">

    <div class="hero">

        <div class="hero-left">

            <div class="hero-badge bottom-badge">
                AZKO CITIMALL TUBAN
            </div>

            <h1>
                BOTTOM PERFORMANCE
            </h1>

            <p>
                NEED IMPROVEMENT
            </p>

        </div>

        <div class="clock-box" id="clockBottom">
            UPDATE : -
        </div>

    </div>

    <div class="performance-grid" id="bottomContainer"></div>

</section>

<audio
    id="bgm"
    autoplay
    loop
    playsinline>

    <source
        src="https://putrasetya.github.io/223am.mp3"
        type="audio/mpeg">

</audio>

<script>

/* =========================
CONFIG
========================= */

const URL =
"https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

/* =========================
HELPERS
========================= */

function clean(v){

    return parseFloat(
        (v || "0")
        .toString()
        .replace(/[^\d.]/g,'')
    ) || 0;
}

function excluded(dept){

    const d =
    (dept || "")
    .toLowerCase();

    return (
        d.includes("cashier") ||
        d.includes("kasir") ||
        d.includes("cs")
    );
}

function achColor(v){

    if(v >= 100)
        return "green";

    if(v >= 80)
        return "yellow";

    return "red";
}

function updateClock(){

    const now =
    new Date().toLocaleString(
        "id-ID",
        {

            day:"2-digit",
            month:"long",
            year:"numeric",
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
        }
    );

    document.getElementById(
        "clockTop"
    ).innerHTML =
    "UPDATE : " + now;

    document.getElementById(
        "clockBottom"
    ).innerHTML =
    "UPDATE : " + now;
}

/* =========================
GET DATA
========================= */

async function getData(){

    try{

        const res =
        await fetch(URL);

        const json =
        await res.json();

        return json.map(r=>({

            name:
                r["EMPLOYEE NAME"] || "UNKNOWN",

            dept:
                r["DEPT"] || "-",

            sales:
                clean(r["SALES MTD"]),

            proteksi:
                clean(r["PROTEKSI"]),

            trx:
                clean(r["TRX"]),

            ach:
                clean(r["ACH MTD"]),

            photo:
                r["PHOTO"] || ""

        }));

    }catch(err){

        console.log(err);

        return [];
    }
}

/* =========================
CARD
========================= */

function createCard(
    item,
    category,
    score,
    label,
    type
){

    return `

    <div class="performance-card ${type}-theme">

        <div class="card-category">
            ${category}
        </div>

        <div class="card-photo">

            <img

                src="https://lh3.googleusercontent.com/d/${item.photo}"

                loading="lazy"

                onerror="
                this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random&color=fff&size=512'
                "
            >

        </div>

        <div class="card-name">
            ${item.name}
        </div>

        <div class="card-dept">
            ${item.dept}
        </div>

        <div class="card-score">
            ${score.toLocaleString('id-ID')}
        </div>

        <div class="card-label">
            ${label}
        </div>

        <div class="ach-wrap">

            <div class="ach-bar">

                <div

                    class="ach-fill ${achColor(item.ach)}"

                    style="
                        width:${Math.min(item.ach,100)}%;
                    ">
                </div>

            </div>

            <div class="ach-text">
                ACH ${item.ach.toFixed(1)}%
            </div>

        </div>

    </div>
    `;
}

/* =========================
ANIMATE
========================= */

function animateCards(){

    document
    .querySelectorAll(
        ".slide.active .performance-card"
    )
    .forEach((card,index)=>{

        card.classList.remove("show");

        void card.offsetWidth;

        setTimeout(()=>{

            card.classList.add("show");

        },index * 180);
    });
}

/* =========================
RENDER
========================= */

async function render(){

    const data =
    await getData();

    updateClock();

    const filtered =
    data.filter(
        d => !excluded(d.dept)
    );

    /* TOP */

    const topSales =
    [...filtered]
    .sort((a,b)=>b.sales-a.sales)[0];

    const topProteksi =
    [...filtered]
    .sort((a,b)=>b.proteksi-a.proteksi)[0];

    const topTrx =
    [...filtered]
    .sort((a,b)=>b.trx-a.trx)[0];

    /* BOTTOM */

    const bottomSales =
    [...filtered]
    .sort((a,b)=>a.sales-b.sales)[0];

    const bottomProteksi =
    [...filtered]
    .sort((a,b)=>a.proteksi-b.proteksi)[0];

    const bottomTrx =
    [...filtered]
    .sort((a,b)=>a.trx-b.trx)[0];

    /* RENDER TOP */

    document.getElementById(
        "topContainer"
    ).innerHTML =

        createCard(
            topSales,
            "SALES",
            topSales.sales,
            "TOTAL SALES",
            "top"
        )

        +

        createCard(
            topProteksi,
            "PROTEKSI",
            topProteksi.proteksi,
            "TOTAL PROTEKSI",
            "top"
        )

        +

        createCard(
            topTrx,
            "TRX",
            topTrx.trx,
            "TOTAL TRX",
            "top"
        );

    /* RENDER BOTTOM */

    document.getElementById(
        "bottomContainer"
    ).innerHTML =

        createCard(
            bottomSales,
            "SALES",
            bottomSales.sales,
            "TOTAL SALES",
            "bottom"
        )

        +

        createCard(
            bottomProteksi,
            "PROTEKSI",
            bottomProteksi.proteksi,
            "TOTAL PROTEKSI",
            "bottom"
        )

        +

        createCard(
            bottomTrx,
            "TRX",
            bottomTrx.trx,
            "TOTAL TRX",
            "bottom"
        );

    animateCards();
}

/* =========================
SLIDES
========================= */

const slides =
document.querySelectorAll(".slide");

let current = 0;

function nextSlide(){

    slides[current]
    .classList.remove("active");

    current++;

    if(current >= slides.length){

        current = 0;
    }

    slides[current]
    .classList.add("active");

    animateCards();
}

/* =========================
STATUS
========================= */

const overlay =
document.getElementById(
    "overlayStatus"
);

function showStatus(text){

    overlay.innerHTML = text;

    overlay.classList.add("show");

    clearTimeout(window.statusTimeout);

    window.statusTimeout =
    setTimeout(()=>{

        overlay.classList.remove("show");

    },1500);
}

/* =========================
AUDIO
========================= */

const bgm =
document.getElementById("bgm");

if(bgm){

    bgm.volume = 0.4;
}

async function playMusic(){

    try{

        await bgm.play();

    }catch(err){

        console.log(err);
    }
}

/* =========================
PAUSE
========================= */

let isPaused = false;

let slideInterval;
let updateInterval;

function stopLoop(){

    clearInterval(slideInterval);

    clearInterval(updateInterval);
}

function startLoop(){

    stopLoop();

    slideInterval =
    setInterval(()=>{

        if(!document.hidden){

            nextSlide();
        }

    },8000);

    updateInterval =
    setInterval(()=>{

        if(!document.hidden){

            render();
        }

    },15000);
}

function togglePause(){

    isPaused = !isPaused;

    if(isPaused){

        stopLoop();

        bgm.pause();

        showStatus("⏸ PAUSED");

    }else{

        startLoop();

        playMusic();

        showStatus("▶ PLAYING");
    }
}

/* =========================
FULLSCREEN
========================= */

async function toggleFullscreen(){

    try{

        if(!document.fullscreenElement){

            await document.documentElement.requestFullscreen();

            showStatus("🖥 FULLSCREEN");

        }else{

            await document.exitFullscreen();

            showStatus("❎ EXIT FULLSCREEN");
        }

    }catch(err){

        console.log(err);
    }
}

/* =========================
CLICK
========================= */

let clickTimer = null;

document.addEventListener(
    "click",
    ()=>{

        if(clickTimer){

            clearTimeout(clickTimer);
        }

        clickTimer = setTimeout(()=>{

            togglePause();

        },250);
    }
);

document.addEventListener(
    "dblclick",
    ()=>{

        clearTimeout(clickTimer);

        toggleFullscreen();
    }
);

/* =========================
START
========================= */

window.addEventListener(
    "load",
    async ()=>{

        await render();

        animateCards();

        startLoop();

        playMusic();

        setTimeout(playMusic,1000);

        setTimeout(playMusic,3000);

        showStatus("▶ PLAYING");
    }
);

</script>

</body>
</html>
