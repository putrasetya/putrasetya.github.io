<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO PERFORMANCE DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    color:white;
}

/* =========================
SLIDE
========================= */

.slide{
    position:absolute;
    inset:0;

    width:100vw;
    height:100vh;

    opacity:0;
    visibility:hidden;

    transition:opacity .8s ease;

    will-change:opacity;

    backface-visibility:hidden;
    transform:translateZ(0);
}

.slide.active{
    opacity:1;
    visibility:visible;
    z-index:2;
}

/* =========================
BACKGROUND
========================= */

.top-slide{
    background:
        radial-gradient(circle at top,#0d4cff 0%,transparent 30%),
        linear-gradient(180deg,#020617 0%,#000000 100%);
}

.bottom-slide{
    background:
        radial-gradient(circle at top,#ff0000 0%,transparent 30%),
        linear-gradient(180deg,#180000 0%,#000000 100%);
}

.slide::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        repeating-linear-gradient(
            90deg,
            rgba(255,255,255,.02) 0px,
            rgba(255,255,255,.02) 1px,
            transparent 1px,
            transparent 90px
        );

    pointer-events:none;
}

.slide::after{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,.03),
            transparent
        );

    animation:bgMove 10s linear infinite;

    pointer-events:none;
}

@keyframes bgMove{

    from{
        transform:translateX(-20%);
    }

    to{
        transform:translateX(20%);
    }
}

/* =========================
HEADER
========================= */

.header{

    height:16vh;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:
        1vh
        1.5vw;

    position:relative;
}

.logo{

    font-size:3vw;
    font-weight:900;
    color:#ff3131;
    line-height:1;
}

.logo span{

    display:block;

    font-size:1vw;
    color:white;

    margin-top:.3vh;
}

.title{

    position:absolute;

    left:50%;

    transform:translateX(-50%);

    text-align:center;
}

.title h1{

    font-size:4.2vw;

    font-weight:900;

    letter-spacing:4px;

    text-transform:uppercase;

    text-shadow:
        0 0 30px rgba(255,255,255,.4);
}

.title p{

    margin-top:.5vh;

    font-size:1vw;

    letter-spacing:3px;

    opacity:.9;
}

.update-box{

    width:13vw;

    padding:
        1vh
        1vw;

    border-radius:18px;

    border:
        2px solid rgba(255,255,255,.15);

    backdrop-filter:blur(10px);

    text-align:center;

    background:
        rgba(255,255,255,.05);

    box-shadow:
        0 0 20px rgba(0,0,0,.4);
}

.update-label{

    font-size:.7vw;

    letter-spacing:2px;

    font-weight:700;

    opacity:.8;
}

.update-time{

    margin-top:.4vh;

    font-size:1vw;

    font-weight:800;

    line-height:1.4;
}

/* =========================
MAIN
========================= */

.main{

    height:72vh;

    display:grid;

    grid-template-columns:
        repeat(3,1fr);

    gap:1vw;

    padding:
        0 1vw;
}

/* =========================
CATEGORY
========================= */

.category{

    border:
        1px solid rgba(255,255,255,.08);

    border-radius:26px;

    padding:
        1vh
        .8vw;

    background:
        rgba(255,255,255,.03);

    backdrop-filter:blur(8px);

    position:relative;

    overflow:hidden;
}

.top-slide .category{

    box-shadow:
        0 0 25px rgba(0,100,255,.15);
}

.bottom-slide .category{

    box-shadow:
        0 0 25px rgba(255,0,0,.15);
}

.category-title{

    text-align:center;

    margin-bottom:1vh;
}

.category-title h2{

    font-size:2vw;

    font-weight:900;

    text-transform:uppercase;
}

.category-title p{

    margin-top:.3vh;

    font-size:.8vw;

    letter-spacing:2px;

    opacity:.85;
}

.sales h2{
    color:#42d4ff;
}

.proteksi h2{
    color:#2dff84;
}

.trx h2{
    color:#ffd633;
}

/* =========================
TOP PODIUM
========================= */

.top-podium{

    height:100%;

    display:flex;

    align-items:flex-end;

    justify-content:center;

    gap:.8vw;

    contain:content;

    padding-bottom:4vh;
}

.podium-card{

    position:relative;

    border-radius:24px;

    overflow:hidden;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:flex-end;

    text-align:center;

    padding:
        1vh
        .5vw;

    border:
        2px solid rgba(255,255,255,.15);

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,.08),
            rgba(0,0,0,.4)
        );

    backdrop-filter:blur(8px);

    box-shadow:
        0 0 25px rgba(0,0,0,.45);

    opacity:0;

    transform:
        translateX(-40px)
        translateY(-20px);

    animation:
        slideIn .7s forwards,
        float 3s ease-in-out infinite;
}

.podium-card:nth-child(1){
    animation-delay:.1s;
}

.podium-card:nth-child(2){
    animation-delay:.25s;
}

.podium-card:nth-child(3){
    animation-delay:.4s;
}

@keyframes slideIn{

    to{

        opacity:1;

        transform:
            translateX(0)
            translateY(-20px);
    }
}

@keyframes float{

    0%,100%{
        transform:translateY(-20px);
    }

    50%{
        transform:translateY(-28px);
    }
}

.rank2,
.rank3{

    width:28%;
    height:72%;
}

.rank1{

    width:34%;
    height:86%;

    border:
        2px solid #ffd700;

    box-shadow:
        0 0 40px rgba(255,215,0,.5);
}

.rank1::before{

    content:"👑";

    position:absolute;

    top:-15px;

    font-size:2.2vw;
}

.rank-number{

    position:absolute;

    top:10px;
    left:10px;

    width:2.5vw;
    height:2.5vw;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:1.2vw;

    font-weight:900;

    background:
        rgba(0,0,0,.5);

    border:
        2px solid rgba(255,255,255,.2);
}

.rank1 .rank-number{
    background:#ffd700;
    color:black;
}

.rank2 .rank-number{
    background:#dbe4f0;
    color:black;
}

.rank3 .rank-number{
    background:#cd7f32;
}

.photo{

    width:100%;
    height:45%;

    display:flex;

    align-items:flex-end;

    justify-content:center;
}

.photo img{

    width:100%;
    height:100%;

    object-fit:contain;

    filter:
        drop-shadow(0 10px 15px rgba(0,0,0,.45));
}

.employee{
    margin-top:1vh;
}

.employee-name{

    font-size:.95vw;

    font-weight:900;

    text-transform:uppercase;

    line-height:1.2;
}

.employee-dept{

    margin-top:.4vh;

    font-size:.7vw;

    opacity:.8;
}

.score{

    margin-top:1vh;

    font-size:1.7vw;

    font-weight:900;

    line-height:1.2;
}

.score-label{

    margin-top:.2vh;

    font-size:.65vw;

    opacity:.75;
}

.ach-circle{

    width:4.5vw;
    height:4.5vw;

    min-width:70px;
    min-height:70px;

    border-radius:50%;

    margin-top:1vh;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:.9vw;

    font-weight:900;

    background:
        radial-gradient(circle,#111 58%,transparent 59%),
        conic-gradient(
            #32ff6a calc(var(--val) * 1%),
            rgba(255,255,255,.1) 0
        );

    box-shadow:
        0 0 18px rgba(50,255,106,.35);
}

/* =========================
BOTTOM TABLE
========================= */

.bottom-table{

    display:flex;

    flex-direction:column;

    gap:.8vh;
}

.table-header{

    display:grid;

    grid-template-columns:
        .6fr
        .8fr
        1.5fr
        1.3fr
        1.4fr
        1fr;

    padding:
        1vh
        .6vw;

    font-size:.7vw;

    font-weight:700;

    border-bottom:
        1px solid rgba(255,255,255,.1);

    opacity:.9;
}

.table-row{

    display:grid;

    grid-template-columns:
        .6fr
        .8fr
        1.5fr
        1.3fr
        1.4fr
        1fr;

    align-items:center;

    padding:
        .8vh
        .6vw;

    border-radius:18px;

    background:
        rgba(255,0,0,.08);

    border:
        1px solid rgba(255,0,0,.25);

    opacity:0;

    transform:
        translateX(-40px);

    animation:
        slideInRow .7s forwards;
}

.table-row:nth-child(1){
    animation-delay:.1s;
}

.table-row:nth-child(2){
    animation-delay:.25s;
}

.table-row:nth-child(3){
    animation-delay:.4s;
}

@keyframes slideInRow{

    to{

        opacity:1;

        transform:
            translateX(0);
    }
}

.rank-cell{

    font-size:1.8vw;

    font-weight:900;

    color:#ff4d4d;

    text-align:center;
}

.table-photo{

    width:55px;
    height:55px;

    border-radius:14px;

    overflow:hidden;

    background:#111;
}

.table-photo img{

    width:100%;
    height:100%;

    object-fit:cover;
}

.emp-name{

    font-size:.9vw;

    font-weight:800;

    line-height:1.2;
}

.emp-dept{

    margin-top:.3vh;

    font-size:.65vw;

    opacity:.7;
}

.metric{

    font-size:1vw;

    font-weight:800;

    text-align:center;
}

.bad-ach{

    width:4vw;
    height:4vw;

    min-width:60px;
    min-height:60px;

    border-radius:50%;

    margin:auto;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:.8vw;

    font-weight:900;

    background:
        radial-gradient(circle,#111 58%,transparent 59%),
        conic-gradient(
            #ff2d2d calc(var(--val) * 1%),
            rgba(255,255,255,.1) 0
        );

    box-shadow:
        0 0 18px rgba(255,0,0,.35);
}

.avg-box{

    margin-top:1vh;

    height:6vh;

    border-radius:18px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:
        0 1vw;

    background:
        rgba(255,0,0,.08);

    border:
        1px solid rgba(255,0,0,.25);
}

.avg-label{

    font-size:1vw;

    font-weight:700;

    letter-spacing:2px;
}

.avg-value{

    font-size:2vw;

    font-weight:900;

    color:#ff5252;
}

/* =========================
BOTTOM BAR
========================= */

.bottom-bar{

    height:8vh;

    margin:
        .5vh 1vw 0 1vw;

    border-radius:20px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:
        0 1.5vw;

    background:
        rgba(255,255,255,.05);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(10px);
}

.bottom-left{

    font-size:1.1vw;

    font-weight:800;

    letter-spacing:1px;
}

.bottom-right{

    display:flex;

    gap:2vw;

    font-size:.95vw;

    font-weight:700;
}

/* =========================
STATUS
========================= */

.status{

    position:fixed;

    top:20px;
    left:20px;

    z-index:9999;

    padding:
        12px
        20px;

    border-radius:16px;

    background:
        rgba(0,0,0,.7);

    border:
        1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(12px);

    font-size:12px;

    font-weight:800;

    letter-spacing:2px;

    opacity:0;

    transition:.3s;
}

.status.show{
    opacity:1;
}

</style>
</head>

<body>

<div class="status" id="status">
    ▶ PLAYING
</div>

<!-- LANJUTKAN HTML BODY DAN JAVASCRIPT DARI SCRIPT SEBELUMNYA -->

<script>

/* =========================
FORMAT JT
========================= */

function formatJT(value){

    if(value >= 1000000){

        return (
            value / 1000000
        ).toLocaleString(
            'id-ID',
            {
                minimumFractionDigits:1,
                maximumFractionDigits:1
            }
        ) + " JT";
    }

    return value.toLocaleString('id-ID');
}

</script>

</body>
</html>
