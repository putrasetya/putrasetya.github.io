<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO PERFORMANCE DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ===== (SEMUA CSS TETAP SAMA) ===== */

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Poppins',sans-serif;background:#000;color:white;}

.slide{position:absolute;inset:0;width:100vw;height:100vh;opacity:0;visibility:hidden;transition:opacity .8s ease;}
.slide.active{opacity:1;visibility:visible;z-index:2;}

.top-slide{
    background:radial-gradient(circle at top,#0d4cff 0%,transparent 30%),linear-gradient(180deg,#020617 0%,#000000 100%);
}

.bottom-slide{
    background:radial-gradient(circle at top,#ff0000 0%,transparent 30%),linear-gradient(180deg,#180000 0%,#000000 100%);
}

/* (CSS lain tidak diubah, tetap sama seperti punyamu) */

</style>
</head>

<body>

<div class="status" id="status">▶ PLAYING</div>

<!-- ================= TOP SLIDE ================= -->
<section class="slide top-slide active">

    <div class="header">

        <div class="logo">
            az•ko
            <span>CITIMALL TUBAN</span>
        </div>

        <div class="title">
            <h1>TOP PERFORMANCE</h1>
            <p>AZKO CITIMALL TUBAN</p>
        </div>

        <div class="update-box">
            <div class="update-label">DATA UPDATE</div>
            <div class="update-time" id="topTime">-</div>
        </div>

    </div>

    <div class="main">

        <div class="category sales">
            <div class="category-title"><h2>SALES</h2></div>
            <div class="top-podium" id="topSales"></div>
        </div>

        <div class="category proteksi">
            <div class="category-title"><h2>PROTEKSI</h2></div>
            <div class="top-podium" id="topProteksi"></div>
        </div>

        <div class="category trx">
            <div class="category-title"><h2>TRX</h2></div>
            <div class="top-podium" id="topTrx"></div>
        </div>

    </div>

</section>

<!-- ================= BOTTOM SLIDE ================= -->
<section class="slide bottom-slide">

    <div class="header">

        <div class="logo">
            az•ko
            <span>CITIMALL TUBAN</span>
        </div>

        <div class="title">
            <h1>BOTTOM PERFORMANCE</h1>
            <p>AZKO CITIMALL TUBAN</p>
        </div>

        <div class="update-box">
            <div class="update-label">DATA UPDATE</div>
            <div class="update-time" id="bottomTime">-</div>
        </div>

    </div>

    <div class="main">

        <div class="category sales">
            <div class="category-title"><h2>SALES</h2></div>
            <div class="bottom-table" id="bottomSales"></div>
        </div>

        <div class="category proteksi">
            <div class="category-title"><h2>PROTEKSI</h2></div>
            <div class="bottom-table" id="bottomProteksi"></div>
        </div>

        <div class="category trx">
            <div class="category-title"><h2>TRX</h2></div>
            <div class="bottom-table" id="bottomTrx"></div>
        </div>

    </div>

</section>

<script>

/* ================= CONFIG ================= */

const URL = "https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

/* ================= HELPERS ================= */

function clean(v){
    return parseFloat((v||"0").toString().replace(/[^\d.]/g,''))||0;
}

/* ================= CHANGE ONLY HERE ================= */
/* 👉 NICKNAME PRIORITY */

async function getData(){

    try{

        const res = await fetch(URL);
        const json = await res.json();

        return json.map(r=>({

            name:
                r["NICKNAME"] ||
                r["EMPLOYEE NAME"] ||
                "UNKNOWN",

            dept: r["DEPT"] || "-",
            sales: clean(r["SALES MTD"]),
            proteksi: clean(r["PROTEKSI"]),
            trx: clean(r["TRX"]),
            achSales: clean(r["ACH MTD"]),
            achProteksi: clean(r["ACH PROTEKSI"]),
            achTrx: clean(r["ACH BULANAN"]),
            photo: r["PHOTO"] || ""

        }));

    }catch(err){
        console.log(err);
        return [];
    }
}

/* ================= RENDER SYSTEM (TETAP) ================= */

function format(v){
    return v.toLocaleString('id-ID');
}

function card(d){
    return `
    <div class="card">
        <div>${d.name}</div>
        <div>${d.dept}</div>
    </div>`;
}

/* ================= UPDATE ================= */

async function update(){

    const data = await getData();

    console.log("DATA:", data);

}

/* ================= START ================= */

window.onload = () => {
    update();
};

</script>

</body>
</html>
