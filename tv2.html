<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO PERFORMANCE DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Poppins',sans-serif;background:#000;color:#fff;}

/* SLIDE SYSTEM */
.slide{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;

    opacity:0;
    visibility:hidden;

    transition:opacity .8s ease;

    transform:translate3d(0,0,0);
}

.slide.active{
    opacity:1;
    visibility:visible;
}

/* BACKGROUND */
.top-slide{
    background:
        radial-gradient(circle at top,#0d4cff 0%,transparent 30%),
        linear-gradient(180deg,#020617,#000);
}

.bottom-slide{
    background:
        radial-gradient(circle at top,#ff0000 0%,transparent 30%),
        linear-gradient(180deg,#180000,#000);
}

/* HEADER */
.header{
    height:16vh;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1vh 1.5vw;
    position:relative;
}

.logo{
    font-size:3vw;
    font-weight:900;
    color:#ff3131;
}

.logo span{
    display:block;
    font-size:1vw;
    color:#fff;
}

.title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

.title h1{
    font-size:4vw;
    font-weight:900;
}

.title p{
    font-size:1vw;
    opacity:.8;
}

/* MAIN */
.main{
    height:72vh;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1vw;
    padding:0 1vw;
}

/* CATEGORY */
.category{
    background:rgba(255,255,255,.03);
    border-radius:26px;
    padding:1vh .8vw;
    overflow:hidden;
}

/* ================= TOP PODIUM ================= */

.top-podium{
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:.8vw;
    padding-bottom:4vh;
}

.podium-card{
    position:relative;
    border-radius:24px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;

    text-align:center;

    padding:1vh .5vw 2vh;

    background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(0,0,0,.4));

    border:2px solid rgba(255,255,255,.15);

    opacity:0;
    transform:translateX(-40px);

    animation:in .7s forwards, float 3s ease-in-out infinite .7s;
}

@keyframes in{to{opacity:1;transform:translateX(0);}}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

.rank1{width:34%;height:86%;border:2px solid gold;}
.rank2,.rank3{width:28%;height:72%;}

.rank-number{
    position:absolute;
    top:10px;left:10px;
    width:2.5vw;height:2.5vw;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    background:rgba(0,0,0,.5);
}

.rank1 .rank-number{background:#ffd700;color:#000;}
.rank2 .rank-number{background:#dbe4f0;color:#000;}
.rank3 .rank-number{background:#cd7f32;color:#000;}

.photo{width:100%;height:45%;}
.photo img{width:100%;height:100%;object-fit:contain;}

.employee-name{font-size:.9vw;font-weight:900;}
.employee-dept{font-size:.7vw;opacity:.8;}

.score{font-size:1.6vw;font-weight:900;margin-top:1vh;}

.ach-circle{
    width:4vw;height:4vw;
    border-radius:50%;
    margin-top:1vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;

    background:
        radial-gradient(circle,#111 58%,transparent 59%),
        conic-gradient(#32ff6a calc(var(--val)*1%),rgba(255,255,255,.1) 0);
}

/* ================= BOTTOM TABLE ================= */

.bottom-table{
    display:flex;
    flex-direction:column;
    gap:.8vh;
}

.table-header,
.table-row{
    display:grid;
    grid-template-columns:.6fr .8fr 1.5fr .8fr 1.2fr 1fr;
    align-items:center;
    padding:.7vh .6vw;
}

.table-header{
    font-size:.7vw;
    font-weight:700;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.table-row{
    background:rgba(255,0,0,.08);
    border-radius:14px;
}

.table-photo{
    width:50px;height:50px;
    border-radius:10px;
    overflow:hidden;
}

.table-photo img{
    width:100%;height:100%;object-fit:cover;
}

/* AVG */
.avg-box{
    margin-top:1vh;
    height:6vh;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 1vw;
    background:rgba(255,0,0,.08);
    border-radius:16px;
}

.avg-value{
    font-size:1.8vw;
    font-weight:900;
    color:#ff4d4d;
}

/* BOTTOM BAR */
.bottom-bar{
    height:8vh;
    margin:.5vh 1vw 0;
    border-radius:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 1.5vw;

    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
}

.bottom-right{display:flex;gap:2vw;font-size:.9vw;}

/* STATUS */
.status{
    position:fixed;
    top:10px;left:10px;
    background:#0008;
    padding:10px;
    border-radius:10px;
    font-size:12px;
}

</style>
</head>

<body>

<div class="status" id="status">LOADING...</div>

<!-- TOP -->
<section class="slide top-slide active">

<div class="header">
    <div class="logo">az•ko <span>CITIMALL TUBAN</span></div>
    <div class="title"><h1>TOP PERFORMANCE</h1><p>AZKO CITIMALL TUBAN</p></div>
</div>

<div class="main">

    <div class="category"><div class="top-podium" id="topSales"></div></div>
    <div class="category"><div class="top-podium" id="topProteksi"></div></div>
    <div class="category"><div class="top-podium" id="topTrx"></div></div>

</div>

<div class="bottom-bar">
    <div>🏆 TOP PERFORMER HARI INI</div>
    <div class="bottom-right">
        <div id="bestSales"></div>
        <div id="bestProteksi"></div>
        <div id="bestTrx"></div>
    </div>
</div>

</section>

<!-- BOTTOM -->
<section class="slide bottom-slide">

<div class="header">
    <div class="logo">az•ko <span>CITIMALL TUBAN</span></div>
    <div class="title"><h1>BOTTOM PERFORMANCE</h1><p>AZKO CITIMALL TUBAN</p></div>
</div>

<div class="main">

    <div class="category">
        <div class="bottom-table">
            <div class="table-header">
                <div>R</div><div></div><div>NAME</div><div>DEPT</div><div>VAL</div><div>ACH</div>
            </div>
            <div id="bottomSales"></div>
            <div class="avg-box"><div>AVG</div><div class="avg-value" id="avgSales">0%</div></div>
        </div>
    </div>

    <div class="category">
        <div id="bottomProteksi"></div>
    </div>

    <div class="category">
        <div id="bottomTrx"></div>
    </div>

</div>

<div class="bottom-bar">
    <div>📢 KEEP IMPROVING</div>
    <div class="bottom-right">
        <div>FOCUS</div>
        <div>WORK</div>
        <div>WIN</div>
    </div>
</div>

</section>

<script>

const URL="https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

function clean(v){
return parseFloat((v||"0").toString().replace(/[^\d.]/g,''))||0;
}

async function getData(){
const r=await fetch(URL+"?t="+Date.now());
const j=await r.json();

return j.map(x=>({
name:x["EMPLOYEE NAME"],
dept:x["DEPT"],
sales:clean(x["SALES MTD"]),
proteksi:clean(x["PROTEKSI"]),
trx:clean(x["TRX"]),
achSales:clean(x["ACH MTD"]),
achProteksi:clean(x["ACH PROTEKSI"]),
achTrx:clean(x["ACH BULANAN"]),
photo:x["PHOTO"]
}));
}

/* TOP */
function card(d,r,v,a){
return `
<div class="podium-card rank${r}">
<div class="rank-number">${r}</div>
<div class="photo"><img src="https://drive.google.com/thumbnail?id=${d.photo}&sz=w1000"></div>
<div class="employee-name">${d.name}</div>
<div class="employee-dept">${d.dept}</div>
<div class="score">${v.toLocaleString('id-ID')}</div>
<div class="ach-circle" style="--val:${Math.min(a,100)}">${a.toFixed(1)}%</div>
</div>`;
}

function renderTop(data,key,ach,id){
const s=[...data].sort((a,b)=>b[key]-a[key]).slice(0,3);
const o=[s[1]||s[0],s[0],s[2]||s[1]].filter(Boolean);
document.getElementById(id).innerHTML=o.map((d,i)=>card(d,[2,1,3][i],d[key],d[ach])).join("");
return s[0]?.name||"-";
}

/* BOTTOM */
function renderBottom(data,key,ach,id,avg){

const s=[...data].sort((a,b)=>a[key]-b[key]).slice(0,3);

document.getElementById(id).innerHTML=
s.map((d,i)=>`
<div class="table-row">
<div>${i+1}</div>
<div class="table-photo"><img src="https://drive.google.com/thumbnail?id=${d.photo}&sz=w200"></div>
<div>${d.name}</div>
<div>${d.dept}</div>
<div>${d[key]}</div>
<div>${d[ach].toFixed(1)}%</div>
</div>`).join("");

const a=s.length? s.reduce((x,y)=>x+y[ach],0)/s.length:0;
document.getElementById(avg).innerText=a.toFixed(1)+"%";
}

/* UPDATE */
async function update(){

const d=(await getData()).filter(x=>!x.dept.toLowerCase().includes("cashier"));

document.getElementById("bestSales").innerText="SALES: "+renderTop(d,"sales","achSales","topSales");
document.getElementById("bestProteksi").innerText="PROTEKSI: "+renderTop(d,"proteksi","achProteksi","topProteksi");
document.getElementById("bestTrx").innerText="TRX: "+renderTop(d,"trx","achTrx","topTrx");

renderBottom(d,"sales","achSales","bottomSales","avgSales");
renderBottom(d,"proteksi","achProteksi","bottomProteksi","avgProteksi");
renderBottom(d,"trx","achTrx","bottomTrx","avgTrx");

document.getElementById("status").innerText="UPDATED "+new Date().toLocaleTimeString();

}

/* SLIDE */
const slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},10000);

/* START */
update();
setInterval(update,15000);

</script>

</body>
</html>
