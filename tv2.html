<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AZKO ULTRA PERFORMANCE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{

    font-family:'Poppins',sans-serif;

    background:
        radial-gradient(circle at top left,#0f3cff 0%,transparent 30%),
        radial-gradient(circle at top right,#ffd700 0%,transparent 20%),
        linear-gradient(180deg,#020617 0%,#000000 100%);

    color:white;

    position:relative;
}

/* =========================
BG FX
========================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
        repeating-linear-gradient(
            90deg,
            rgba(255,255,255,.015) 0px,
            rgba(255,255,255,.015) 1px,
            transparent 1px,
            transparent 80px
        );

    pointer-events:none;
}

body::after{

    content:"";

    position:fixed;

    width:200%;
    height:200%;

    top:-50%;
    left:-50%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.04),
            transparent
        );

    transform:rotate(25deg);

    animation:bgMove 10s linear infinite;

    pointer-events:none;
}

@keyframes bgMove{

    from{
        transform:
            translateX(-10%)
            rotate(25deg);
    }

    to{
        transform:
            translateX(10%)
            rotate(25deg);
    }
}

/* =========================
SLIDES
========================= */

.slide{

    position:absolute;

    inset:0;

    padding:
        1vh
        1vw;

    opacity:0;

    visibility:hidden;

    transition:
        opacity .8s ease,
        visibility .8s;
}

.slide.active{

    opacity:1;

    visibility:visible;
}

/* =========================
HEADER
========================= */

.top-header{

    height:12vh;

    display:flex;

    align-items:center;

    justify-content:space-between;

    position:relative;
}

.logo{

    font-size:3vw;

    font-weight:900;

    color:#ff3131;

    text-transform:uppercase;
}

.logo span{

    color:white;

    font-size:1vw;

    display:block;

    letter-spacing:2px;
}

.main-title{

    text-align:center;

    position:absolute;

    left:50%;

    transform:translateX(-50%);
}

.main-title h1{

    font-size:4vw;

    font-weight:900;

    letter-spacing:6px;

    line-height:1;

    text-transform:uppercase;

    background:
        linear-gradient(
            180deg,
            #ffffff,
            #d6d6d6
        );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    text-shadow:
        0 0 25px rgba(255,255,255,.25);
}

.main-title p{

    margin-top:.4vh;

    font-size:.8vw;

    letter-spacing:4px;

    opacity:.8;
}

.update-box{

    padding:
        1vh
        1vw;

    border-radius:18px;

    border:
        1px solid rgba(255,255,255,.12);

    background:
        rgba(255,255,255,.05);

    backdrop-filter:blur(12px);

    font-size:.8vw;

    font-weight:700;
}

/* =========================
GRID
========================= */

.main-grid{

    height:74vh;

    display:grid;

    grid-template-columns:
        repeat(3,1fr);

    gap:1vw;
}

/* =========================
CATEGORY
========================= */

.category{

    display:flex;

    flex-direction:column;

    gap:1vh;
}

.category-title{

    height:6vh;

    border-radius:22px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:1.1vw;

    font-weight:900;

    letter-spacing:3px;

    text-transform:uppercase;

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(12px);
}

.sales-title{

    background:
        linear-gradient(
            135deg,
            rgba(0,140,255,.35),
            rgba(0,70,255,.1)
        );
}

.proteksi-title{

    background:
        linear-gradient(
            135deg,
            rgba(0,255,160,.28),
            rgba(0,100,80,.08)
        );
}

.trx-title{

    background:
        linear-gradient(
            135deg,
            rgba(255,180,0,.35),
            rgba(255,120,0,.08)
        );
}

/* =========================
CARD LIST
========================= */

.card-list{

    flex:1;

    display:flex;

    flex-direction:column;

    gap:1vh;
}

/* =========================
TOP CARD
========================= */

.rank-card{

    position:relative;

    overflow:hidden;

    border-radius:30px;

    flex:1;

    padding:
        1vh
        .8vw;

    display:flex;

    align-items:center;

    border:
        1px solid rgba(255,255,255,.1);

    backdrop-filter:blur(18px);

    opacity:0;

    transform:
        translateY(30px)
        scale(.96);
}

.rank-card.show{

    animation:
        showCard .8s forwards;
}

@keyframes showCard{

    to{

        opacity:1;

        transform:
            translateY(0)
            scale(1);
    }
}

.gold{

    background:
        linear-gradient(
            135deg,
            rgba(255,215,0,.40),
            rgba(255,180,0,.08)
        );

    box-shadow:
        0 0 30px rgba(255,215,0,.18);
}

.silver{

    background:
        linear-gradient(
            135deg,
            rgba(226,232,240,.22),
            rgba(120,120,120,.06)
        );
}

.bronze{

    background:
        linear-gradient(
            135deg,
            rgba(194,120,59,.35),
            rgba(120,53,15,.08)
        );
}

/* =========================
BOTTOM CARD
========================= */

.red1{

    background:
        linear-gradient(
            135deg,
            rgba(255,40,40,.28),
            rgba(120,0,0,.08)
        );
}

.red2{

    background:
        linear-gradient(
            135deg,
            rgba(180,20,20,.35),
            rgba(80,0,0,.08)
        );
}

.red3{

    background:
        linear-gradient(
            135deg,
            rgba(120,0,0,.45),
            rgba(30,0,0,.12)
        );
}

/* =========================
RANK
========================= */

.rank-no{

    position:absolute;

    top:50%;
    left:-8px;

    transform:translateY(-50%);

    font-size:5vw;

    font-weight:900;

    opacity:.12;
}

/* =========================
PHOTO
========================= */

.photo{

    width:28%;
    height:100%;

    display:flex;

    align-items:flex-end;

    justify-content:center;
}

.photo img{

    width:100%;
    height:100%;

    object-fit:contain;

    filter:
        drop-shadow(0 10px 14px rgba(0,0,0,.35));
}

/* =========================
INFO
========================= */

.info{

    flex:1;

    padding-left:.8vw;

    overflow:hidden;
}

.name{

    font-size:1vw;

    font-weight:900;

    text-transform:uppercase;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;
}

.dept{

    margin-top:.3vh;

    font-size:.65vw;

    letter-spacing:2px;

    opacity:.8;
}

.score{

    margin-top:1vh;

    font-size:1.7vw;

    font-weight:900;
}

.score-label{

    font-size:.65vw;

    letter-spacing:2px;

    opacity:.7;
}

/* =========================
ACH
========================= */

.ach{

    width:28%;

    display:flex;

    flex-direction:column;

    align-items:flex-end;
}

.circle{

    width:80px;
    height:80px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    position:relative;

    font-size:.9vw;

    font-weight:900;

    background:
        radial-gradient(circle,#111827 58%,transparent 59%),
        conic-gradient(
            var(--clr) calc(var(--val) * 1%),
            rgba(255,255,255,.08) 0
        );

    box-shadow:
        0 0 18px rgba(255,255,255,.08);
}

.circle.green{
    --clr:#22c55e;
}

.circle.yellow{
    --clr:#facc15;
}

.circle.red{
    --clr:#ef4444;
}

.ach-label{

    margin-top:.6vh;

    font-size:.6vw;

    letter-spacing:2px;

    opacity:.7;
}

/* =========================
BOTTOM BAR
========================= */

.bottom-bar{

    height:8vh;

    margin-top:1vh;

    border-radius:20px;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:2vw;

    background:
        rgba(255,255,255,.05);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    font-weight:700;

    letter-spacing:2px;

    font-size:.85vw;
}

/* =========================
STATUS
========================= */

.status{

    position:fixed;

    top:20px;
    left:20px;

    z-index:9999;

    padding:
        12px
        20px;

    border-radius:18px;

    background:
        rgba(15,23,42,.92);

    border:
        1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(14px);

    font-size:12px;

    font-weight:800;

    letter-spacing:2px;

    opacity:0;

    transition:.3s;
}

.status.show{
    opacity:1;
}

</style>
</head>

<body>

<div class="status" id="status">
    ▶ PLAYING
</div>

<!-- =========================
TOP SLIDE
========================= -->

<section class="slide active" id="slideTop">

    <div class="top-header">

        <div class="logo">
            az•ko
            <span>CITIMALL TUBAN</span>
        </div>

        <div class="main-title">

            <h1>TOP PERFORMANCE</h1>

            <p>
                SALES • PROTEKSI • TRX
            </p>

        </div>

        <div class="update-box" id="updateTop">
            UPDATE : -
        </div>

    </div>

    <div class="main-grid">

        <div class="category">

            <div class="category-title sales-title">
                SALES
            </div>

            <div class="card-list" id="topSales"></div>

        </div>

        <div class="category">

            <div class="category-title proteksi-title">
                PROTEKSI
            </div>

            <div class="card-list" id="topProteksi"></div>

        </div>

        <div class="category">

            <div class="category-title trx-title">
                TRX
            </div>

            <div class="card-list" id="topTrx"></div>

        </div>

    </div>

    <div class="bottom-bar">
        🏆 TOP SALES • 🔥 TOP PROTEKSI • ⚡ TOP TRX
    </div>

</section>

<!-- =========================
BOTTOM SLIDE
========================= -->

<section class="slide" id="slideBottom">

    <div class="top-header">

        <div class="logo">
            az•ko
            <span>CITIMALL TUBAN</span>
        </div>

        <div class="main-title">

            <h1 style="color:#ff4040">
                BOTTOM PERFORMANCE
            </h1>

            <p>
                SALES • PROTEKSI • TRX
            </p>

        </div>

        <div class="update-box" id="updateBottom">
            UPDATE : -
        </div>

    </div>

    <div class="main-grid">

        <div class="category">

            <div class="category-title sales-title">
                SALES
            </div>

            <div class="card-list" id="bottomSales"></div>

        </div>

        <div class="category">

            <div class="category-title proteksi-title">
                PROTEKSI
            </div>

            <div class="card-list" id="bottomProteksi"></div>

        </div>

        <div class="category">

            <div class="category-title trx-title">
                TRX
            </div>

            <div class="card-list" id="bottomTrx"></div>

        </div>

    </div>

    <div class="bottom-bar">
        🎯 KEEP IMPROVING • 🚀 STAY MOTIVATED • ❤️ WORK WITH HEART
    </div>

</section>

<script>

/* =========================
CONFIG
========================= */

const URL =
"https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

/* =========================
HELPERS
========================= */

function clean(v){

    return parseFloat(
        (v || "0")
        .toString()
        .replace(/[^\d.]/g,'')
    ) || 0;
}

function achClass(v){

    if(v >= 100) return "green";

    if(v >= 80) return "yellow";

    return "red";
}

function excluded(dept){

    const d =
    (dept || "")
    .toLowerCase();

    return (
        d.includes("cashier") ||
        d.includes("kasir") ||
        d.includes("cs")
    );
}

/* =========================
GET DATA
========================= */

async function getData(){

    try{

        const res =
        await fetch(URL);

        const json =
        await res.json();

        return json.map(r=>({

            name:
                r["EMPLOYEE NAME"] || "UNKNOWN",

            dept:
                r["DEPT"] || "-",

            sales:
                clean(r["SALES MTD"]),

            proteksi:
                clean(r["PROTEKSI"]),

            trx:
                clean(r["TRX"]),

            achSales:
                clean(r["ACH MTD"]),

            achProteksi:
                clean(r["ACH PROTEKSI"]),

            achTrx:
                clean(r["ACH BULANAN"]),

            photo:
                r["PHOTO"] || ""

        }));

    }catch(err){

        console.log(err);

        return [];
    }
}

/* =========================
CARD
========================= */

function card(
    item,
    rank,
    style,
    score,
    ach,
    label
){

    return `

    <div class="rank-card ${style}">

        <div class="rank-no">
            ${rank}
        </div>

        <div class="photo">

            <img

                src="https://lh3.googleusercontent.com/d/${item.photo}"

                onerror="
                this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random&color=fff&size=512'
                "
            >

        </div>

        <div class="info">

            <div class="name">
                ${item.name}
            </div>

            <div class="dept">
                ${item.dept}
            </div>

            <div class="score">
                ${score.toLocaleString('id-ID')}
            </div>

            <div class="score-label">
                ${label}
            </div>

        </div>

        <div class="ach">

            <div
                class="circle ${achClass(ach)}"
                style="--val:${Math.min(ach,100)}">

                ${ach.toFixed(1)}%

            </div>

            <div class="ach-label">
                ACHIEVEMENT
            </div>

        </div>

    </div>
    `;
}

/* =========================
RENDER
========================= */

function renderList(
    data,
    key,
    achKey,
    containerId,
    mode
){

    const el =
    document.getElementById(containerId);

    let sorted = [];

    if(mode === "top"){

        sorted =
        [...data]
        .sort((a,b)=>b[key]-a[key])
        .slice(0,3);

    }else{

        sorted =
        [...data]
        .sort((a,b)=>a[key]-b[key])
        .slice(0,3);
    }

    const styles =
    mode === "top"
    ? ["gold","silver","bronze"]
    : ["red1","red2","red3"];

    let html = "";

    sorted.forEach((d,i)=>{

        html += card(

            d,

            i + 1,

            styles[i],

            d[key],

            d[achKey],

            key.toUpperCase()
        );
    });

    el.innerHTML = html;
}

/* =========================
UPDATE
========================= */

async function render(){

    const raw =
    await getData();

    const data =
    raw.filter(
        d => !excluded(d.dept)
    );

    renderList(
        data,
        "sales",
        "achSales",
        "topSales",
        "top"
    );

    renderList(
        data,
        "proteksi",
        "achProteksi",
        "topProteksi",
        "top"
    );

    renderList(
        data,
        "trx",
        "achTrx",
        "topTrx",
        "top"
    );

    renderList(
        data,
        "sales",
        "achSales",
        "bottomSales",
        "bottom"
    );

    renderList(
        data,
        "proteksi",
        "achProteksi",
        "bottomProteksi",
        "bottom"
    );

    renderList(
        data,
        "trx",
        "achTrx",
        "bottomTrx",
        "bottom"
    );

    animateCards();

    updateTime();
}

/* =========================
TIME
========================= */

function updateTime(){

    const now =
    new Date().toLocaleString(
        "id-ID",
        {

            day:"2-digit",
            month:"long",
            year:"numeric",
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
        }
    );

    document
    .getElementById("updateTop")
    .innerHTML =
    "UPDATE : " + now;

    document
    .getElementById("updateBottom")
    .innerHTML =
    "UPDATE : " + now;
}

/* =========================
ANIMATION
========================= */

function animateCards(){

    document
    .querySelectorAll(".slide.active .rank-card")
    .forEach((card,index)=>{

        card.classList.remove("show");

        void card.offsetWidth;

        setTimeout(()=>{

            card.classList.add("show");

        },index * 70);
    });
}

/* =========================
SLIDE
========================= */

const slides =
document.querySelectorAll(".slide");

let current = 0;

function nextSlide(){

    slides[current]
    .classList.remove("active");

    current++;

    if(current >= slides.length){

        current = 0;
    }

    slides[current]
    .classList.add("active");

    animateCards();
}

/* =========================
STATUS
========================= */

const statusEl =
document.getElementById("status");

function status(text){

    statusEl.innerHTML = text;

    statusEl.classList.add("show");

    clearTimeout(window.statusTimeout);

    window.statusTimeout =
    setTimeout(()=>{

        statusEl.classList.remove("show");

    },1500);
}

/* =========================
FULLSCREEN
========================= */

async function fullscreen(){

    try{

        if(!document.fullscreenElement){

            await document.documentElement.requestFullscreen();

            status("🖥 FULLSCREEN");

        }else{

            await document.exitFullscreen();

            status("❎ EXIT FULLSCREEN");
        }

    }catch(err){

        console.log(err);
    }
}

/* =========================
CLICK
========================= */

document.addEventListener(
    "dblclick",
    fullscreen
);

/* =========================
START
========================= */

window.addEventListener(
    "load",
    async ()=>{

        await render();

        setInterval(
            nextSlide,
            9000
        );

        setInterval(
            render,
            15000
        );

        status("▶ PLAYING");
    }
);

</script>

</body>
</html>
