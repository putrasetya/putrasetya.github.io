<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO ULTRA TV DISPLAY V3 CINEMATIC FIXED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
BASE CINEMATIC
========================= */

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}

body{
    font-family:Poppins,sans-serif;
    background:radial-gradient(circle at top,#0f172a,#020617);
    color:#fff;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%,rgba(59,130,246,.25),transparent 40%),
        radial-gradient(circle at 80% 30%,rgba(234,179,8,.15),transparent 35%),
        radial-gradient(circle at 50% 100%,rgba(239,68,68,.12),transparent 50%);
    filter:blur(18px);
    animation:move 10s ease-in-out infinite alternate;
}

@keyframes move{
    from{transform:scale(1) translateY(0)}
    to{transform:scale(1.08) translateY(-10px)}
}

/* SLIDE */
.slide{
    position:absolute;
    inset:0;
    opacity:0;
    visibility:hidden;
    transform:scale(1.06);
    transition:1s ease;
    padding:2vh 2vw;
    display:flex;
    flex-direction:column;
}

.slide.active{
    opacity:1;
    visibility:visible;
    transform:scale(1);
}

/* HEADER */
.header{text-align:center;margin-bottom:1vh}
.header h1{font-size:3vw;font-weight:900;letter-spacing:5px}
.header p{opacity:.7}

.update{
    margin:1vh auto;
    padding:1vh 2vw;
    background:rgba(255,255,255,.05);
    border-radius:14px;
    width:fit-content;
}

/* LIST */
.rank-list{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
}

/* CARD */
.rank-card{
    display:flex;
    align-items:center;
    height:22vh;
    border-radius:26px;
    overflow:hidden;
    opacity:0;
    transform:translateX(-80px);
}

.rank-card.show{
    animation:in .7s forwards;
}

@keyframes in{
    to{opacity:1;transform:translateX(0)}
}

/* COLORS */
.gold{background:linear-gradient(135deg,#6b5300,#facc15)}
.silver{background:linear-gradient(135deg,#6b7280,#e5e7eb)}
.bronze{background:linear-gradient(135deg,#7c3f1d,#c87c3d)}

.red-high{background:linear-gradient(135deg,#7f1d1d,#dc2626)}
.red-mid{background:linear-gradient(135deg,#4a0404,#b91c1c)}
.red-low{background:linear-gradient(135deg,#1f0000,#7f1d1d)}

/* RANK */
.rank-number{
    position:absolute;
    left:1vw;
    font-size:11vw;
    opacity:.12;
}

/* PHOTO */
.photo{width:18%;height:100%}
.photo img{width:100%;height:100%;object-fit:contain}

/* EMP */
.emp{flex:1;padding-left:1vw}
.name{font-size:1.8vw;font-weight:900}
.dept{opacity:.7}

/* SCORE */
.score{width:30%;text-align:right;padding-right:2vw}
.value{font-size:2.3vw;font-weight:900}

/* PAUSE */
.pause{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 14px;
    background:rgba(0,0,0,.5);
    border-radius:10px;
    opacity:0;
    transition:.3s;
}
.pause.show{opacity:1}

</style>
</head>

<body>

<div class="pause" id="pause">PLAYING</div>

<!-- SLIDES -->
<div class="slide active">
    <div class="header">
        <h1>TOP SALES</h1>
        <p>AZKO CITIMALL TUBAN</p>
        <div class="update" id="u1">UPDATE -</div>
    </div>
    <div class="rank-list" id="salesTop"></div>
</div>

<div class="slide">
    <div class="header">
        <h1>BOTTOM SALES</h1>
        <div class="update" id="u2">UPDATE -</div>
    </div>
    <div class="rank-list" id="salesBottom"></div>
</div>

<div class="slide">
    <div class="header">
        <h1>TOP PROTEKSI</h1>
        <div class="update" id="u3">UPDATE -</div>
    </div>
    <div class="rank-list" id="proteksiTop"></div>
</div>

<div class="slide">
    <div class="header">
        <h1>BOTTOM PROTEKSI</h1>
        <div class="update" id="u4">UPDATE -</div>
    </div>
    <div class="rank-list" id="proteksiBottom"></div>
</div>

<div class="slide">
    <div class="header">
        <h1>TOP TRX</h1>
        <div class="update" id="u5">UPDATE -</div>
    </div>
    <div class="rank-list" id="trxTop"></div>
</div>

<div class="slide">
    <div class="header">
        <h1>BOTTOM TRX</h1>
        <div class="update" id="u6">UPDATE -</div>
    </div>
    <div class="rank-list" id="trxBottom"></div>
</div>

<audio id="bgm" loop>
<source src="https://putrasetya.github.io/223am.mp3">
</audio>

<script>

const URL="https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

let cache=[];

/* =========================
SAFE FETCH (FIX UTAMA)
========================= */
async function getData(retry=3){
    try{
        const res=await fetch(URL,{cache:"no-store"});
        const text=await res.text();

        let json;

        try{
            json=JSON.parse(text);
        }catch(e){
            console.log("JSON ERROR");
            return cache;
        }

        if(!Array.isArray(json)){
            console.log("NOT ARRAY");
            return cache;
        }

        cache=json;
        return json;

    }catch(err){
        console.log("FETCH ERROR",err);

        if(retry>0){
            return getData(retry-1);
        }

        return cache;
    }
}

/* =========================
RENDER
========================= */
function render(data,key,container,mode){

    const el=document.getElementById(container);
    if(!el) return;

    let list=[...data]
        .filter(v=>v[key]>0)
        .sort((a,b)=>mode==="top"?b[key]-a[key]:a[key]-b[key])
        .slice(0,3)
        .map((d,i)=>({...d,rank:i+1}));

    el.innerHTML="";

    list.forEach((d,i)=>{

        const div=document.createElement("div");

        div.className=`rank-card ${
            mode==="top"
            ?["gold","silver","bronze"][i]
            :"red-high"
        } show`;

        div.innerHTML=`
            <div class="rank-number">${d.rank}</div>

            <div class="photo">
                <img src="https://drive.google.com/uc?export=view&id=${d.photo}">
            </div>

            <div class="emp">
                <div class="name">${d.name}</div>
                <div class="dept">${d.dept}</div>
            </div>

            <div class="score">
                <div class="value">${d[key].toLocaleString('id-ID')}</div>
            </div>
        `;

        el.appendChild(div);
    });
}

/* =========================
SLIDE
========================= */
const slides=document.querySelectorAll(".slide");
let cur=0;

function next(){
    slides[cur].classList.remove("active");
    cur=(cur+1)%slides.length;
    slides[cur].classList.add("active");
}

/* =========================
UPDATE LOOP
========================= */
async function update(){

    const data=await getData();

    render(data,"sales","salesTop","top");
    render(data,"sales","salesBottom","bottom");

    render(data,"proteksi","proteksiTop","top");
    render(data,"proteksi","proteksiBottom","bottom");

    render(data,"trx","trxTop","top");
    render(data,"trx","trxBottom","bottom");

    document.getElementById("u1").innerText=
        "UPDATE " + new Date().toLocaleString("id-ID");
}

/* LOOP */
setInterval(()=>{if(!document.hidden)next()},7000);
setInterval(()=>{if(!document.hidden)update()},15000);

/* AUDIO START FIX */
document.addEventListener("click",()=>{
    document.getElementById("bgm").play().catch(()=>{});
},{once:true});

window.onload=update;

</script>

</body>
</html>
