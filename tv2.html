<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZKO PERFORMANCE DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
}

/* ================= SLIDE ================= */

.slide{
    position:absolute;
    inset:0;
    opacity:0;
    visibility:hidden;
    transition:opacity .6s ease;
}

.slide.active{
    opacity:1;
    visibility:visible;
}

/* ================= BACKGROUND ================= */

.top-slide{
    background:radial-gradient(circle at top,#0d4cff 0%,transparent 30%),linear-gradient(180deg,#020617,#000);
}

.bottom-slide{
    background:radial-gradient(circle at top,#ff2d2d 0%,transparent 30%),linear-gradient(180deg,#180000,#000);
}

/* ================= HEADER ================= */

.header{
    height:16vh;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1vh 1.5vw;
    position:relative;
}

.logo{
    font-size:3vw;
    font-weight:900;
}

.logo span{
    display:block;
    font-size:1vw;
}

.title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

.title h1{
    font-size:4vw;
    font-weight:900;
}

/* ================= MAIN ================= */

.main{
    height:72vh;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1vw;
    padding:0 1vw;
}

/* ================= CATEGORY FIX ================= */

.category{
    border-radius:26px;
    padding:1vh .8vw 2vh;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    overflow:visible;
}

/* ================= PODIUM ================= */

.top-podium{
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:.8vw;
    padding-bottom:1vh;
}

.podium-card{
    width:32%;
    border-radius:22px;
    padding:1vh .5vw 2vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    text-align:center;

    background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(0,0,0,.4));
    border:2px solid rgba(255,255,255,.15);

    overflow:visible;
}

/* rank size FIX */
.rank1{height:95%;border-color:#ffd700;}
.rank2{height:82%;}
.rank3{height:82%;}

/* ACH FIX */
.ach-circle{
    width:70px;
    height:70px;
    border-radius:50%;
    margin-top:1vh;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:.85rem;
    font-weight:900;

    background:
        radial-gradient(circle,#111 58%,transparent 59%),
        conic-gradient(#32ff6a calc(var(--val)*1%),rgba(255,255,255,.1) 0);

    box-shadow:0 0 18px rgba(50,255,106,.35);
}

/* ================= TABLE ================= */

.table-row{
    display:grid;
    grid-template-columns:.6fr .8fr 1.5fr 1.3fr 1.4fr 1fr;
    padding:.8vh .6vw;
    background:rgba(255,0,0,.08);
    border-radius:14px;
    margin-bottom:.5vh;
}

/* ================= STATUS ================= */

.status{
    position:fixed;
    top:15px;
    left:15px;
    padding:10px 16px;
    font-size:12px;
    background:rgba(0,0,0,.6);
    border:1px solid rgba(255,255,255,.2);
    border-radius:12px;
    opacity:0;
    transition:.3s;
}

.status.show{opacity:1;}

</style>
</head>

<body>

<div class="status" id="status">▶ START</div>

<!-- ================= TOP SLIDE ================= -->
<section class="slide top-slide active">

    <div class="header">
        <div class="logo">AZ•KO <span>CITIMALL TUBAN</span></div>
        <div class="title"><h1>TOP PERFORMANCE</h1></div>
        <div id="topTime">-</div>
    </div>

    <div class="main">

        <div class="category">
            <div id="topSales" class="top-podium"></div>
        </div>

        <div class="category">
            <div id="topProteksi" class="top-podium"></div>
        </div>

        <div class="category">
            <div id="topTrx" class="top-podium"></div>
        </div>

    </div>

</section>

<!-- ================= BOTTOM SLIDE ================= -->
<section class="slide bottom-slide">

    <div class="header">
        <div class="logo">AZ•KO <span>CITIMALL TUBAN</span></div>
        <div class="title"><h1>BOTTOM PERFORMANCE</h1></div>
        <div id="bottomTime">-</div>
    </div>

    <div class="main">

        <div id="bottomSales"></div>
        <div id="bottomProteksi"></div>
        <div id="bottomTrx"></div>

    </div>

</section>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

let retryCount = 0;

/* ================= SAFE FETCH ================= */

async function getData(){
    try{
        const res = await fetch(URL);
        const json = await res.json();

        if(!Array.isArray(json)) throw "invalid data";

        retryCount = 0;

        return json.map(r=>({
            name:r["EMPLOYEE NAME"] || "-",
            dept:r["DEPT"] || "-",
            sales:Number(r["SALES MTD"])||0,
            proteksi:Number(r["PROTEKSI"])||0,
            trx:Number(r["TRX"])||0,
            achSales:Number(r["ACH MTD"])||0,
            achProteksi:Number(r["ACH PROTEKSI"])||0,
            achTrx:Number(r["ACH BULANAN"])||0,
            photo:r["PHOTO"] || ""
        }));

    }catch(e){

        console.log("FETCH ERROR",e);

        retryCount++;

        if(retryCount < 3){
            setTimeout(update,3000);
        }

        return [];
    }
}

/* ================= PODIUM ================= */

function card(d,rank,val,ach){

return `
<div class="podium-card rank${rank}">
    <div><b>${rank}</b></div>
    <div>${d.name}</div>
    <div>${val.toLocaleString('id-ID')}</div>

    <div class="ach-circle" style="--val:${Math.min(ach,100)}">
        ${ach.toFixed(1)}%
    </div>
</div>`;
}

/* ================= TABLE ================= */

function row(d,rank,val,ach){

return `
<div class="table-row">
<div>${rank}</div>
<div>${d.name}</div>
<div>${val.toLocaleString('id-ID')}</div>
<div>${ach.toFixed(1)}%</div>
</div>`;
}

/* ================= RENDER ================= */

function renderTop(data,key,achKey,id){

    const sorted = [...data].sort((a,b)=>b[key]-a[key]).slice(0,3);

    document.getElementById(id).innerHTML =
    sorted.map((d,i)=>card(d,i+1,d[key],d[achKey])).join("");
}

function renderBottom(data,key,achKey,id){

    const sorted = [...data].sort((a,b)=>a[key]-b[key]).slice(0,3);

    document.getElementById(id).innerHTML =
    sorted.map((d,i)=>row(d,i+1,d[key],d[achKey])).join("");
}

/* ================= UPDATE ================= */

async function update(){

    const data = await getData();

    if(data.length === 0){
        show("NO DATA");
        return;
    }

    renderTop(data,"sales","achSales","topSales");
    renderTop(data,"proteksi","achProteksi","topProteksi");
    renderTop(data,"trx","achTrx","topTrx");

    renderBottom(data,"sales","achSales","bottomSales");
    renderBottom(data,"proteksi","achProteksi","bottomProteksi");
    renderBottom(data,"trx","achTrx","bottomTrx");

    const now = new Date().toLocaleString("id-ID");
    document.getElementById("topTime").innerText = now;
    document.getElementById("bottomTime").innerText = now;
}

/* ================= SLIDE ================= */

let slide=0;
const slides=document.querySelectorAll(".slide");

setInterval(()=>{

    slides[slide].classList.remove("active");
    slide = (slide+1)%slides.length;
    slides[slide].classList.add("active");

},10000);

/* ================= STATUS ================= */

function show(t){
    const el=document.getElementById("status");
    el.innerText=t;
    el.classList.add("show");
    setTimeout(()=>el.classList.remove("show"),1500);
}

/* ================= START ================= */

window.onload=()=>{
    update();
    setInterval(update,15000);
    show("PLAYING");
};

</script>

</body>
</html>
