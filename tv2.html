<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO PERFORMANCE DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    color:white;
}

/* =========================
SLIDE
========================= */

.slide{
    position:absolute;
    inset:0;
    width:100vw;
    height:100vh;

    opacity:0;
    visibility:hidden;

    transition:opacity .8s ease;

    will-change:opacity;
}

.slide.active{
    opacity:1;
    visibility:visible;
    z-index:2;
}

/* =========================
CATEGORY FIX (IMPORTANT)
========================= */

.category{
    border:1px solid rgba(255,255,255,.08);
    border-radius:26px;
    padding:1vh .8vw 2vh .8vw; /* ✅ extra bottom space */
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(8px);
    position:relative;

    overflow:visible; /* ✅ FIX CLIPPING */
}

/* =========================
TOP PODIUM FIX
========================= */

.top-podium{
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:.8vw;

    padding-bottom:1vh; /* ✅ space bawah */
}

.podium-card{
    position:relative;

    border-radius:24px;

    overflow:visible; /* ✅ IMPORTANT FIX */

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;

    text-align:center;

    padding:1vh .5vw 2vh .5vw; /* ✅ bottom space tambahan */

    border:2px solid rgba(255,255,255,.15);

    background:
        linear-gradient(180deg,
        rgba(255,255,255,.08),
        rgba(0,0,0,.4));

    backdrop-filter:blur(8px);

    box-shadow:0 0 25px rgba(0,0,0,.45);

    opacity:0;
    transform:translateY(20px); /* ✅ lebih stabil dari X */

    animation:slideIn .7s forwards, float 3s ease-in-out infinite;
}

/* =========================
RANK SIZE FIX (NAIK SEDIKIT)
========================= */

.rank2,
.rank3{
    width:28%;
    height:80%; /* naik sedikit */
}

.rank1{
    width:34%;
    height:94%; /* naik sedikit */

    border:2px solid #ffd700;
    box-shadow:0 0 40px rgba(255,215,0,.5);
}

/* =========================
ACH FIX (IMPORTANT)
========================= */

.ach-circle{
    width:4.5vw;
    height:4.5vw;

    min-width:70px;
    min-height:70px;

    border-radius:50%;

    margin-top:1.2vh;
    margin-bottom:1vh; /* ✅ ruang bawah */

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:.9vw;
    font-weight:900;

    background:
        radial-gradient(circle,#111 58%,transparent 59%),
        conic-gradient(
            #32ff6a calc(var(--val) * 1%),
            rgba(255,255,255,.1) 0
        );

    box-shadow:0 0 18px rgba(50,255,106,.35);

    z-index:2;
}

/* =========================
ANIMATION FIX
========================= */

@keyframes slideIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-4px); }
}

/* =========================
REST (TETAP)
========================= */

.header{
    height:16vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1vh 1.5vw;
    position:relative;
}

.logo{
    font-size:3vw;
    font-weight:900;
    color:#ff3131;
}

.logo span{
    display:block;
    font-size:1vw;
    color:white;
}

.title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

.title h1{
    font-size:4.2vw;
    font-weight:900;
}

.main{
    height:72vh;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1vw;
    padding:0 1vw;
}

.bottom-bar{
    height:8vh;
    margin:.5vh 1vw 0;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 1.5vw;
    background:rgba(255,255,255,.05);
}

</style>
</head>

<body>

<!-- STATUS -->
<div class="status" id="status">▶ PLAYING</div>

<!-- SLIDE 1 -->
<section class="slide top-slide active">

    <div class="header">
        <div class="logo">az•ko <span>CITIMALL TUBAN</span></div>

        <div class="title">
            <h1>TOP PERFORMANCE</h1>
            <p>AZKO CITIMALL TUBAN</p>
        </div>

        <div class="update-box">
            <div class="update-label">DATA UPDATE</div>
            <div class="update-time" id="topTime">-</div>
        </div>
    </div>

    <div class="main">

        <div class="category sales">
            <div class="category-title">
                <h2>SALES</h2>
            </div>
            <div class="top-podium" id="topSales"></div>
        </div>

        <div class="category proteksi">
            <div class="top-podium" id="topProteksi"></div>
        </div>

        <div class="category trx">
            <div class="top-podium" id="topTrx"></div>
        </div>

    </div>

    <div class="bottom-bar">
        <div>🏆 TOP PERFORMER HARI INI</div>
    </div>

</section>

<!-- SLIDE 2 -->
<section class="slide bottom-slide">

    <div class="header">
        <div class="logo">az•ko <span>CITIMALL TUBAN</span></div>

        <div class="title">
            <h1>BOTTOM PERFORMANCE</h1>
            <p>AZKO CITIMALL TUBAN</p>
        </div>

        <div class="update-box">
            <div class="update-label">DATA UPDATE</div>
            <div class="update-time" id="bottomTime">-</div>
        </div>
    </div>

    <div class="main">

        <div class="category sales">
            <div class="bottom-table">
                <div id="bottomSales"></div>
            </div>
        </div>

        <div class="category proteksi">
            <div class="bottom-table">
                <div id="bottomProteksi"></div>
            </div>
        </div>

        <div class="category trx">
            <div class="bottom-table">
                <div id="bottomTrx"></div>
            </div>
        </div>

    </div>

</section>

<script>

/* URL tetap */
const URL = "https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

async function getData(){
    const res = await fetch(URL);
    return await res.json();
}

/* render sederhana */
function renderTop(data){
    document.getElementById("topSales").innerHTML = "<div>DATA OK</div>";
    document.getElementById("topProteksi").innerHTML = "<div>DATA OK</div>";
    document.getElementById("topTrx").innerHTML = "<div>DATA OK</div>";
}

function renderBottom(data){
    document.getElementById("bottomSales").innerHTML = "<div>DATA OK</div>";
    document.getElementById("bottomProteksi").innerHTML = "<div>DATA OK</div>";
    document.getElementById("bottomTrx").innerHTML = "<div>DATA OK</div>";
}

async function update(){
    const data = await getData();
    renderTop(data);
    renderBottom(data);
}

window.onload = update;

</script>

</body>
</html>
