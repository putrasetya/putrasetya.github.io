<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO PERFORMANCE DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
}

/* SLIDE */
.slide{
    position:absolute;
    inset:0;
    width:100vw;
    height:100vh;

    opacity:0;
    visibility:hidden;

    transition:opacity .8s ease;

    transform:translate3d(0,0,0);
}

.slide.active{
    opacity:1;
    visibility:visible;
}

/* BACKGROUND */
.top-slide{
    background:
        radial-gradient(circle at top,#0d4cff 0%,transparent 30%),
        linear-gradient(180deg,#020617 0%,#000);
}

/* HEADER */
.header{
    height:16vh;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1vh 1.5vw;
}

.logo{
    font-size:3vw;
    font-weight:900;
    color:#ff3131;
}

.title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

.title h1{
    font-size:4vw;
    font-weight:900;
}

/* MAIN */
.main{
    height:72vh;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1vw;
    padding:0 1vw;
}

/* CATEGORY */
.category{
    background:rgba(255,255,255,.03);
    border-radius:26px;
    padding:1vh .8vw;
}

/* =========================
TOP PODIUM FIX (AMAN + NAIK)
========================= */

.top-podium{
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:.8vw;
    padding-bottom:4vh;
}

.podium-card{
    position:relative;
    border-radius:24px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;

    text-align:center;

    padding:1vh .5vw 2vh;

    background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(0,0,0,.4));
    border:2px solid rgba(255,255,255,.15);

    opacity:0;
    transform:translateX(-40px);

    animation:slideIn .7s forwards, floatY 3s ease-in-out infinite .7s;
}

@keyframes slideIn{
    to{opacity:1; transform:translateX(0);}
}

@keyframes floatY{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

/* SIZE FIX */
.rank1{
    width:34%;
    height:86%;
    border:2px solid gold;
}

.rank2,.rank3{
    width:28%;
    height:72%;
}

/* RANK */
.rank-number{
    position:absolute;
    top:10px;
    left:10px;
    width:2.5vw;
    height:2.5vw;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    background:rgba(0,0,0,.5);
}

.rank1 .rank-number{background:#ffd700;color:#000;}
.rank2 .rank-number{background:#dbe4f0;color:#000;}
.rank3 .rank-number{background:#cd7f32;}

/* PHOTO */
.photo{
    width:100%;
    height:45%;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* TEXT */
.employee-name{
    font-size:.9vw;
    font-weight:900;
}

.employee-dept{
    font-size:.7vw;
    opacity:.8;
}

.score{
    font-size:1.6vw;
    font-weight:900;
    margin-top:1vh;
}

.ach-circle{
    width:4vw;
    height:4vw;
    border-radius:50%;
    margin-top:1vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;

    background:
        radial-gradient(circle,#111 58%,transparent 59%),
        conic-gradient(#32ff6a calc(var(--val)*1%),rgba(255,255,255,.1) 0);
}

/* STATUS */
.status{
    position:fixed;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.6);
    padding:10px 15px;
    border-radius:10px;
    font-size:12px;
}

</style>
</head>

<body>

<div class="status" id="status">LOADING...</div>

<section class="slide top-slide active">

    <div class="header">
        <div class="logo">az•ko</div>
        <div class="title"><h1>TOP PERFORMANCE</h1></div>
    </div>

    <div class="main">

        <div class="category">
            <div class="top-podium" id="topSales"></div>
        </div>

        <div class="category">
            <div class="top-podium" id="topProteksi"></div>
        </div>

        <div class="category">
            <div class="top-podium" id="topTrx"></div>
        </div>

    </div>

</section>

<script>

/* ================= API ================= */
const URL = "https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

/* ================= CLEAN ================= */
function clean(v){
    return parseFloat((v||"0").toString().replace(/[^\d.]/g,''))||0;
}

/* ================= FETCH ================= */
async function getData(){
    try{
        const res = await fetch(URL+"?t="+Date.now(),{cache:"no-store"});
        const json = await res.json();

        return json.map(r=>({
            name:r["EMPLOYEE NAME"]||"-",
            dept:r["DEPT"]||"-",
            sales:clean(r["SALES MTD"]),
            proteksi:clean(r["PROTEKSI"]),
            trx:clean(r["TRX"]),
            achSales:clean(r["ACH MTD"]),
            achProteksi:clean(r["ACH PROTEKSI"]),
            achTrx:clean(r["ACH BULANAN"]),
            photo:r["PHOTO"]||""
        }));

    }catch(e){
        console.log(e);
        return [];
    }
}

/* ================= PODIUM ================= */
function card(d,rank,val,ach,label){
return `
<div class="podium-card rank${rank}">
    <div class="rank-number">${rank}</div>

    <div class="photo">
        <img src="https://drive.google.com/thumbnail?id=${d.photo}&sz=w1000"
        onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=random'">
    </div>

    <div class="employee-name">${d.name}</div>
    <div class="employee-dept">${d.dept}</div>

    <div class="score">${val.toLocaleString('id-ID')}</div>

    <div class="ach-circle" style="--val:${Math.min(ach,100)}">
        ${ach.toFixed(1)}%
    </div>
</div>`;
}

/* ================= RENDER ================= */
function render(data,key,achKey,id){

    const sorted = [...data].sort((a,b)=>b[key]-a[key]).slice(0,3);

    const order = [
        sorted[1]||sorted[0],
        sorted[0],
        sorted[2]||sorted[1]
    ].filter(Boolean);

    document.getElementById(id).innerHTML =
        order.map((d,i)=>card(d,[2,1,3][i],d[key],d[achKey])).join("");
}

/* ================= UPDATE ================= */
async function update(){

    const raw = await getData();

    const data = raw.filter(d=>!d.dept.toLowerCase().includes("cashier"));

    render(data,"sales","achSales","topSales");
    render(data,"proteksi","achProteksi","topProteksi");
    render(data,"trx","achTrx","topTrx");

    document.getElementById("status").innerText =
        "DATA LOADED " + new Date().toLocaleTimeString();
}

/* ================= START ================= */
window.onload = ()=>{
    update();
    setInterval(update,15000);
};

</script>

</body>
</html>
