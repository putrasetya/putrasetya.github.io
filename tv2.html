<!-- =========================
ANTI FLICKER UPDATE
TANPA MENGUBAH SISTEM SEBELUMNYA
========================= -->

<style>

/* =========================
SLIDE SMOOTH
========================= */

.slide{

    width:100vw;
    height:100vh;

    padding:1vh 2vw;

    position:absolute;

    inset:0;

    display:flex;

    flex-direction:column;

    opacity:0;

    visibility:hidden;

    pointer-events:none;

    transform:scale(1.01);

    transition:
        opacity .7s ease,
        transform .7s ease,
        visibility .7s;
}

.slide.active{

    opacity:1;

    visibility:visible;

    pointer-events:auto;

    transform:scale(1);
}

/* =========================
ANTI FLICKER CARD
========================= */

.rank-card{

    animation-fill-mode:forwards;

    will-change:
        transform,
        opacity;

    backface-visibility:hidden;

    transform-style:preserve-3d;
}

</style>

<script>

/* =========================
SLIDE LOOP
========================= */

const slides =
document.querySelectorAll(".slide");

let current = 0;

function nextSlide(){

    slides[current]
        .classList.remove("active");

    current =
    (current + 1) % slides.length;

    slides[current]
        .classList.add("active");
}

/* =========================
ANTI RE-RENDER
========================= */

function safeRender(
    container,
    html
){

    if(
        container.innerHTML.trim()
        !==
        html.trim()
    ){

        container.innerHTML = html;
    }
}

/* =========================
RENDER
========================= */

function render(
    data,
    key,
    achKey,
    achTitle,
    containerId,
    label,
    mode="top"
){

    const container =
    document.getElementById(containerId);

    if(!container) return;

    let filteredData = [...data];

    if(
        containerId === "salesBottom" ||
        containerId === "trxTop"
    ){

        filteredData =
        filteredData.filter(
            item => !isExcluded(item.dept)
        );
    }

    let sorted = [];
    let styles = [];

    if(mode === "top"){

        styles = [
            "gold",
            "silver",
            "bronze"
        ];

        sorted =
        filteredData
            .filter(v => v[key] > 0)
            .sort((a,b)=>b[key]-a[key])
            .slice(0,3);

    }else{

        styles = [
            "red-high",
            "red-mid",
            "red-low"
        ];

        const allSorted =
        filteredData
            .filter(v => v[key] > 0)
            .sort((a,b)=>a[key]-b[key]);

        sorted =
        allSorted.slice(0,3);

        sorted = sorted.map((item,index)=>({

            ...item,

            bottomRank:
            allSorted.length - index
        }));

        sorted.reverse();
    }

    let html = "";

    sorted.forEach((d,i)=>{

        const rank =
        mode === "top"
        ? i + 1
        : d.bottomRank;

        const achStyle =
        getAchStyle(d[achKey]);

        html += `

        <div class="rank-card ${styles[i]}">

            <div class="rank-number">
                ${rank}
            </div>

            <div class="photo-box">

                <img
                    src="https://lh3.googleusercontent.com/d/${d.photo}"

                    loading="lazy"

                    onerror="
                    this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=random&color=fff&size=512'
                    "
                >

            </div>

            <div class="employee">

                <div class="employee-name">
                    ${d.name}
                </div>

                <div class="employee-label">
                    ${d.dept}
                </div>

            </div>

            <div class="score">

                <div class="main-score">

                    <div class="score-value">
                        ${d[key].toLocaleString('id-ID')}
                    </div>

                    <div class="score-label">
                        ${label}
                    </div>

                </div>

                <div class="${achStyle.boxClass}">

                    <div class="ach-title">
                        ${achTitle}
                    </div>

                    <div class="${achStyle.valueClass}">
                        ${d[achKey].toFixed(1)}%
                    </div>

                </div>

            </div>

        </div>
        `;
    });

    safeRender(container,html);
}

/* =========================
AUTO LOOP
========================= */

let isPaused = false;

let slideInterval =
setInterval(nextSlide,7000);

let updateInterval =
setInterval(update,15000);

</script>
