<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO ULTRA TV DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    font-family:'Poppins',sans-serif;

    overflow:hidden;

    color:white;

    cursor:pointer;

    background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
        radial-gradient(circle at top right,#facc15 0%,transparent 25%),
        radial-gradient(circle at bottom,#0f172a 0%,#020617 70%);
}

/* =========================
BACKGROUND FX
========================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.03),
            transparent 35%,
            rgba(255,255,255,.02)
        );

    pointer-events:none;

    z-index:-2;
}

body::after{

    content:"";

    position:fixed;

    width:200%;
    height:200%;

    top:-50%;
    left:-50%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.04),
            transparent
        );

    transform:rotate(25deg);

    pointer-events:none;

    z-index:-1;
}

/* =========================
SLIDES
========================= */

.slide{

    position:absolute;

    inset:0;

    width:100vw;
    height:100vh;

    padding:
        1vh
        2vw
        7vh
        2vw;

    display:flex;

    flex-direction:column;

    opacity:0;

    visibility:hidden;

    pointer-events:none;

    transition:
        opacity .5s linear;
}

.slide.active{

    opacity:1;

    visibility:visible;

    pointer-events:auto;
}

/* =========================
HEADER
========================= */

.header{

    text-align:center;

    margin-bottom:1vh;
}

.header h1{

    font-size:3vw;

    font-weight:900;

    letter-spacing:6px;

    text-transform:uppercase;

    text-shadow:
        0 0 20px rgba(255,255,255,.25);
}

.header p{

    margin-top:.2vh;

    font-size:1vw;

    letter-spacing:4px;

    opacity:.9;
