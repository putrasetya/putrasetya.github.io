<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO ULTRA TV DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    overflow:hidden;

    font-family:'Poppins',sans-serif;

    color:white;

    background:
        radial-gradient(circle at top left,#1d4ed8 0%,transparent 30%),
        radial-gradient(circle at top right,#facc15 0%,transparent 20%),
        radial-gradient(circle at bottom,#020617 0%,#000000 80%);

    position:relative;
}

/* =========================
BG FX
========================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.03),
            transparent 30%,
            rgba(255,255,255,.02)
        );

    pointer-events:none;
}

body::after{

    content:"";

    position:fixed;

    width:220%;
    height:220%;

    top:-60%;
    left:-60%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.03),
            transparent
        );

    animation:bgMove 14s linear infinite;

    transform:rotate(25deg);

    pointer-events:none;
}

@keyframes bgMove{

    from{
        transform:
            translateX(-15%)
            rotate(25deg);
    }

    to{
        transform:
            translateX(15%)
            rotate(25deg);
    }
}

/* =========================
SLIDES
========================= */

.slide{

    position:absolute;

    inset:0;

    padding:
        1.5vh
        1.5vw;

    opacity:0;

    visibility:hidden;

    transition:
        opacity .8s ease,
        visibility .8s ease;
}

.slide.active{

    opacity:1;

    visibility:visible;
}

/* =========================
HEADER
========================= */

.hero{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:1.5vh;
}

.hero h1{

    font-size:3vw;

    font-weight:900;

    letter-spacing:6px;

    text-transform:uppercase;

    line-height:1;
}

.hero p{

    margin-top:.5vh;

    font-size:.9vw;

    letter-spacing:4px;

    opacity:.75;
}

.hero-badge{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    padding:
        .8vh
        1vw;

    border-radius:999px;

    margin-bottom:1vh;

    font-size:.75vw;

    font-weight:800;

    letter-spacing:2px;
}

.top-badge{

    background:
        linear-gradient(
            135deg,
            #facc15,
            #f59e0b
        );

    color:#111827;
}

.bottom-badge{

    background:
        linear-gradient(
            135deg,
            #dc2626,
            #7f1d1d
        );
}

.clock{

    padding:
        1vh
        1.5vw;

    border-radius:20px;

    background:
        rgba(255,255,255,.08);

    backdrop-filter:blur(14px);

    border:
        1px solid rgba(255,255,255,.08);

    font-size:.9vw;

    font-weight:700;
}

/* =========================
GRID
========================= */

.main-grid{

    display:grid;

    grid-template-columns:
        repeat(3,1fr);

    gap:1vw;

    height:85vh;
}

/* =========================
CATEGORY
========================= */

.category-box{

    display:flex;

    flex-direction:column;

    gap:1vh;
}

.category-title{

    display:flex;

    align-items:center;

    justify-content:center;

    height:6vh;

    border-radius:20px;

    font-size:1vw;

    font-weight:900;

    letter-spacing:3px;

    text-transform:uppercase;

    backdrop-filter:blur(10px);

    border:
        1px solid rgba(255,255,255,.08);
}

.sales-title{

    background:
        linear-gradient(
            135deg,
            rgba(59,130,246,.4),
            rgba(37,99,235,.2)
        );
}

.proteksi-title{

    background:
        linear-gradient(
            135deg,
            rgba(168,85,247,.4),
            rgba(126,34,206,.2)
        );
}

.trx-title{

    background:
        linear-gradient(
            135deg,
            rgba(16,185,129,.4),
            rgba(5,150,105,.2)
        );
}

/* =========================
CARD
========================= */

.rank-card{

    position:relative;

    flex:1;

    border-radius:28px;

    overflow:hidden;

    padding:
        1vh
        1vw;

    backdrop-filter:blur(14px);

    border:
        1px solid rgba(255,255,255,.08);

    opacity:0;

    transform:
        translateY(40px)
        scale(.95);
}

.rank-card.show{

    animation:
        cardIn .8s forwards;
}

@keyframes cardIn{

    to{

        opacity:1;

        transform:
            translateY(0)
            scale(1);
    }
}

/* =========================
TOP THEME
========================= */

.gold{

    background:
        linear-gradient(
            160deg,
            rgba(250,204,21,.42),
            rgba(245,158,11,.12)
        );
}

.silver{

    background:
        linear-gradient(
            160deg,
            rgba(203,213,225,.32),
            rgba(148,163,184,.12)
        );
}

.bronze{

    background:
        linear-gradient(
            160deg,
            rgba(194,120,59,.42),
            rgba(120,53,15,.15)
        );
}

/* =========================
BOTTOM THEME
========================= */

.red1{

    background:
        linear-gradient(
            160deg,
            rgba(220,38,38,.4),
            rgba(127,29,29,.25)
        );
}

.red2{

    background:
        linear-gradient(
            160deg,
            rgba(185,28,28,.55),
            rgba(91,15,15,.25)
        );
}

.red3{

    background:
        linear-gradient(
            160deg,
            rgba(127,29,29,.7),
            rgba(50,0,0,.4)
        );
}

/* =========================
RANK
========================= */

.rank-number{

    position:absolute;

    top:-10px;
    left:12px;

    font-size:4vw;

    font-weight:900;

    opacity:.12;
}

/* =========================
PHOTO
========================= */

.photo{

    width:100%;

    height:18vh;

    display:flex;

    justify-content:center;

    align-items:flex-end;
}

.photo img{

    width:100%;
    height:100%;

    object-fit:contain;

    filter:
        drop-shadow(0 10px 15px rgba(0,0,0,.35));
}

/* =========================
INFO
========================= */

.name{

    margin-top:.5vh;

    font-size:1.1vw;

    font-weight:900;

    text-transform:uppercase;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;
}

.dept{

    font-size:.7vw;

    letter-spacing:2px;

    opacity:.75;
}

.score{

    margin-top:1vh;

    font-size:1.8vw;

    font-weight:900;
}

.label{

    font-size:.65vw;

    letter-spacing:2px;

    opacity:.7;
}

/* =========================
ACH
========================= */

.ach-wrap{

    margin-top:1vh;
}

.ach-bar{

    width:100%;

    height:10px;

    border-radius:999px;

    overflow:hidden;

    background:
        rgba(255,255,255,.08);
}

.ach-fill{

    height:100%;
}

.green{

    background:
        linear-gradient(
            90deg,
            #22c55e,
            #4ade80
        );
}

.yellow{

    background:
        linear-gradient(
            90deg,
            #f59e0b,
            #facc15
        );
}

.red{

    background:
        linear-gradient(
            90deg,
            #dc2626,
            #ef4444
        );
}

.ach-text{

    margin-top:.4vh;

    font-size:.7vw;

    font-weight:800;
}

/* =========================
STATUS
========================= */

.status{

    position:fixed;

    top:20px;
    left:20px;

    z-index:9999;

    padding:
        12px
        20px;

    border-radius:20px;

    background:
        rgba(15,23,42,.85);

    border:
        1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    font-size:12px;

    font-weight:800;

    letter-spacing:2px;

    opacity:0;

    transition:.3s;
}

.status.show{

    opacity:1;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    body{
        overflow:auto;
    }

    .slide{
        position:relative;
        height:auto;
    }

    .main-grid{
        grid-template-columns:1fr;
        height:auto;
    }

    .hero{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }

    .hero h1{
        font-size:32px;
    }

    .hero p{
        font-size:11px;
    }

    .hero-badge{
        font-size:10px;
    }

    .clock{
        font-size:12px;
    }

    .category-title{
        font-size:13px;
    }

    .rank-number{
        font-size:60px;
    }

    .name{
        font-size:18px;
    }

    .dept{
        font-size:10px;
    }

    .score{
        font-size:28px;
    }

    .label{
        font-size:10px;
    }

    .ach-text{
        font-size:11px;
    }
}

</style>
</head>

<body>

<div class="status" id="status">
    ▶ PLAYING
</div>

<!-- =========================
TOP SLIDE
========================= -->

<section class="slide active">

    <div class="hero">

        <div>

            <div class="hero-badge top-badge">
                AZKO CITIMALL TUBAN
            </div>

            <h1>TOP PERFORMANCE</h1>

            <p>
                TOP 3 SALES • PROTEKSI • TRX
            </p>

        </div>

        <div class="clock" id="clockTop">
            UPDATE : -
        </div>

    </div>

    <div class="main-grid">

        <div class="category-box">

            <div class="category-title sales-title">
                SALES
            </div>

            <div id="topSales"></div>

        </div>

        <div class="category-box">

            <div class="category-title proteksi-title">
                PROTEKSI
            </div>

            <div id="topProteksi"></div>

        </div>

        <div class="category-box">

            <div class="category-title trx-title">
                TRX
            </div>

            <div id="topTrx"></div>

        </div>

    </div>

</section>

<!-- =========================
BOTTOM SLIDE
========================= -->

<section class="slide">

    <div class="hero">

        <div>

            <div class="hero-badge bottom-badge">
                AZKO CITIMALL TUBAN
            </div>

            <h1>BOTTOM PERFORMANCE</h1>

            <p>
                BOTTOM 3 SALES • PROTEKSI • TRX
            </p>

        </div>

        <div class="clock" id="clockBottom">
            UPDATE : -
        </div>

    </div>

    <div class="main-grid">

        <div class="category-box">

            <div class="category-title sales-title">
                SALES
            </div>

            <div id="bottomSales"></div>

        </div>

        <div class="category-box">

            <div class="category-title proteksi-title">
                PROTEKSI
            </div>

            <div id="bottomProteksi"></div>

        </div>

        <div class="category-box">

            <div class="category-title trx-title">
                TRX
            </div>

            <div id="bottomTrx"></div>

        </div>

    </div>

</section>

<audio
    id="bgm"
    autoplay
    loop
    playsinline>

    <source
        src="https://putrasetya.github.io/223am.mp3"
        type="audio/mpeg">

</audio>

<script>

/* =========================
CONFIG
========================= */

const URL =
"https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

/* =========================
HELPERS
========================= */

function clean(v){

    return parseFloat(
        (v || "0")
        .toString()
        .replace(/[^\d.]/g,'')
    ) || 0;
}

function excluded(dept){

    const d =
    (dept || "")
    .toLowerCase();

    return (
        d.includes("cashier") ||
        d.includes("kasir") ||
        d.includes("cs")
    );
}

function achColor(v){

    if(v >= 100) return "green";

    if(v >= 80) return "yellow";

    return "red";
}

function updateClock(){

    const now =
    new Date().toLocaleString(
        "id-ID",
        {

            day:"2-digit",
            month:"long",
            year:"numeric",
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
        }
    );

    document.getElementById(
        "clockTop"
    ).innerHTML =
    "UPDATE : " + now;

    document.getElementById(
        "clockBottom"
    ).innerHTML =
    "UPDATE : " + now;
}

/* =========================
GET DATA
========================= */

async function getData(){

    try{

        const res =
        await fetch(URL);

        const json =
        await res.json();

        return json.map(r=>({

            name:
                r["EMPLOYEE NAME"] || "UNKNOWN",

            dept:
                r["DEPT"] || "-",

            sales:
                clean(r["SALES MTD"]),

            proteksi:
                clean(r["PROTEKSI"]),

            trx:
                clean(r["TRX"]),

            achSales:
                clean(r["ACH MTD"]),

            achProteksi:
                clean(r["ACH PROTEKSI"]),

            achTrx:
                clean(r["ACH BULANAN"]),

            photo:
                r["PHOTO"] || ""

        }));

    }catch(err){

        console.log(err);

        return [];
    }
}

/* =========================
CARD
========================= */

function card(
    item,
    rank,
    style,
    value,
    label,
    ach
){

    return `

    <div class="rank-card ${style}">

        <div class="rank-number">
            ${rank}
        </div>

        <div class="photo">

            <img

                src="https://lh3.googleusercontent.com/d/${item.photo}"

                loading="lazy"

                onerror="
                this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random&color=fff&size=512'
                "
            >

        </div>

        <div class="name">
            ${item.name}
        </div>

        <div class="dept">
            ${item.dept}
        </div>

        <div class="score">
            ${value.toLocaleString('id-ID')}
        </div>

        <div class="label">
            ${label}
        </div>

        <div class="ach-wrap">

            <div class="ach-bar">

                <div

                    class="ach-fill ${achColor(ach)}"

                    style="
                        width:${Math.min(ach,100)}%;
                    ">
                </div>

            </div>

            <div class="ach-text">
                ACH ${ach.toFixed(1)}%
            </div>

        </div>

    </div>
    `;
}

/* =========================
RENDER CATEGORY
========================= */

function renderCategory(
    data,
    key,
    achKey,
    containerId,
    type
){

    const container =
    document.getElementById(containerId);

    let sorted = [];

    if(type === "top"){

        sorted =
        [...data]
        .sort((a,b)=>b[key]-a[key])
        .slice(0,3);

    }else{

        sorted =
        [...data]
        .sort((a,b)=>a[key]-b[key])
        .slice(0,3);
    }

    const styles =
    type === "top"
    ? ["gold","silver","bronze"]
    : ["red1","red2","red3"];

    let html = "";

    sorted.forEach((item,index)=>{

        html += card(

            item,

            index + 1,

            styles[index],

            item[key],

            key.toUpperCase(),

            item[achKey]
        );
    });

    container.innerHTML = html;
}

/* =========================
ANIMATION
========================= */

function animateCards(){

    document
    .querySelectorAll(".slide.active .rank-card")
    .forEach((card,index)=>{

        card.classList.remove("show");

        void card.offsetWidth;

        setTimeout(()=>{

            card.classList.add("show");

        },index * 80);
    });
}

/* =========================
RENDER
========================= */

async function render(){

    const data =
    await getData();

    updateClock();

    const filtered =
    data.filter(
        d => !excluded(d.dept)
    );

    /* TOP */

    renderCategory(
        filtered,
        "sales",
        "achSales",
        "topSales",
        "top"
    );

    renderCategory(
        filtered,
        "proteksi",
        "achProteksi",
        "topProteksi",
        "top"
    );

    renderCategory(
        filtered,
        "trx",
        "achTrx",
        "topTrx",
        "top"
    );

    /* BOTTOM */

    renderCategory(
        filtered,
        "sales",
        "achSales",
        "bottomSales",
        "bottom"
    );

    renderCategory(
        filtered,
        "proteksi",
        "achProteksi",
        "bottomProteksi",
        "bottom"
    );

    renderCategory(
        filtered,
        "trx",
        "achTrx",
        "bottomTrx",
        "bottom"
    );

    animateCards();
}

/* =========================
SLIDES
========================= */

const slides =
document.querySelectorAll(".slide");

let current = 0;

function nextSlide(){

    slides[current]
    .classList.remove("active");

    current++;

    if(current >= slides.length){

        current = 0;
    }

    slides[current]
    .classList.add("active");

    animateCards();
}

/* =========================
STATUS
========================= */

const statusEl =
document.getElementById("status");

function showStatus(text){

    statusEl.innerHTML = text;

    statusEl.classList.add("show");

    clearTimeout(window.statusTimeout);

    window.statusTimeout =
    setTimeout(()=>{

        statusEl.classList.remove("show");

    },1500);
}

/* =========================
AUDIO
========================= */

const bgm =
document.getElementById("bgm");

if(bgm){

    bgm.volume = 0.4;
}

async function playMusic(){

    try{

        await bgm.play();

    }catch(err){

        console.log(err);
    }
}

/* =========================
LOOP
========================= */

let isPaused = false;

let slideInterval;
let updateInterval;

function stopLoop(){

    clearInterval(slideInterval);

    clearInterval(updateInterval);
}

function startLoop(){

    stopLoop();

    slideInterval =
    setInterval(()=>{

        if(!document.hidden){

            nextSlide();
        }

    },8000);

    updateInterval =
    setInterval(()=>{

        if(!document.hidden){

            render();
        }

    },15000);
}

function togglePause(){

    isPaused = !isPaused;

    if(isPaused){

        stopLoop();

        bgm.pause();

        showStatus("⏸ PAUSED");

    }else{

        startLoop();

        playMusic();

        showStatus("▶ PLAYING");
    }
}

/* =========================
FULLSCREEN
========================= */

async function toggleFullscreen(){

    try{

        if(!document.fullscreenElement){

            await document.documentElement.requestFullscreen();

            showStatus("🖥 FULLSCREEN");

        }else{

            await document.exitFullscreen();

            showStatus("❎ EXIT FULLSCREEN");
        }

    }catch(err){

        console.log(err);
    }
}

/* =========================
CLICK
========================= */

let clickTimer = null;

document.addEventListener(
    "click",
    ()=>{

        if(clickTimer){

            clearTimeout(clickTimer);
        }

        clickTimer = setTimeout(()=>{

            togglePause();

        },250);
    }
);

document.addEventListener(
    "dblclick",
    ()=>{

        clearTimeout(clickTimer);

        toggleFullscreen();
    }
);

/* =========================
START
========================= */

window.addEventListener(
    "load",
    async ()=>{

        await render();

        animateCards();

        startLoop();

        playMusic();

        setTimeout(playMusic,1000);

        setTimeout(playMusic,3000);

        showStatus("▶ PLAYING");
    }
);

</script>

</body>
</html>
