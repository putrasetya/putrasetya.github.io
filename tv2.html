<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO PERFORMANCE DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
}

/* =========================
SLIDE
========================= */

.slide{
    position:absolute;
    inset:0;
    width:100vw;
    height:100vh;

    opacity:0;
    visibility:hidden;

    transition:opacity .8s ease;

    will-change:opacity;
    backface-visibility:hidden;
    transform:translate3d(0,0,0);

    contain:layout paint;
}

.slide.active{
    opacity:1;
    visibility:visible;
    z-index:2;
}

/* =========================
BACKGROUND
========================= */

.top-slide{
    background:
        radial-gradient(circle at top,#0d4cff 0%,transparent 30%),
        linear-gradient(180deg,#020617 0%,#000);
}

.bottom-slide{
    background:
        radial-gradient(circle at top,#ff0000 0%,transparent 30%),
        linear-gradient(180deg,#180000 0%,#000);
}

/* =========================
HEADER
========================= */

.header{
    height:16vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1vh 1.5vw;
    position:relative;
}

.logo{
    font-size:3vw;
    font-weight:900;
    color:#ff3131;
}

.logo span{
    display:block;
    font-size:1vw;
    color:#fff;
}

.title{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

.title h1{
    font-size:4vw;
    font-weight:900;
    letter-spacing:3px;
}

.title p{
    font-size:1vw;
    opacity:.8;
}

/* =========================
MAIN
========================= */

.main{
    height:72vh;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1vw;
    padding:0 1vw;
}

/* =========================
CATEGORY
========================= */

.category{
    border-radius:26px;
    padding:1vh .8vw;
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(8px);
    overflow:hidden;
}

/* =========================
TOP PODIUM FIXED
========================= */

.top-podium{
    height:100%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:.8vw;
    padding-bottom:3.5vh;
}

.podium-card{
    position:relative;
    border-radius:24px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;

    text-align:center;

    padding:1vh .5vw 2vh;

    border:2px solid rgba(255,255,255,.15);

    background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(0,0,0,.4));

    backdrop-filter:blur(8px);

    opacity:0;
    transform:translateX(-40px);

    animation:slideIn .7s forwards, floatY 3s ease-in-out infinite .7s;
}

@keyframes slideIn{
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes floatY{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
}

/* PROPORSI FIX */

.rank1{
    width:34%;
    height:86%;
    border:2px solid gold;
}

.rank2,.rank3{
    width:28%;
    height:72%;
}

.rank1::before{
    content:"👑";
    position:absolute;
    top:-14px;
    font-size:2vw;
}

/* RANK NUMBER */

.rank-number{
    position:absolute;
    top:10px;
    left:10px;
    width:2.5vw;
    height:2.5vw;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    background:rgba(0,0,0,.5);
}

.rank1 .rank-number{ background:#ffd700; color:#000; }
.rank2 .rank-number{ background:#dbe4f0; color:#000; }
.rank3 .rank-number{ background:#cd7f32; }

/* PHOTO */

.photo{
    width:100%;
    height:45%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* TEXT */

.employee-name{
    font-size:.9vw;
    font-weight:900;
}

.employee-dept{
    font-size:.7vw;
    opacity:.8;
}

.score{
    font-size:1.6vw;
    font-weight:900;
    margin-top:1vh;
}

.ach-circle{
    width:4vw;
    height:4vw;
    border-radius:50%;
    margin-top:1vh;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:.85vw;
    font-weight:900;

    background:
        radial-gradient(circle,#111 58%,transparent 59%),
        conic-gradient(#32ff6a calc(var(--val)*1%),rgba(255,255,255,.1) 0);
}

</style>
</head>

<body>

<section class="slide top-slide active">

    <div class="header">

        <div class="logo">
            az•ko
            <span>CITIMALL TUBAN</span>
        </div>

        <div class="title">
            <h1>TOP PERFORMANCE</h1>
            <p>AZKO CITIMALL TUBAN</p>
        </div>

    </div>

    <div class="main">

        <div class="category">
            <div class="top-podium" id="topSales"></div>
        </div>

        <div class="category">
            <div class="top-podium" id="topProteksi"></div>
        </div>

        <div class="category">
            <div class="top-podium" id="topTrx"></div>
        </div>

    </div>

</section>

</body>
</html>
