<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tiket Approval</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#fff;
transition:.3s;
overflow:hidden;
}
.ticket{
position:relative;
width:100%;
max-width:480px;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(10px);
box-shadow:0 25px 60px rgba(0,0,0,.35);
animation:fadeIn .5s ease;
overflow:hidden;
}
.ticket:before,.ticket:after{
content:"";
position:absolute;
width:34px;
height:34px;
border-radius:50%;
background:rgba(255,255,255,.25);
top:50%;
transform:translateY(-50%);
}
.ticket:before{left:-17px}
.ticket:after{right:-17px}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.logo{
width:340px;
max-width:90%;
margin:0 auto 20px;
display:block;
filter:drop-shadow(
0 10px 25px rgba(255,255,255,.35)
);
}

.status-badge{
display:inline-block;
padding:8px 18px;
border-radius:999px;
background:rgba(255,255,255,.18);
border:1px solid rgba(255,255,255,.25);
font-size:13px;
font-weight:700;
margin-bottom:15px;
}

.ticket-icon{
font-size:60px;
margin-bottom:10px;
}

.title{
font-size:28px;
font-weight:700;
text-align:center;
}

.subtitle{
text-align:center;
opacity:.9;
margin-bottom:20px;
}

.approver{
text-align:center;
font-size:30px;
font-weight:700;
letter-spacing:1px;
margin-bottom:10px;
}

.approver-label{
text-align:center;
font-size:12px;
letter-spacing:2px;
opacity:.8;
margin-bottom:5px;
}

.ticket-no{
text-align:center;
font-size:13px;
opacity:.85;
margin-bottom:15px;
}

.line{
height:1px;
background:rgba(255,255,255,.2);
margin:18px 0;
}

.info{
background:rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.info-row{
display:flex;
justify-content:space-between;
gap:10px;
}

.info-label{opacity:.85}
.info-value{font-weight:600;text-align:right}

.footer{
margin-top:20px;
text-align:center;
font-size:13px;
opacity:.9;
}

.countdown{
margin-top:15px;
text-align:center;
font-size:26px;
font-weight:700;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,.15);
}

@media(max-width:600px){
.ticket{padding:22px}
.approver{font-size:24px}
.title{font-size:24px}
}

.ticket::marker{content:''}

.approver{
font-size:36px!important;
text-shadow:0 0 18px rgba(255,255,255,.35);
}
.ticket-no{
background:rgba(255,255,255,.1);
padding:8px 14px;
border-radius:999px;
display:inline-block;
left:50%;
position:relative;
transform:translateX(-50%);
}
.countdown{
border:1px solid rgba(255,255,255,.15);
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

#qrcode{
display:flex;
justify-content:center;
margin-bottom:20px;
}

#qrcode canvas,
#qrcode img{
background:white;
padding:10px;
border-radius:16px;
box-shadow:
0 10px 30px rgba(0,0,0,.2);
}
</style>
</head>
<body>

<div class="ticket">
<img src="azkocitimalltuban.png" class="logo" alt="Logo">

<div id="qrcode"></div>

<div class="approver-label">APPROVED BY</div>
<div class="approver" id="approver">-</div>

<div class="ticket-no" id="ticketNo"></div>

<div class="line"></div>

<div class="info">
<div class="info-row"><div class="info-label">Nama User</div><div class="info-value" id="userNama"></div></div>
<div class="info-row"><div class="info-label">NIK User</div><div class="info-value" id="userNik"></div></div>
<div class="info-row"><div class="info-label">Tanggal</div><div class="info-value" id="tanggal"></div></div>
<div class="info-row"><div class="info-label">Jam</div><div class="info-value" id="jam"></div></div></div>

<div class="line"></div>

<div class="footer">
Tunjukan tiket ini ke LP sebagai bukti approval.
</div>

<div class="countdown" id="countdown">01:00:00</div>

</div>

<script>
const ticket = JSON.parse(sessionStorage.getItem("ticketData"));

if(!ticket){
window.location.href="login.html";
}

document.getElementById("ticketNo").innerText =
"TKT-" + Date.now().toString().slice(-8);

if(ticket.warna==="green"){
document.body.style.background="linear-gradient(135deg,#22c55e,#15803d)";
document.getElementById("ticketIcon").innerHTML="🟢";
}

if(ticket.warna==="yellow"){
document.body.style.background="linear-gradient(135deg,#eab308,#ca8a04)";
document.getElementById("ticketIcon").innerHTML="🟡";
}

if(ticket.warna==="red"){
document.body.style.background="linear-gradient(135deg,#ef4444,#b91c1c)";
document.getElementById("ticketIcon").innerHTML="🔴";
}

document.getElementById("approver").innerText=ticket.approver || "-";
document.getElementById("userNama").innerText=ticket.userNama || "-";
document.getElementById("userNik").innerText=ticket.userNik || "-";
document.getElementById("tanggal").innerText=ticket.tanggal || "-";
document.getElementById("jam").innerText=ticket.jam || "-";

const qrData = JSON.stringify({

nikUser: ticket.userNik,
namaUser: ticket.userNama,

approver: ticket.approver,

tanggal: ticket.tanggal,
jam: ticket.jam,

warna: ticket.warna,

expired:
new Date(
Date.now() + 3600000
).toISOString()

});

new QRCode(
document.getElementById("qrcode"),
{
text: qrData,
width: 180,
height: 180
}
);

const cd =
document.getElementById("countdown");

let expireTime =
localStorage.getItem(
"ticketExpireTime"
);

if(!expireTime){

expireTime =
Date.now() + (3600 * 1000);

localStorage.setItem(
"ticketExpireTime",
expireTime
);

}

function updateCountdown(){

const remaining =
Math.max(
0,
Math.floor(
(Number(expireTime) - Date.now()) / 1000
)
);

const h =
Math.floor(remaining / 3600);

const m =
Math.floor(
(remaining % 3600) / 60
);

const sec =
remaining % 60;

cd.innerText =
String(h).padStart(2,"0")
+ ":" +
String(m).padStart(2,"0")
+ ":" +
String(sec).padStart(2,"0");

if(remaining <= 0){

localStorage.removeItem(
"ticketExpireTime"
);

window.location.href =
"reportsalesid.html";

}

}

updateCountdown();

setInterval(
updateCountdown,
1000
);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
