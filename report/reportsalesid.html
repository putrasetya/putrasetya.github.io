<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Sales ID</title>

<style>
body{
margin:0;
padding:0;
background:#0f172a;
height:100vh;
overflow:hidden;
font-family:Poppins,sans-serif;
}

/* HEADER LOCKED */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:12px 16px;
background:rgba(15,23,42,0.85);
backdrop-filter:blur(6px);
color:#fff;
font-size:14px;
font-weight:600;
z-index:10;
display:flex;
justify-content:space-between;
align-items:center;
}

/* FULL SCREEN IMAGE */
.container{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container img{
width:100%;
height:100%;
object-fit:contain; /* tidak stretch */
}

/* safety spacing biar tidak ketutup header */
.spacer{
height:50px;
}
</style>
</head>

<body>

<!-- LOCK HEADER -->
<div class="topbar">
<div id="nama">Nama: -</div>
<div id="nik">NIK: -</div>
</div>

<div class="spacer"></div>

<!-- IMAGE -->
<div class="container">
<img src="salesidtemplate.png" alt="Report Sales ID">
</div>

<script>

/* CHECK LOGIN */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href = "login.html";
}

/* FILL DATA */
document.getElementById("nama").innerText = "Nama: " + user.nama;
document.getElementById("nik").innerText = "NIK: " + user.nik;

</script>

</body>
</html>
