<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Control Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

/* CARD */
.card{
width:100%;
max-width:950px;
background:#fff;
border-radius:24px;
padding:25px;
box-shadow:
0 10px 30px rgba(0,0,0,.08),
0 2px 10px rgba(0,0,0,.05);
}

h2{
text-align:center;
margin-bottom:10px;
font-size:28px;
font-weight:700;
color:#0f172a;
letter-spacing:.5px;
}

/* INFO */
.info{
display:flex;
flex-direction:column;
gap:8px;
text-align:left;
font-size:14px;
margin-bottom:20px;
padding:16px 18px;
background:#f8fafc;
border-radius:14px;
color:#334155;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.info div{
font-weight:500;
}

.info span{
font-weight:700;
color:#0f172a;
}

/* PALETTE */
.palette{
display:flex;
justify-content:center;
gap:15px;
margin:15px 0;
}

.circle{
width:48px;
height:48px;
border-radius:50%;
cursor:pointer;
transition:.2s;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.circle:hover{
transform:scale(1.08);
}

.green{background:#22c55e;}
.yellow{background:#eab308;}
.red{background:#ef4444;}

.circle.active{
transform:scale(1.15);
border:4px solid #fff;
box-shadow:
0 0 0 3px #0f172a,
0 0 20px rgba(0,0,0,.25);
}

/* GRID */
.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-bottom:10px;
}

.weekdays div{
text-align:center;
font-size:13px;
font-weight:700;
color:#64748b;
padding:8px 0;
background:#f8fafc;
border-radius:10px;
}
   
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

/* CELL */
.day{
height:60px;
background:#f8fafc;
border:none;
border-radius:14px;
position:relative;
overflow:hidden;
box-shadow:
0 2px 8px rgba(0,0,0,.06);
transition:.2s;
}
.day:hover{
transform:translateY(-2px);
box-shadow:
0 8px 18px rgba(0,0,0,.12);
}

/* DATE */
.date{
position:absolute;
top:6px;
left:8px;
font-size:12px;
font-weight:600;
color:#475569;
}

/* BADGE */
.badge-container{
position:absolute;
bottom:5px;
right:5px;
}

.badge{
width:22px;
height:22px;
border-radius:50%;
box-shadow:
0 4px 10px rgba(0,0,0,.2);
}

.badge.green{background:#22c55e;}
.badge.yellow{background:#eab308;}
.badge.red{background:#ef4444;}

.circle{
touch-action:none;
user-select:none;
-webkit-user-select:none;
}

.drag-ghost{
pointer-events:none;
}

/* RESPONSIVE */
@media(max-width:600px){
.day{height:40px;}
}
</style>
</head>

<body>

<div class="card">

<h2>SALES CONTROL DAILY</h2>

<div class="info">
<div id="nik">NIK: -</div>
<div id="nama">Nama: -</div>
<div id="periode">Periode: -</div>
</div>

<!-- PALETTE -->
<div class="palette">
<div class="circle green" data-color="green"></div>
<div class="circle yellow" data-color="yellow"></div>
<div class="circle red" data-color="red"></div>
</div>

<!-- GRID -->
<div class="weekdays">
<div>Sen</div>
<div>Sel</div>
<div>Rab</div>
<div>Kam</div>
<div>Jum</div>
<div>Sab</div>
<div>Min</div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

/* =========================
   SESSION LOGIN (TETAP)
========================= */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="login.html";
}

document.getElementById("nik").innerHTML =
"NIK : <span>" + user.nik + "</span>";

document.getElementById("nama").innerHTML =
"Nama : <span>" + user.nama + "</span>";

/* =========================
   PERIODE INDONESIA
========================= */
const bulanID = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

const now = new Date();

const periode =
bulanID[now.getMonth()] +
" " +
now.getFullYear();
  

document.getElementById("periode").innerHTML =
"Periode : <span>" + periode + "</span>";

/* =========================
   GRID
========================= */

const grid =
document.getElementById("grid");

/* HARI PERTAMA BULAN */
const firstDay =
new Date(
now.getFullYear(),
now.getMonth(),
1
);

/* UBAH MINGGU DIMULAI SENIN */
let startDay =
firstDay.getDay();

startDay =
startDay === 0 ? 6 : startDay - 1;

/* KOTAK KOSONG */
for(let i=0;i<startDay;i++){

const empty =
document.createElement("div");

empty.style.visibility="hidden";

grid.appendChild(empty);

}

/* JUMLAH HARI BULAN */
const totalDays =
new Date(
now.getFullYear(),
now.getMonth()+1,
0
).getDate();

/* BUAT TANGGAL */
for(let i=1;i<=totalDays;i++){

const div =
document.createElement("div");

div.className="day";

div.dataset.day=i;

div.innerHTML=`
<span class="date">${i}</span>
<div class="badge-container"></div>
`;

grid.appendChild(div);

}

/* =========================
   SELECT COLOR
========================= */

let selectedColor = null;

document.querySelectorAll(".circle").forEach(circle=>{

circle.addEventListener("click",()=>{

selectedColor =
circle.dataset.color;

document
.querySelectorAll(".circle")
.forEach(c=>c.classList.remove("active"));

circle.classList.add("active");

});

});

/* =========================
   TABLET GHOST DRAG
========================= */

let ghost = null;
let dragColor = null;

document.querySelectorAll(".circle").forEach(circle=>{

circle.addEventListener("touchstart",function(e){

const touch = e.touches[0];

dragColor =
this.dataset.color;

ghost =
document.createElement("div");

ghost.className =
"drag-ghost " + dragColor;

ghost.style.position = "fixed";
ghost.style.width = "40px";
ghost.style.height = "40px";
ghost.style.borderRadius = "50%";
ghost.style.pointerEvents = "none";
ghost.style.zIndex = "99999";
ghost.style.left =
touch.clientX + "px";
ghost.style.top =
touch.clientY + "px";
ghost.style.transform =
"translate(-50%,-50%)";
ghost.style.boxShadow =
"0 5px 15px rgba(0,0,0,.3)";

if(dragColor==="green")
ghost.style.background="#22c55e";

if(dragColor==="yellow")
ghost.style.background="#eab308";

if(dragColor==="red")
ghost.style.background="#ef4444";

document.body.appendChild(ghost);

},{passive:false});

});

document.addEventListener(
"touchmove",
function(e){

if(!ghost) return;

const touch = e.touches[0];

ghost.style.left =
touch.clientX + "px";

ghost.style.top =
touch.clientY + "px";

e.preventDefault();

},
{passive:false}
);

document.addEventListener(
"touchend",
function(e){

if(!ghost || !dragColor)
return;

const touch =
e.changedTouches[0];

const target =
document.elementFromPoint(
touch.clientX,
touch.clientY
);

const day =
target?.closest(".day");


if(day && dragColor){

setBadge(
day,
dragColor
);

selectedColor = dragColor;

}
ghost.remove();

ghost = null;
dragColor = null;

}
);

/* =========================
   SET BADGE
========================= */

function setBadge(day,color){

const container =
day.querySelector(
".badge-container"
);

container.innerHTML = "";

const badge =
document.createElement("div");

badge.className =
"badge " + color;

container.appendChild(
badge
);

sendToSheet(
day.dataset.day,
color
);

}

/* ============================
FUNCTION LOAD DATA CARD UNTUK DITAMPILKAN DI USER
=============================== */

async function loadSavedData(){

const url =
"https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec"
+ "?action=getUserMonthData"
+ "&nik=" + encodeURIComponent(user.nik)
+ "&periode=" + encodeURIComponent(periode);

try{

const res = await fetch(url);

const data = await res.json();

if(!data.days) return;

Object.entries(data.days)
.forEach(([day,color])=>{

const cell =
document.querySelector(
`.day[data-day="${day}"]`
);

if(cell){

const container =
cell.querySelector(
".badge-container"
);

container.innerHTML =
`<div class="badge ${color}"></div>`;

}

});

}catch(err){

console.error(err);

}

}

/* =========================
   SEND TO SHEET
========================= */

function sendToSheet(day, color){

console.log("USER =", user);

const url =
"https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec"
+ "?action=saveRealtime"
+ "&nik=" + encodeURIComponent(user.nik)
+ "&nama=" + encodeURIComponent(user.nama)
+ "&bulan=" + encodeURIComponent(periode)
+ "&day=" + day
+ "&color=" + color;

console.log(url);

fetch(url)
.then(r=>r.json())
.then(data=>{
console.log("RESPONSE =", data);
});
}

loadSavedData();
   </script>

</body>
</html>
