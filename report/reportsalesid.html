<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Sales ID</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins,sans-serif;
background:#f5f7fb;
padding:20px;
}

.card{
background:#fff;
max-width:700px;
margin:auto;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.user-box{
background:#eef2ff;
padding:10px 15px;
border-radius:12px;
font-size:14px;
}

h2{
margin:0;
}

input, button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

button{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#1e40af;
}

.back{
background:#ef4444;
margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<!-- HEADER USER -->
<div class="header">
<h2>Report Sales ID</h2>
<div class="user-box" id="userBox">Loading...</div>
</div>

<!-- FORM -->
<input type="text" id="article" placeholder="Input Article">
<input type="number" id="qty" placeholder="Input Qty">

<button onclick="sendData()">Kirim</button>

<button class="back" onclick="back()">Kembali</button>

</div>

<script>

/* =========================
   LOAD SESSION USER
========================= */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href = "login.html";
}

document.getElementById("userBox").innerHTML =
`NIK: ${user.nik}<br>Nama: ${user.nama}`;

/* =========================
   BACK TO DASHBOARD
========================= */
function back(){
window.location.href = "staf.html";
}

/* =========================
   KIRIM DATA (SIAP APPS SCRIPT)
========================= */
function sendData(){

const article = document.getElementById("article").value;
const qty = document.getElementById("qty").value;

if(!article || !qty){
alert("Lengkapi data!");
return;
}

/* payload */
const payload = {
nik: user.nik,
nama: user.nama,
article: article,
qty: qty,
timestamp: new Date().toISOString()
};

/* GANTI LINK INI DENGAN APPS SCRIPT KAMU */
fetch("https://script.google.com/macros/s/YOUR_SCRIPT_URL/exec", {
method: "POST",
body: JSON.stringify(payload),
headers: {
"Content-Type": "application/json"
}
})
.then(res => res.json())
.then(res => {
alert("Data berhasil dikirim!");
document.getElementById("article").value = "";
document.getElementById("qty").value = "";
})
.catch(err => {
console.error(err);
alert("Gagal kirim data!");
});

}

</script>

</body>
</html>
