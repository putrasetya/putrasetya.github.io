<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Control Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

/* CARD */
.card{
width:100%;
max-width:900px;
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{
text-align:center;
margin-bottom:10px;
}

/* INFO */
.info{
display:flex;
flex-direction:column;
gap:5px;
text-align:center;
font-size:14px;
margin-bottom:15px;
color:#333;
}

/* PALETTE */
.palette{
display:flex;
justify-content:center;
gap:15px;
margin:15px 0;
}

.circle{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.green{background:#22c55e;}
.yellow{background:#eab308;}
.red{background:#ef4444;}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

/* CELL */
.day{
height:50px;
border:1px solid #ddd;
border-radius:10px;
background:#fafafa;
position:relative;
overflow:hidden;
}

/* DATE */
.date{
position:absolute;
top:5px;
left:6px;
font-size:11px;
color:#666;
}

/* BADGE */
.badge-container{
position:absolute;
bottom:5px;
right:5px;
}

.badge{
width:18px;
height:18px;
border-radius:50%;
box-shadow:0 3px 8px rgba(0,0,0,.2);
}

.badge.green{background:#22c55e;}
.badge.yellow{background:#eab308;}
.badge.red{background:#ef4444;}

/* RESPONSIVE */
@media(max-width:600px){
.day{height:40px;}
}
</style>
</head>

<body>

<div class="card">

<h2>SALES CONTROL DAILY</h2>

<div class="info">
<div id="nik">NIK: -</div>
<div id="nama">Nama: -</div>
<div id="periode">Periode: -</div>
</div>

<!-- PALETTE -->
<div class="palette">
<div class="circle green" draggable="true" data-color="green"></div>
<div class="circle yellow" draggable="true" data-color="yellow"></div>
<div class="circle red" draggable="true" data-color="red"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

</div>

<script>

/* =========================
   SESSION LOGIN (TETAP)
========================= */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="login.html";
}

document.getElementById("nik").innerText = "NIK: " + user.nik;
document.getElementById("nama").innerText = "Nama: " + user.nama;

/* =========================
   PERIODE INDONESIA
========================= */
const bulanID = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

const now = new Date();
const periode = `${bulanID[now.getMonth()]} ${now.getFullYear()}`;

document.getElementById("periode").innerText = "Periode: " + periode;

/* =========================
   STATE FALLBACK (PENTING)
========================= */
window.selectedColor = null;

/* =========================
   PALETTE SELECT (MOBILE + PC)
========================= */
document.querySelectorAll(".circle").forEach(item=>{

item.addEventListener("click", ()=>{
window.selectedColor = item.dataset.color;
});

item.addEventListener("dragstart", e=>{
e.dataTransfer.setData("color", item.dataset.color);
window.selectedColor = item.dataset.color;
});

});

/* =========================
   CREATE GRID
========================= */
const grid = document.getElementById("grid");

for(let i=1;i<=31;i++){

const div = document.createElement("div");
div.className = "day";
div.dataset.day = i;

div.innerHTML = `
<span class="date">${i}</span>
<div class="badge-container"></div>
`;

/* DRAG OVER */
div.addEventListener("dragover", e=>{
e.preventDefault();
});

/* DROP */
div.addEventListener("drop", e=>{
e.preventDefault();

/* AMBIL DARI DRAG ATAU CLICK */
let color = e.dataTransfer.getData("color") || window.selectedColor;

color = (color || "").trim().toLowerCase();

if(!color){
console.log("COLOR EMPTY");
return;
}

const container = div.querySelector(".badge-container");
container.innerHTML = "";

const badge = document.createElement("div");
badge.className = "badge " + color;

container.appendChild(badge);

/* SEND */
sendToSheet(i, color);
});

grid.appendChild(div);
}

/* =========================
   SEND TO SHEET
========================= */

function sendToSheet(day, color){

fetch(
"https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec"
+ "?action=saveRealtime"
+ "&nik=" + encodeURIComponent(user.nik)
+ "&nama=" + encodeURIComponent(user.nama)
+ "&bulan=" + encodeURIComponent(periode)
+ "&day=" + day
+ "&color=" + color
)
.then(res=>res.json())
.then(res=>{
console.log("SAVED:", res);
})
.catch(err=>{
console.log(err);
});

}

</script>

</body>
</html>
