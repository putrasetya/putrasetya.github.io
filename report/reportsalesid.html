<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Control Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

/* CARD */
.card{
width:100%;
max-width:900px;
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* TITLE */
h2{
text-align:center;
margin-bottom:10px;
}

/* INFO USER */
.info{
display:flex;
flex-direction:column;
gap:5px;
text-align:center;
font-size:14px;
margin-bottom:15px;
color:#333;
}

/* PALETTE */
.palette{
display:flex;
justify-content:center;
gap:15px;
margin:15px 0;
}

.circle{
width:40px;
height:40px;
border-radius:50%;
cursor:grab;
}

.green{background:#22c55e;}
.yellow{background:#eab308;}
.red{background:#ef4444;}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-top:10px;
}

/* CELL */
.day{
height:50px;
border:1px solid #ddd;
border-radius:10px;
background:#fafafa;
position:relative;
overflow:hidden;
}

/* DATE NUMBER */
.date{
position:absolute;
top:5px;
left:6px;
font-size:11px;
color:#666;
}

/* BADGE POSITION */
.badge-container{
position:absolute;
bottom:5px;
right:5px;
}

/* BADGE */
.badge{
width:18px;
height:18px;
border-radius:50%;
box-shadow:0 3px 8px rgba(0,0,0,.2);
}

.badge.green{background:#22c55e;}
.badge.yellow{background:#eab308;}
.badge.red{background:#ef4444;}

/* RESPONSIVE */
@media(max-width:600px){
.day{height:40px;}
}
</style>
</head>

<body>

<div class="card">

<h2>SALES CONTROL DAILY</h2>

<div class="info">
<div id="nik">NIK: -</div>
<div id="nama">Nama: -</div>
<div id="periode">Periode: -</div>
</div>

<!-- PALETTE -->
<div class="palette">
<div class="circle green" draggable="true" data-color="green"></div>
<div class="circle yellow" draggable="true" data-color="yellow"></div>
<div class="circle red" draggable="true" data-color="red"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

</div>

<script>

/* =========================
   SESSION LOGIN (TETAP)
========================= */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="login.html";
}

document.getElementById("nik").innerText = "NIK: " + user.nik;
document.getElementById("nama").innerText = "Nama: " + user.nama;

/* =========================
   PERIODE INDONESIA
========================= */
const bulanID = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

const now = new Date();
const periode = `${bulanID[now.getMonth()]} ${now.getFullYear()}`;

document.getElementById("periode").innerText = "Periode: " + periode;

/* =========================
   CREATE GRID 1-31
========================= */
const grid = document.getElementById("grid");

for(let i=1;i<=31;i++){

const div = document.createElement("div");
div.className = "day";
div.dataset.day = i;

/* struktur stabil */
div.innerHTML = `
<span class="date">${i}</span>
<div class="badge-container"></div>
`;

/* drag over wajib */
div.addEventListener("dragover", e=>{
e.preventDefault();
});

/* drop event FIX */
div.addEventListener("drop", e=>{
e.preventDefault();

const color = e.dataTransfer.getData("color");
const day = div.dataset.day;

/* target container */
const container = div.querySelector(".badge-container");

/* reset isi lama */
container.innerHTML = "";

/* buat badge */
const badge = document.createElement("div");
badge.className = "badge " + color;

/* nempel */
container.appendChild(badge);

/* kirim ke sheet */
sendToSheet(day, color);
});

grid.appendChild(div);
}

/* =========================
   DRAG START
========================= */
document.querySelectorAll(".circle").forEach(item=>{
item.addEventListener("dragstart", e=>{
e.dataTransfer.setData("color", item.dataset.color);
});
});

/* =========================
   SEND TO SHEET
========================= */
function sendToSheet(day, color){

fetch("https://script.google.com/macros/s/YOUR_SCRIPT_URL/exec?action=saveRealtime",{
method:"POST",
body:JSON.stringify({
nik:user.nik,
bulan:periode,
day:day,
color:color
}),
headers:{
"Content-Type":"application/json"
}
})
.then(res=>res.json())
.then(res=>{
console.log("saved",res);
})
.catch(err=>{
console.log(err);
});

}

</script>

</body>
</html>
