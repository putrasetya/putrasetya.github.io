<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Sales ID</title>

<style>
body{
margin:0;
padding:0;
background:#0f172a;
height:100vh;
overflow:hidden;
font-family:Poppins,sans-serif;
}

/* HEADER LOCKED */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
padding:12px 16px;
background:rgba(15,23,42,0.85);
backdrop-filter:blur(6px);
color:#fff;
font-size:14px;
font-weight:600;
z-index:10;
display:flex;
justify-content:space-between;
align-items:center;
}

/* FULL SCREEN IMAGE */
.container{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container img{
width:100%;
height:100%;
object-fit:contain;
}
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
color:black;
}
  #nama{
position:absolute;
top:280px;
left:100px;
}

#nik{
position:absolute;
top:70px;
right:20px;
}
</style>
</head>

<body>

<!-- LOCK HEADER (tanpa label) -->
<div class="topbar">
<div id="nama"></div>
<div id="nik"></div>
</div>

<!-- IMAGE -->
<div class="container">
<img src="salesidtemplate.png" alt="Report Sales ID">
</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href = "login.html";
}

/* tampilkan langsung tanpa teks tambahan */
document.getElementById("nama").innerText = user.nama;
document.getElementById("nik").innerText = user.nik;

</script>

</body>
</html>
