<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Control Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

/* CARD */
.card{
width:100%;
max-width:950px;
background:#fff;
border-radius:24px;
padding:25px;
box-shadow:
0 10px 30px rgba(0,0,0,.08),
0 2px 10px rgba(0,0,0,.05);
}

h2{
text-align:center;
margin-bottom:10px;
font-size:28px;
font-weight:700;
color:#0f172a;
letter-spacing:.5px;
}

/* INFO */
.info{
display:flex;
flex-direction:column;
gap:8px;
text-align:left;
font-size:14px;
margin-bottom:20px;
padding:16px 18px;
background:#f8fafc;
border-radius:14px;
color:#334155;
box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.info div{
font-weight:500;
}

.info span{
font-weight:700;
color:#0f172a;
}

/* PALETTE */
.palette{
display:flex;
justify-content:center;
gap:15px;
margin:15px 0;
}
.color-item{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.color-label{
font-size:12px;
font-weight:600;
color:#475569;
text-align:center;
min-height:32px;
display:flex;
align-items:center;
justify-content:center;
}
.color-item:nth-child(1) .color-label{
color:#16a34a;
}

.color-item:nth-child(2) .color-label{
color:#ca8a04;
}

.color-item:nth-child(3) .color-label{
color:#dc2626;
}


.circle{
width:48px;
height:48px;
border-radius:50%;
cursor:pointer;
transition:.2s;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.circle:hover{
transform:scale(1.08);
}

.green{background:#22c55e;}
.yellow{background:#eab308;}
.red{background:#ef4444;}

.circle.active{
transform:scale(1.15);
border:4px solid #fff;
}
.circle.green.active{
box-shadow:
0 0 0 3px #22c55e,
0 0 20px rgba(34,197,94,.7);
}

.circle.yellow.active{
box-shadow:
0 0 0 3px #eab308,
0 0 20px rgba(234,179,8,.7);
}

.circle.red.active{
box-shadow:
0 0 0 3px #ef4444,
0 0 20px rgba(239,68,68,.7);
}

/* GRID */
.weekdays{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-bottom:10px;
}

.weekdays div{
text-align:center;
font-size:13px;
font-weight:700;
color:#64748b;
padding:8px 0;
background:#f8fafc;
border-radius:10px;
}
   
.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

/* CELL */
.day{
height:60px;
background:#f8fafc;
border:none;
border-radius:14px;
position:relative;
overflow:hidden;
box-shadow:
0 2px 8px rgba(0,0,0,.06);
transition:.2s;
}
.day:hover{
transform:translateY(-2px);
box-shadow:
0 8px 18px rgba(0,0,0,.12);
}

/* DATE */
.date{
position:absolute;
top:6px;
left:8px;
font-size:12px;
font-weight:600;
color:#475569;
}

/* BADGE */
.badge-container{
position:absolute;
bottom:5px;
right:5px;
}

.badge{
width:22px;
height:22px;
border-radius:50%;
box-shadow:
0 4px 10px rgba(0,0,0,.2);
}

.badge.green{background:#22c55e;}
.badge.yellow{background:#eab308;}
.badge.red{background:#ef4444;}

.circle{
touch-action:none;
user-select:none;
-webkit-user-select:none;
}

.drag-ghost{
pointer-events:none;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:99999;
}

.modal.show{
display:flex;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:16px;
width:90%;
max-width:320px;
}

.modal-box h3{
margin:0 0 15px;
text-align:center;
color:#0f172a;
}

.modal-box input{
width:100%;
padding:12px;
border:1px solid #cbd5e1;
border-radius:10px;
box-sizing:border-box;
margin-bottom:15px;
}

.pin-display{
height:55px;
border:1px solid #cbd5e1;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
letter-spacing:8px;
font-weight:700;
margin-bottom:15px;
background:#f8fafc;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:15px;
}

.key{
height:55px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:700;
background:#f1f5f9;
cursor:pointer;
}

.key:active{
transform:scale(.96);
}

.key-clear{
background:#ef4444;
color:white;
}

.key-back{
background:#64748b;
color:white;
}

.modal-actions{
display:flex;
gap:10px;
}

.modal-actions button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn-cancel{
background:#cbd5e1;
}

.btn-approve{
background:#22c55e;
color:#fff;
}

.disabled-day{
  pointer-events: none;
}

.today{
border:3px solid #2563eb;
box-shadow:
0 0 0 2px rgba(37,99,235,.20);
}

.today .date{
color:#2563eb;
font-weight:700;
font-size:14px;
}
   
/* RESPONSIVE */
@media(max-width:600px){
.day{height:40px;}
}
</style>
</head>

<body>

<div class="card">

<h2>SALES CONTROL DAILY</h2>

<div class="info">
<div id="nik">NIK: -</div>
<div id="nama">Nama: -</div>
<div id="periode">Periode: -</div>
</div>

<!-- PALETTE -->
<div class="palette">

<div class="color-item">
<div class="color-label">≥ 95%</div>
<div class="circle green" data-color="green"></div>
</div>

<div class="color-item">
<div class="color-label">94,99% - 85%</div>
<div class="circle yellow" data-color="yellow"></div>
</div>

<div class="color-item">
<div class="color-label">&lt; 85%</div>
<div class="circle red" data-color="red"></div>
</div>

</div>

<!-- GRID -->
<div class="weekdays">
<div>Sen</div>
<div>Sel</div>
<div>Rab</div>
<div>Kam</div>
<div>Jum</div>
<div>Sab</div>
<div>Min</div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

/* =========================
   SESSION LOGIN (TETAP)
========================= */
const API_URL =
"https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec";

const user = JSON.parse(localStorage.getItem("user"));
   
if(!user){
window.location.href="login.html";
}

document.getElementById("nik").innerHTML =
"NIK : <span>" + user.nik + "</span>";

document.getElementById("nama").innerHTML =
"Nama : <span>" + user.nama + "</span>";

/* =========================
   PERIODE INDONESIA
========================= */
const bulanID = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

const now = new Date();

const periode =
bulanID[now.getMonth()] +
" " +
now.getFullYear();
  

document.getElementById("periode").innerHTML =
"Periode : <span>" + periode + "</span>";

/* =========================
   GRID
========================= */

const grid =
document.getElementById("grid");

/* HARI PERTAMA BULAN */
const firstDay =
new Date(
now.getFullYear(),
now.getMonth(),
1
);

/* UBAH MINGGU DIMULAI SENIN */
let startDay =
firstDay.getDay();

startDay =
startDay === 0 ? 6 : startDay - 1;

/* KOTAK KOSONG */
for(let i=0;i<startDay;i++){

const empty =
document.createElement("div");

empty.style.visibility="hidden";

grid.appendChild(empty);

}

/* JUMLAH HARI BULAN */
const totalDays =
new Date(
now.getFullYear(),
now.getMonth()+1,
0
).getDate();

/* HARI INI */
const todayDate = now.getDate();

/* BUAT TANGGAL */
for(let i=1;i<=totalDays;i++){

const div =
document.createElement("div");

div.className = "day";
div.dataset.day = i;

/* CHECK HARI INI */
const isToday = (i === todayDate);

if(isToday){
  div.classList.add("today");
}else{
  div.classList.add("disabled-day");
}

div.innerHTML = `
<span class="date">${i}</span>
<div class="badge-container"></div>
`;

grid.appendChild(div);
}


/* =========================
   SELECT COLOR
========================= */

let selectedColor = null;
let pendingDay = null;
let pendingColor = null;

document.querySelectorAll(".circle").forEach(circle=>{

circle.addEventListener("click",()=>{

selectedColor =
circle.dataset.color;

document
.querySelectorAll(".circle")
.forEach(c=>c.classList.remove("active"));

circle.classList.add("active");

});

});

/* =========================
   TABLET GHOST DRAG
========================= */

let ghost = null;
let dragColor = null;

document.querySelectorAll(".circle").forEach(circle=>{

circle.addEventListener("touchstart",function(e){

const touch = e.touches[0];

dragColor =
this.dataset.color;

ghost =
document.createElement("div");

ghost.className =
"drag-ghost " + dragColor;

ghost.style.position = "fixed";
ghost.style.width = "40px";
ghost.style.height = "40px";
ghost.style.borderRadius = "50%";
ghost.style.pointerEvents = "none";
ghost.style.zIndex = "99999";
ghost.style.left =
touch.clientX + "px";
ghost.style.top =
touch.clientY + "px";
ghost.style.transform =
"translate(-50%,-50%)";
ghost.style.boxShadow =
"0 5px 15px rgba(0,0,0,.3)";

if(dragColor==="green")
ghost.style.background="#22c55e";

if(dragColor==="yellow")
ghost.style.background="#eab308";

if(dragColor==="red")
ghost.style.background="#ef4444";

document.body.appendChild(ghost);

},{passive:false});

});

document.addEventListener(
"touchmove",
function(e){

if(!ghost) return;

const touch = e.touches[0];

ghost.style.left =
touch.clientX + "px";

ghost.style.top =
touch.clientY + "px";

e.preventDefault();

},
{passive:false}
);

document.addEventListener(
"touchend",
function(e){

if(!ghost || !dragColor)
return;

const touch =
e.changedTouches[0];

const target =
document.elementFromPoint(
touch.clientX,
touch.clientY
);

const day =
target?.closest(".day");


if(day && dragColor){

  if(day.classList.contains("disabled-day")) return;

  pendingDay = day;
  pendingColor = dragColor;

  openPinModal();
}
ghost.remove();

ghost = null;
dragColor = null;

}
);

/* =========================
   SET BADGE
========================= */

function setBadge(day,color){

const container =
day.querySelector(
".badge-container"
);

container.innerHTML = "";

const badge =
document.createElement("div");

badge.className =
"badge " + color;

container.appendChild(
badge
);

sendToSheet(
day.dataset.day,
color
);

}

/* ============================
FUNCTION LOAD DATA CARD UNTUK DITAMPILKAN DI USER
=============================== */

async function loadSavedData(){

const url =
"https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec"
+ "?action=getUserMonthData"
+ "&nik=" + encodeURIComponent(user.nik)
+ "&periode=" + encodeURIComponent(periode);

try{

const res = await fetch(url);

const data = await res.json();

if(!data.days) return;

Object.entries(data.days)
.forEach(([day,color])=>{

const cell =
document.querySelector(
`.day[data-day="${day}"]`
);

if(cell){

const container =
cell.querySelector(
".badge-container"
);

container.innerHTML =
`<div class="badge ${color}"></div>`;

}

});

}catch(err){

console.error(err);

}

}

let pinValue = "";

function updatePinDisplay(){

const display =
document.getElementById("pinDisplay");

display.innerHTML =
pinValue.length
? "•".repeat(pinValue.length)
: "••••";

}

function addPin(num){

if(pinValue.length >= 6)
return;

pinValue += num;

updatePinDisplay();

}

function clearPin(){

pinValue = "";

updatePinDisplay();

}

function backPin(){

pinValue = pinValue.slice(0,-1);

updatePinDisplay();

}

function openPinModal(){

pinValue = "";
updatePinDisplay();

document
.getElementById("pinModal")
.classList.add("show");

}

function closePinModal(){

document
.getElementById("pinModal")
.classList.remove("show");

pinValue = "";
updatePinDisplay();

pendingDay = null;
pendingColor = null;

}

async function approvePin(){

const pin = pinValue;

if(!pin){

alert("Masukkan PIN");

return;

}

try{

const res =
await fetch(
API_URL
+ "?action=verifyPin"
+ "&pin="
+ encodeURIComponent(pin)
);

const data =
await res.json();

if(!data.success){

alert("PIN tidak valid");

return;

}

/* TAMPILKAN BADGE */
setBadge(
pendingDay,
pendingColor
);

/* SIMPAN DATA TIKET */
sessionStorage.setItem(
"ticketData",
JSON.stringify({

approver:data.nama,

approverNik:data.nik,

warna:pendingColor,

tanggal:new Date().toLocaleDateString("id-ID"),

jam:new Date().toLocaleTimeString("id-ID"),

userNik:user.nik,

userNama:user.nama,

day:pendingDay.dataset.day

})
);

closePinModal();

/* REDIRECT */
window.location.href =
"tiketpulang.html";

}catch(err){

console.error(err);

alert("Gagal verifikasi PIN");

}

}
   
/* =========================
   SEND TO SHEET
========================= */

function sendToSheet(day, color){

console.log("USER =", user);

const url =
"https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec"
+ "?action=saveRealtime"
+ "&nik=" + encodeURIComponent(user.nik)
+ "&nama=" + encodeURIComponent(user.nama)
+ "&bulan=" + encodeURIComponent(periode)
+ "&day=" + day
+ "&color=" + color;

console.log(url);

fetch(url)
.then(r=>r.json())
.then(data=>{
console.log("RESPONSE =", data);
});
}

loadSavedData();
   </script>

<div id="pinModal" class="modal">

<div class="modal-box">

<h3>Approval By Duty</h3>


<div id="pinDisplay" class="pin-display">
••••
</div>

<div class="keypad">

<button class="key" onclick="addPin('1')">1</button>
<button class="key" onclick="addPin('2')">2</button>
<button class="key" onclick="addPin('3')">3</button>

<button class="key" onclick="addPin('4')">4</button>
<button class="key" onclick="addPin('5')">5</button>
<button class="key" onclick="addPin('6')">6</button>

<button class="key" onclick="addPin('7')">7</button>
<button class="key" onclick="addPin('8')">8</button>
<button class="key" onclick="addPin('9')">9</button>

<button class="key key-clear" onclick="clearPin()">C</button>
<button class="key" onclick="addPin('0')">0</button>
<button class="key key-back" onclick="backPin()">⌫</button>

</div>


<div class="modal-actions">

<button
class="btn-cancel"
onclick="closePinModal()">
Cancel
</button>

<button
class="btn-approve"
onclick="approvePin()">
Approve
</button>

</div>

</div>

</div>
</body>
</html>
