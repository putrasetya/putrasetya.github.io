<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPORT SALES ID</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:460px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

/* HEADER */
.title{
    text-align:center;
    font-weight:700;
    font-size:18px;
    margin-bottom:10px;
}

.info{
    font-size:13px;
    margin-bottom:10px;
    color:#111827;
}

/* PALET */
.palette{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px 0 15px;
}

.dot{
    width:38px;
    height:38px;
    border-radius:50%;
    cursor:grab;
    transition:0.2s;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.dot:active{
    transform:scale(1.2);
}

.green{background:#22c55e;}
.yellow{background:#eab308;}
.red{background:#ef4444;}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
}

.cell{
    height:45px;
    border:1px solid #e5e7eb;
    border-radius:6px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    font-size:11px;
    background:#fff;
}

.cell span{
    position:absolute;
    top:3px;
    left:4px;
    font-size:10px;
    color:#6b7280;
}

.marker{
    width:16px;
    height:16px;
    border-radius:50%;
}

/* BUTTON */
button{
    width:100%;
    margin-top:12px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#fff;
    padding:20px;
    border-radius:12px;
    width:300px;
}

.modal-box input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">SALES CONTROL DAILY</div>

    <div class="info">
        <div>NIK : <span id="nik"></span></div>
        <div>NAMA : <span id="nama"></span></div>
        <div>PERIODE : <span id="periode"></span></div>
    </div>

    <!-- PALET -->
    <div class="palette">
        <div class="dot green" draggable="true" data-color="green"></div>
        <div class="dot yellow" draggable="true" data-color="yellow"></div>
        <div class="dot red" draggable="true" data-color="red"></div>
    </div>

    <!-- GRID -->
    <div class="grid" id="grid"></div>

    <button onclick="openPIN()">LAPORKAN</button>
    
    <div style="display:flex;gap:12px;margin-top:10px;">

    <button onclick="undo()" style="
        flex:1;
        background:#64748b;
        border-radius:10px;
        font-size:22px;
        padding:10px;
    ">
        ⟲
    </button>

    <button onclick="redo()" style="
        flex:1;
        background:#475569;
        border-radius:10px;
        font-size:22px;
        padding:10px;
    ">
        ⟳
    </button>

</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h4>PIN ADMIN</h4>
        <input type="password" id="pin" placeholder="Masukkan PIN">
        <button onclick="submitReport()">KIRIM</button>
    </div>
</div>

<script>
    (function(){
    if(!sessionStorage.getItem("nik") || !sessionStorage.getItem("nama")){
        window.location.replace("login.html");
    }
})();

const API_URL = "https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec";

let dragged = null;
let dataMap = {};

// 🔥 HISTORY SYSTEM
let history = [];
let redoStack = [];

const bulanIndo = ["JANUARI","FEBRUARI","MARET","APRIL","MEI","JUNI","JULI","AGUSTUS","SEPTEMBER","OKTOBER","NOVEMBER","DESEMBER"];

const now = new Date();
const tahun = now.getFullYear();
const bulan = `${bulanIndo[now.getMonth()]} ${tahun}`;

// SESSION
const nik = sessionStorage.getItem("nik");
const nama = sessionStorage.getItem("nama");

document.getElementById("nik").innerText = nik || "-";
document.getElementById("nama").innerText = nama || "-";
document.getElementById("periode").innerText = bulan;

// GRID 1-31
const grid = document.getElementById("grid");

for(let i=1;i<=31;i++){
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.day = i;

    cell.innerHTML = `<span>${i}</span>`;

    cell.ondragover = e => e.preventDefault();

    cell.ondrop = async e => {

    e.preventDefault();

    if(!dragged) return;

    saveState();

    dataMap[i] = dragged;

    renderGrid();

    await saveRealtime(i, dragged);

};

    grid.appendChild(cell);
}

// drag
document.querySelectorAll(".dot").forEach(d=>{
    d.ondragstart = () => dragged = d.dataset.color;
});

    function saveState(){
    history.push(JSON.stringify(dataMap));
    redoStack = []; // reset redo setiap ada action baru
}

function undo(){
    if(history.length === 0) return;

    redoStack.push(JSON.stringify(dataMap));

    const prev = history.pop();
    dataMap = JSON.parse(prev);

    renderGrid();
}

function redo(){
    if(redoStack.length === 0) return;

    history.push(JSON.stringify(dataMap));

    const next = redoStack.pop();
    dataMap = JSON.parse(next);

    renderGrid();
}

    function renderGrid(){

    document.querySelectorAll(".cell").forEach(cell=>{
        const day = cell.dataset.day;

        cell.innerHTML = `<span>${day}</span>`;

        if(dataMap[day]){
            const color = dataMap[day];
            cell.innerHTML = `<span>${day}</span><div class="marker ${color}"></div>`;
        }
    });
}
    
async function saveRealtime(day, color){

    try{

        const res = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                action:"saveRealtime",
                nik:sessionStorage.getItem("nik"),
                bulan:bulan,
                day:day,
                color:color
            })
        });

        const text = await res.text();
        console.log(text);

    }catch(err){
        console.error(err);
        alert(err.message);
    }
}
    
// modal
function openPIN(){
    document.getElementById("modal").style.display="flex";
}

async function submitReport(){

    const pin = document.getElementById("pin").value;

    const payload = {
        nik: sessionStorage.getItem("nik"),
        nama: sessionStorage.getItem("nama"),
        pin: pin,
        bulan: bulan,
        data: dataMap
    };

    const res = await fetch(API_URL, {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
});

    const result = await res.json();

    alert(result.message || "Selesai");

    if(result.success){
        document.getElementById("modal").style.display="none";
    }
}

</script>

</body>
</html>
