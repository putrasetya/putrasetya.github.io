<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:24px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
text-align:center;
font-size:32px;
font-weight:700;
margin-bottom:30px;
color:#111827;
}

label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:8px;
color:#374151;
}

input{
width:100%;
height:55px;
border:2px solid #e5e7eb;
border-radius:14px;
padding:0 16px;
font-size:16px;
outline:none;
margin-bottom:10px;
}

input:focus{
border-color:#2563eb;
}

.nama-box{
margin-top:10px;
background:#f8fafc;
border-radius:12px;
padding:15px;
min-height:60px;
display:flex;
align-items:center;
font-weight:600;
border:1px solid #e5e7eb;
}

.loading{color:#2563eb;}
.notfound{color:#ef4444;}
.success{color:#16a34a;}

button{
width:100%;
height:55px;
margin-top:20px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:disabled{
background:#cbd5e1;
cursor:not-allowed;
}

.pin-box{
margin-top:10px;
display:none;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">LOGIN</div>

<label>NIK</label>
<input type="number" id="nik" placeholder="Masukkan NIK">

<div class="nama-box" id="namaBox">Masukkan NIK</div>

<!-- PIN ADMIN -->
<div class="pin-box" id="pinBox">
<label>PIN Admin</label>
<input type="password" id="pin" placeholder="Masukkan PIN">
</div>

<button id="nextBtn" disabled>Next</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz5-yu44W5DPFVVPHVAZhDylVGNfh0wVVTKoAiixGsLPt6cJd-jokpw7wsLkpo1dMczXA/exec";

let allUsers = [];
let selectedUser = null;
let pinValid = false;

// load user
(async () => {

document.getElementById("namaBox").innerHTML =
'<span class="loading">Memuat data user...</span>';

try {

    const res = await fetch(`${API_URL}?action=getUsers`);
    const data = await res.json();

    if(data.success){
        allUsers = data.users || [];
        document.getElementById("namaBox").innerHTML = "Masukkan NIK";
    }else{
        document.getElementById("namaBox").innerHTML =
        '<span class="notfound">Gagal memuat data user</span>';
    }

}catch(e){
    document.getElementById("namaBox").innerHTML =
    '<span class="notfound">Koneksi gagal</span>';
}

})();

// NIK input
document.getElementById("nik").addEventListener("input", function(){

const nik = this.value.trim();

selectedUser = null;
pinValid = false;

document.getElementById("pinBox").style.display = "none";
document.getElementById("pin").value = "";

if(nik.length !== 6){
    document.getElementById("namaBox").innerHTML = "Masukkan NIK";
    document.getElementById("nextBtn").disabled = true;
    return;
}

const user = allUsers.find(x => String(x.nik) === nik);

if(!user){
    document.getElementById("namaBox").innerHTML =
    '<span class="notfound">NIK tidak ditemukan</span>';
    document.getElementById("nextBtn").disabled = true;
    return;
}

selectedUser = user;
document.getElementById("namaBox").innerHTML =
`<span class="success">${user.nama}</span>`;

// ADMIN
if(user.status === "admin"){
    document.getElementById("pinBox").style.display = "block";
    document.getElementById("nextBtn").disabled = true;
}else{
    document.getElementById("pinBox").style.display = "none";
    document.getElementById("nextBtn").disabled = false;
    pinValid = true;
}

});

// PIN validation
document.getElementById("pin").addEventListener("input", function(){

if(!selectedUser) return;

const pin = this.value.trim();

if(pin === String(selectedUser.pin)){
    pinValid = true;
    document.getElementById("nextBtn").disabled = false;
}else{
    pinValid = false;
    document.getElementById("nextBtn").disabled = true;
}

});

// NEXT
document.getElementById("nextBtn").addEventListener("click", () => {

if(!selectedUser) return;

// ADMIN
if(selectedUser.status === "admin"){
    if(pinValid){
        localStorage.setItem("user", JSON.stringify(selectedUser));
        window.location.href = "admin.html";
    }
}else{
    // STAFF
    localStorage.setItem("user", JSON.stringify(selectedUser));
    window.location.href = "index.html";
}

});

</script>

</body>
</html>
