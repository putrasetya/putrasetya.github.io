<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:#f5f7fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:24px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
text-align:center;
font-size:28px;
font-weight:700;
margin-bottom:25px;
}

label{font-size:14px;font-weight:600;}

input{
width:100%;
height:50px;
margin-top:8px;
margin-bottom:10px;
border:2px solid #e5e7eb;
border-radius:12px;
padding:0 12px;
font-size:15px;
}

.nama-box{
margin-top:10px;
padding:12px;
border-radius:10px;
background:#f8fafc;
border:1px solid #e5e7eb;
min-height:50px;
display:flex;
align-items:center;
font-weight:600;
}

.success{color:#16a34a;}
.notfound{color:#ef4444;}
.loading{color:#2563eb;}

button{
width:100%;
height:50px;
margin-top:15px;
border:none;
border-radius:12px;
background:#2563eb;
color:#fff;
font-weight:600;
cursor:pointer;
}

button:disabled{
background:#cbd5e1;
cursor:not-allowed;
}

#pinBox{display:none;margin-top:10px;}
</style>
</head>

<body>

<div class="card">

<div class="logo">LOGIN</div>

<label>NIK</label>
<input type="number" id="nik" placeholder="Masukkan NIK">

<div class="nama-box" id="namaBox">Masukkan NIK</div>

<div id="pinBox">
<label>PIN Admin</label>
<input type="password" id="pin" placeholder="Masukkan PIN">
</div>

<button id="nextBtn" disabled>Next</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz5-yu44W5DPFVVPHVAZhDylVGNfh0wVVTKoAiixGsLPt6cJd-jokpw7wsLkpo1dMczXA/exec";

let allUsers = [];
let selectedUser = null;
let pinValid = false;

/* =========================
   LOAD DATA (HYBRID CACHE)
========================= */
(async () => {

const cache = localStorage.getItem("users");

if(cache){
    allUsers = JSON.parse(cache);
    console.log("Loaded from cache");
}

try{
    const res = await fetch(`${API_URL}?action=getUsers`);
    const data = await res.json();

    if(data.success){
        allUsers = data.users;

        // SAVE TO LOCAL STORAGE
        localStorage.setItem("users", JSON.stringify(allUsers));

        console.log("Updated from server");
    }

}catch(e){
    console.log("Offline / API error, using cache");
}

})();

/* =========================
   INPUT NIK
========================= */
document.getElementById("nik").addEventListener("input", function(){

const nik = this.value.trim();

selectedUser = null;
pinValid = false;

document.getElementById("pinBox").style.display = "none";
document.getElementById("pin").value = "";

if(nik.length !== 6){
    document.getElementById("namaBox").innerHTML = "Masukkan NIK";
    document.getElementById("nextBtn").disabled = true;
    return;
}

const user = allUsers.find(x => String(x.nik) === nik);

if(!user){
    document.getElementById("namaBox").innerHTML =
    '<span class="notfound">NIK tidak ditemukan</span>';
    document.getElementById("nextBtn").disabled = true;
    return;
}

selectedUser = user;

document.getElementById("namaBox").innerHTML =
`<span class="success">${user.nama}</span>`;

/* ADMIN CHECK */
const status = String(user.status || "").toLowerCase();

if(status === "admin"){
    document.getElementById("pinBox").style.display = "block";
    document.getElementById("nextBtn").disabled = true;
}else{
    document.getElementById("pinBox").style.display = "none";
    document.getElementById("nextBtn").disabled = false;
    pinValid = true;
}

});

/* =========================
   PIN CHECK
========================= */
document.getElementById("pin").addEventListener("input", function(){

if(!selectedUser) return;

const pin = this.value.trim();

if(pin === String(selectedUser.pin)){
    pinValid = true;
    document.getElementById("nextBtn").disabled = false;
}else{
    pinValid = false;
    document.getElementById("nextBtn").disabled = true;
}

});

/* =========================
   NEXT BUTTON
========================= */
document.getElementById("nextBtn").addEventListener("click", ()=>{

if(!selectedUser) return;

localStorage.setItem("user", JSON.stringify(selectedUser));

const status = String(selectedUser.status || "").toLowerCase();

if(status === "admin" && pinValid){
    window.location.href = "admin.html";
}else{
    window.location.href = "index.html";
}

});

</script>

</body>
</html>
