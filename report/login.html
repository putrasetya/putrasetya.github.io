<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:white;
border-radius:24px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
text-align:center;
font-size:32px;
font-weight:700;
margin-bottom:30px;
color:#111827;
}

label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:8px;
color:#374151;
}

input{
width:100%;
height:55px;
border:2px solid #e5e7eb;
border-radius:14px;
padding:0 16px;
font-size:16px;
outline:none;
transition:.3s;
}

input:focus{
border-color:#2563eb;
}

.nama-box{
margin-top:15px;
background:#f8fafc;
border-radius:12px;
padding:15px;
min-height:60px;
display:flex;
align-items:center;
font-weight:600;
color:#111827;
border:1px solid #e5e7eb;
}

.loading{
color:#2563eb;
}

.notfound{
color:#ef4444;
}

.success{
color:#16a34a;
}

button{
width:100%;
height:55px;
margin-top:20px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:disabled{
background:#cbd5e1;
cursor:not-allowed;
}

button:hover:not(:disabled){
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
LOGIN
</div>

<label>NIK</label>

<input
type="number"
id="nik"
placeholder="Masukkan NIK"
disabled>

<div class="nama-box" id="namaBox">
<span class="loading">Memuat data akun...</span>
</div>

<button id="nextBtn" disabled>
Next
</button>

</div>

<script>

// URL APPS SCRIPT
const API_URL =
"https://script.google.com/macros/s/AKfycbx_rSjRmkxXhl8ypq5xnfihwnH9LTfrTTgvjdwVc01f4LeX2re7p-vRVTfYDP1Nh1_oMQ/exec";

let selectedUser = null;
let akun = [];

window.addEventListener("load", async () => {

  try {

    const response =
      await fetch(`${API_URL}?action=getUsers`);

    akun =
      await response.json();

    document.getElementById("nik").disabled = false;

    document.getElementById("namaBox").innerHTML =
      "Masukkan NIK";

  } catch (err) {

    document.getElementById("namaBox").innerHTML =
      '<span class="notfound">Gagal memuat data akun</span>';

    console.error(err);

  }

});

document
.getElementById("nik")
.addEventListener("input", function(){

  const nik = this.value.trim();

  if(nik.length < 1){

    document.getElementById("namaBox").innerHTML =
      "Masukkan NIK";

    document.getElementById("nextBtn").disabled = true;

    return;
  }

  const user =
    akun.find(x => String(x.nik) === nik);

  if(user){

    selectedUser = user;

    document.getElementById("namaBox").innerHTML =
      `<span class="success">${user.nama}</span>`;

    document.getElementById("nextBtn").disabled =
      false;

  }else{

    selectedUser = null;

    document.getElementById("namaBox").innerHTML =
      '<span class="notfound">NIK tidak ditemukan</span>';

    document.getElementById("nextBtn").disabled =
      true;

  }

});

document
.getElementById("nextBtn")
.addEventListener("click",()=>{

  localStorage.setItem(
    "user",
    JSON.stringify(selectedUser)
  );

  window.location.href =
    "sales-control.html";

});

</script>

</body>
</html>
