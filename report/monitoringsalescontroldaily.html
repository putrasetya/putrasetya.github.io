<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monitoring Sales Control Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:15px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.title{
font-size:24px;
font-weight:700;
}

.admin{
color:#cbd5e1;
font-size:14px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:16px;
}

.card-value{
font-size:30px;
font-weight:700;
}

.green-card{
border-left:5px solid #22c55e;
}

.yellow-card{
border-left:5px solid #eab308;
}

.red-card{
border-left:5px solid #ef4444;
}

.staff-card{
border-left:5px solid #3b82f6;
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

select,
button{
padding:10px 14px;
border:none;
border-radius:10px;
}

select{
background:#1e293b;
color:#fff;
}

.sort-btn{
background:#334155;
color:#fff;
cursor:pointer;
transition:.25s;
}

.sort-btn.active{
transform:translateY(-2px);
box-shadow:0 0 15px rgba(255,255,255,.25);
}
   .sort-btn.green-active{
background:#22c55e;
box-shadow:0 0 20px rgba(34,197,94,.7);
}

.sort-btn.yellow-active{
background:#eab308;
box-shadow:0 0 20px rgba(234,179,8,.7);
color:#000;
}

.sort-btn.red-active{
background:#ef4444;
box-shadow:0 0 20px rgba(239,68,68,.7);
}

.sort-btn.nama-active{
background:#3b82f6;
box-shadow:0 0 20px rgba(59,130,246,.7);
}

.logout{
background:#ef4444;
color:#fff;
margin-left:auto;
cursor:pointer;
}

.table-wrap{
background:#1e293b;
border-radius:16px;
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b1220;
padding:14px;
}

td{
padding:14px;
border-bottom:1px solid #334155;
}

tr:hover{
background:#263449;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.green{
background:#22c55e;
}

.yellow{
background:#eab308;
}

.red{
background:#ef4444;
}

@media(max-width:768px){

.card-value{
font-size:24px;
}

table{
font-size:13px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">

<div>
<div class="title">
MONITORING SALES CONTROL DAILY
</div>

<div class="admin" id="adminName"></div>
</div>

</div>

<div class="cards">

<div class="card green-card">
<div>TOTAL GREEN</div>
<div class="card-value" id="totalGreen">0</div>
</div>

<div class="card yellow-card">
<div>TOTAL YELLOW</div>
<div class="card-value" id="totalYellow">0</div>
</div>

<div class="card red-card">
<div>TOTAL RED</div>
<div class="card-value" id="totalRed">0</div>
</div>

<div class="card staff-card">
<div>TOTAL STAFF</div>
<div class="card-value" id="totalStaff">0</div>
</div>

</div>


<div class="toolbar">

<div style="width:100%;">
<select id="periodeFilter"></select>
</div>

<div style="width:100%;margin-top:10px;">

<div style="
margin-bottom:8px;
font-size:14px;
font-weight:600;
color:#cbd5e1;
">
Sort By :
</div>

<button id="btnGreen" class="sort-btn" onclick="sortData('green')">
🟢 Green
</button>

<button id="btnYellow" class="sort-btn" onclick="sortData('yellow')">
🟡 Yellow
</button>

<button id="btnRed" class="sort-btn" onclick="sortData('red')">
🔴 Red
</button>

<button id="btnNama" class="sort-btn" onclick="sortData('nama')">
🔤 Nama
</button>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

</div>
<div class="table-wrap">

<table>

<thead>
<tr>
<th>Rank</th>
<th>Nama</th>
<th>🟢</th>
<th>🟡</th>
<th>🔴</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec";

/* =========================
   LOGIN SESSION
========================= */

const user =
JSON.parse(localStorage.getItem("user"));

if(!user || user.status !== "admin"){
window.location.href="login.html";
}

document.getElementById("adminName").innerText =
"Admin : " + user.nama;

/* =========================
   DATA
========================= */

let dashboardData = [];

/* SIMPAN MODE SORT */
let currentSort =
localStorage.getItem("dashboardSort")
|| "green";

/* PERIODE AKTIF */
let activePeriode =
sessionStorage.getItem("activePeriode")
|| "";

/* =========================
   LOAD PERIODE
========================= */

async function loadPeriods(){

try{

const res =
await fetch(API_URL + "?action=getPeriods");

const data =
await res.json();

const select =
document.getElementById("periodeFilter");

select.innerHTML="";

const periods =
(data.periods || []);

   const bulanMap = {
JANUARI:1,
FEBRUARI:2,
MARET:3,
APRIL:4,
MEI:5,
JUNI:6,
JULI:7,
AGUSTUS:8,
SEPTEMBER:9,
OKTOBER:10,
NOVEMBER:11,
DESEMBER:12
};

periods.sort((a,b)=>{

const [bulanA,tahunA] =
a.toUpperCase().split(" ");

const [bulanB,tahunB] =
b.toUpperCase().split(" ");

const nilaiA =
(Number(tahunA)*100) +
bulanMap[bulanA];

const nilaiB =
(Number(tahunB)*100) +
bulanMap[bulanB];

return nilaiA - nilaiB;

});



periods.forEach(p=>{

const o =
document.createElement("option");

o.value = p;
o.textContent = p;

select.appendChild(o);

});

const bulanIndonesia = [
"JANUARI",
"FEBRUARI",
"MARET",
"APRIL",
"MEI",
"JUNI",
"JULI",
"AGUSTUS",
"SEPTEMBER",
"OKTOBER",
"NOVEMBER",
"DESEMBER"
];

const now = new Date();

const periodeSekarang =
bulanIndonesia[now.getMonth()] +
" " +
now.getFullYear();

if(
activePeriode &&
periods.includes(activePeriode)
){

select.value = activePeriode;

}else{

const ditemukan =
periods.find(
p =>
String(p).toUpperCase() ===
periodeSekarang
);

if(ditemukan){

select.value = ditemukan;

}

}

activePeriode = select.value;

await loadDashboard();

}catch(err){

console.error(err);

}

}

/* =========================
   LOAD DASHBOARD
========================= */

async function loadDashboard(){

try{

const periode =
document.getElementById("periodeFilter").value;

if(!periode) return;

const res =
await fetch(
API_URL +
"?action=getDashboard&periode=" +
encodeURIComponent(periode)
);

const data =
await res.json();

dashboardData =
data.data || [];

/* PERTAHANKAN SORT TERAKHIR */
sortData(currentSort,false);

}catch(err){

console.error(err);

}

}

/* =========================
   SORT DATA
========================= */

function sortData(type,save=true){

currentSort = type;

/* SIMPAN KE LOCAL STORAGE */
if(save){

localStorage.setItem(
"dashboardSort",
type
);

}

if(type==="green"){

dashboardData.sort(
(a,b)=>b.green-a.green
);

}

if(type==="yellow"){

dashboardData.sort(
(a,b)=>b.yellow-a.yellow
);

}

if(type==="red"){

dashboardData.sort(
(a,b)=>b.red-a.red
);

}

if(type==="nama"){

dashboardData.sort(
(a,b)=>a.nama.localeCompare(b.nama)
);

}

renderTable();
updateSortButtons();

}
   
   function updateSortButtons(){

document.querySelectorAll(".sort-btn")
.forEach(btn=>{

btn.classList.remove(
"active",
"green-active",
"yellow-active",
"red-active",
"nama-active"
);

});

if(currentSort==="green"){

document.getElementById("btnGreen")
.classList.add("active","green-active");

}

if(currentSort==="yellow"){

document.getElementById("btnYellow")
.classList.add("active","yellow-active");

}

if(currentSort==="red"){

document.getElementById("btnRed")
.classList.add("active","red-active");

}

if(currentSort==="nama"){

document.getElementById("btnNama")
.classList.add("active","nama-active");

}

}

/* =========================
   RENDER TABLE
========================= */

function renderTable(){

let html="";

let tg=0;
let ty=0;
let tr=0;

dashboardData.forEach((r,i)=>{

tg += r.green;
ty += r.yellow;
tr += r.red;

let rank = "-";

/* MEDALI HANYA SAAT SORT PERFORMA */
if(currentSort!=="nama"){

rank = i + 1;

if(i===0){
rank="🥇";
}
else if(i===1){
rank="🥈";
}
else if(i===2){
rank="🥉";
}

}

html += `
<tr>

<td>${rank}</td>

<td>${r.nama}</td>

<td>
<span class="dot green"></span>
${r.green}
</td>

<td>
<span class="dot yellow"></span>
${r.yellow}
</td>

<td>
<span class="dot red"></span>
${r.red}
</td>

<td>
${r.green+r.yellow+r.red}
</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML =
html;

document.getElementById("totalGreen").innerText =
tg;

document.getElementById("totalYellow").innerText =
ty;

document.getElementById("totalRed").innerText =
tr;

document.getElementById("totalStaff").innerText =
dashboardData.length;

}

/* =========================
   FILTER PERIODE
========================= */


document
.getElementById("periodeFilter")
.addEventListener(
"change",
()=>{

activePeriode =
document.getElementById("periodeFilter").value;

sessionStorage.setItem(
"activePeriode",
activePeriode
);

loadDashboard();

}
);
   
/* =========================
   AUTO REFRESH 30 DETIK
========================= */

setInterval(()=>{

loadDashboard();

},30000);

/* =========================
   LOGOUT
========================= */

function logout(){

sessionStorage.removeItem(
"activePeriode"
);

localStorage.removeItem("user");

window.location.href="login.html";

}

/* =========================
   START
========================= */

loadPeriods();

</script>

</body>
</html>
