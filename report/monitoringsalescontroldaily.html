<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Monitoring Sales Control Daily</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f1f5f9;
color:#0f172a;
padding:15px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.title{
font-size:24px;
font-weight:700;
}

.admin{
color:#64748b;
font-size:14px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#ffffff;
padding:18px;
border-radius:16px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.card-value{
font-size:30px;
font-weight:700;
}

.green-card{
border-left:5px solid #22c55e;
}

.yellow-card{
border-left:5px solid #eab308;
}

.red-card{
border-left:5px solid #ef4444;
}

.staff-card{
border-left:5px solid #3b82f6;
}

.toolbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

select,
button{
padding:10px 14px;
border:none;
border-radius:10px;
}

select{
background:#fff;
color:#0f172a;
border:1px solid #cbd5e1;
}

.sort-btn{
background:#fff;
color:#0f172a;
border:1px solid #cbd5e1;
cursor:pointer;
transition:.25s;
}

.sort-btn.active{
transform:translateY(-2px);
box-shadow:0 0 15px rgba(255,255,255,.25);
}
   .sort-btn.green-active{
background:#22c55e;
box-shadow:0 0 20px rgba(34,197,94,.7);
}

.sort-btn.yellow-active{
background:#eab308;
box-shadow:0 0 20px rgba(234,179,8,.7);
color:#000;
}

.sort-btn.red-active{
background:#ef4444;
box-shadow:0 0 20px rgba(239,68,68,.7);
}

.sort-btn.nama-active{
background:#3b82f6;
box-shadow:0 0 20px rgba(59,130,246,.7);
}

.sort-btn.nik-active{
background:#8b5cf6;
box-shadow:0 0 20px rgba(139,92,246,.7);
}

.logout{
background:#ef4444;
color:#fff;
margin-left:auto;
cursor:pointer;
}

.table-wrap{
background:#fff;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f8fafc;
padding:14px;
color:#334155;
border-bottom:2px solid #e2e8f0;
}

td{
padding:14px;
border-bottom:1px solid #e2e8f0;
color:#0f172a;
}

tr:hover{
background:#f8fafc;
cursor:pointer;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.green{
background:#22c55e;
}

.yellow{
background:#eab308;
}

.red{
background:#ef4444;
}

   .logout-top{
background:#ef4444;
color:#fff;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:.25s;
}

.logout-top:hover{
opacity:.9;
transform:translateY(-2px);
}

.calendar-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
backdrop-filter:blur(5px);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
padding:10px;
}

.calendar-modal.show{
display:flex;
}

.calendar-box{
width:100%;
max-width:900px;
background:#fff;
border-radius:20px;
padding:20px;
color:#0f172a;

max-height:95vh;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.calendar-close{
position:absolute;
top:15px;
right:15px;
width:42px;
height:42px;
border:none;
border-radius:50%;
background:#ef4444;
color:#fff;
font-size:20px;
cursor:pointer;
}

.calendar-header{
text-align:center;
margin-bottom:20px;
}

.calendar-header h2{
margin-bottom:5px;
}

.calendar-stats{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
padding:10px 18px;
border-radius:12px;
font-weight:700;
}

.green-stat{
background:#14532d;
}

.yellow-stat{
background:#713f12;
}

.red-stat{
background:#7f1d1d;
}

.weekdays-cal{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-bottom:10px;
}

.weekdays-cal div{
background:#e2e8f0;
color:#334155;
padding:10px;
text-align:center;
border-radius:10px;
font-weight:700;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.calendar-day{
aspect-ratio:1;
min-height:45px;
border-radius:12px;
background:#f8fafc;
position:relative;
}

.calendar-date{
position:absolute;
top:5px;
left:8px;
font-size:12px;
}

.calendar-badge{
width:20px;
height:20px;
border-radius:50%;
position:absolute;
right:5px;
bottom:5px;
}

.calendar-badge.green{
background:#22c55e;
}

.calendar-badge.yellow{
background:#eab308;
}

.calendar-badge.red{
background:#ef4444;
}  

.calendar-content{
max-height:70vh;
overflow-y:auto;
}   
@media(max-width:768px){

.card-value{
font-size:24px;
}

table{
font-size:13px;
}

.header{
flex-direction:column;
align-items:flex-start;
}

.logout-top{
width:100%;
margin-top:10px;
}

}

@media(max-width:600px){

.calendar-box{
padding:12px;
border-radius:16px;
}

.calendar-grid{
gap:4px;
}

.calendar-day{
min-height:38px;
}

.calendar-day .date{
font-size:11px;
}

.calendar-badge{
width:16px;
height:16px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="header">

<div>
<div class="title">
MONITORING SALES CONTROL DAILY
</div>

<div class="admin" id="adminName"></div>
</div>

<button class="logout-top" onclick="logout()">
Logout
</button>

</div>

<div class="cards">

<div class="card green-card">
<div>TOTAL GREEN</div>
<div class="card-value" id="totalGreen">0</div>
</div>

<div class="card yellow-card">
<div>TOTAL YELLOW</div>
<div class="card-value" id="totalYellow">0</div>
</div>

<div class="card red-card">
<div>TOTAL RED</div>
<div class="card-value" id="totalRed">0</div>
</div>

<div class="card staff-card">
<div>TOTAL STAFF</div>
<div class="card-value" id="totalStaff">0</div>
</div>

</div>


<div class="toolbar">

<div style="width:100%;">
<select id="periodeFilter"></select>
</div>

<div style="width:100%;margin-top:10px;">

<div style="
margin-bottom:8px;
font-size:14px;
font-weight:600;
color:#cbd5e1;
">
Sort By :
</div>

<button id="btnGreen" class="sort-btn" onclick="sortData('green')">
🟢 Green
</button>

<button id="btnYellow" class="sort-btn" onclick="sortData('yellow')">
🟡 Yellow
</button>

<button id="btnRed" class="sort-btn" onclick="sortData('red')">
🔴 Red
</button>

<button id="btnNama" class="sort-btn" onclick="sortData('nama')">
🔤 Nama
</button>

<button id="btnNik" class="sort-btn" onclick="sortData('nik')">
🆔 NIK
</button>


</div>

</div>
<div class="table-wrap">

<table>

<thead>
<tr>
<th id="rankHeader">Rank</th>
<th>Nama</th>
<th>🟢</th>
<th>🟡</th>
<th>🔴</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwFvACNaZjeS8Ueuql78cm19Ha8YwlyytSA9xTQ3cxT4DAO9d6s7VlFdIuN2j9NFjPYgw/exec";

/* =========================
   LOGIN SESSION
========================= */

const user =
JSON.parse(localStorage.getItem("user"));

if(!user || user.status !== "admin"){
window.location.href="login.html";
}

document.getElementById("adminName").innerText =
"Admin : " + user.nama;

/* =========================
   DATA
========================= */

let dashboardData = [];

/* SIMPAN MODE SORT */
let currentSort =
localStorage.getItem("dashboardSort")
|| "green";

/* PERIODE AKTIF */
let activePeriode =
sessionStorage.getItem("activePeriode")
|| "";

/* =========================
   LOAD PERIODE
========================= */

async function loadPeriods(){

try{

const res =
await fetch(API_URL + "?action=getPeriods");

const data =
await res.json();

const select =
document.getElementById("periodeFilter");

select.innerHTML="";

const periods =
(data.periods || []);

   const bulanMap = {
JANUARI:1,
FEBRUARI:2,
MARET:3,
APRIL:4,
MEI:5,
JUNI:6,
JULI:7,
AGUSTUS:8,
SEPTEMBER:9,
OKTOBER:10,
NOVEMBER:11,
DESEMBER:12
};

periods.sort((a,b)=>{

const [bulanA,tahunA] =
a.toUpperCase().split(" ");

const [bulanB,tahunB] =
b.toUpperCase().split(" ");

const nilaiA =
(Number(tahunA)*100) +
bulanMap[bulanA];

const nilaiB =
(Number(tahunB)*100) +
bulanMap[bulanB];

return nilaiA - nilaiB;

});



periods.forEach(p=>{

const o =
document.createElement("option");

o.value = p;
o.textContent = p;

select.appendChild(o);

});

const bulanIndonesia = [
"JANUARI",
"FEBRUARI",
"MARET",
"APRIL",
"MEI",
"JUNI",
"JULI",
"AGUSTUS",
"SEPTEMBER",
"OKTOBER",
"NOVEMBER",
"DESEMBER"
];

const now = new Date();

const periodeSekarang =
bulanIndonesia[now.getMonth()] +
" " +
now.getFullYear();

if(
activePeriode &&
periods.includes(activePeriode)
){

select.value = activePeriode;

}else{

const ditemukan =
periods.find(
p =>
String(p).toUpperCase() ===
periodeSekarang
);

if(ditemukan){

select.value = ditemukan;

}

}

activePeriode = select.value;

await loadDashboard();

}catch(err){

console.error(err);

}

}

/* =========================
   LOAD DASHBOARD
========================= */

async function loadDashboard(){

try{

const periode =
document.getElementById("periodeFilter").value;

if(!periode) return;

const res =
await fetch(
API_URL +
"?action=getDashboard&periode=" +
encodeURIComponent(periode)
);

const data =
await res.json();

dashboardData =
data.data || [];

/* PERTAHANKAN SORT TERAKHIR */
sortData(currentSort,false);

}catch(err){

console.error(err);

}

}

/* =========================
   SORT DATA
========================= */

function sortData(type,save=true){

currentSort = type;

/* SIMPAN KE LOCAL STORAGE */
if(save){

localStorage.setItem(
"dashboardSort",
type
);

}

if(type==="green"){

dashboardData.sort(
(a,b)=>b.green-a.green
);

}

if(type==="yellow"){

dashboardData.sort(
(a,b)=>b.yellow-a.yellow
);

}

if(type==="red"){

dashboardData.sort(
(a,b)=>b.red-a.red
);

}

if(type==="nama"){

dashboardData.sort(
(a,b)=>a.nama.localeCompare(b.nama)
);

}

if(type==="nik"){

dashboardData.sort((a,b)=>
String(a.nik).localeCompare(
String(b.nik),
undefined,
{numeric:true}
));

}

renderTable();
updateSortButtons();

}
   
   function updateSortButtons(){

document.querySelectorAll(".sort-btn")
.forEach(btn=>{

btn.classList.remove(
"active",
"green-active",
"yellow-active",
"red-active",
"nama-active",
"nik-active"
);

});

if(currentSort==="green"){

document.getElementById("btnGreen")
.classList.add("active","green-active");

}

if(currentSort==="yellow"){

document.getElementById("btnYellow")
.classList.add("active","yellow-active");

}

if(currentSort==="red"){

document.getElementById("btnRed")
.classList.add("active","red-active");

}

if(currentSort==="nama"){

document.getElementById("btnNama")
.classList.add("active","nama-active");

}

if(currentSort==="nik"){

document.getElementById("btnNik")
.classList.add("active","nik-active");

}

}

/* =========================
   RENDER TABLE
========================= */

function renderTable(){

let html="";

let tg=0;
let ty=0;
let tr=0;

dashboardData.forEach((r,i)=>{

tg += r.green;
ty += r.yellow;
tr += r.red;


let rank = i + 1;

if(currentSort==="nik"){

rank = r.nik;

}
else if(currentSort==="nama"){

rank = i + 1;

}
else{

rank = i + 1;

if(i===0) rank="🥇";
else if(i===1) rank="🥈";
else if(i===2) rank="🥉";

}

html += `
<tr onclick="showCalendar('${r.nik}','${r.nama}')">

<td>${rank}</td>

<td>${r.nama}</td>

<td>
<span class="dot green"></span>
${r.green}
</td>

<td>
<span class="dot yellow"></span>
${r.yellow}
</td>

<td>
<span class="dot red"></span>
${r.red}
</td>

<td>
${r.green+r.yellow+r.red}
</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML =
html;

document.getElementById("totalGreen").innerText =
tg;

document.getElementById("totalYellow").innerText =
ty;

document.getElementById("totalRed").innerText =
tr;

document.getElementById("totalStaff").innerText =
dashboardData.length;

const rankHeader =
document.getElementById("rankHeader");

if(currentSort==="nik"){

rankHeader.innerText = "NIK";

}
else if(currentSort==="nama"){

rankHeader.innerText = "No";

}
else{

rankHeader.innerText = "Rank";

}

}

/* =========================
   FILTER PERIODE
========================= */


document
.getElementById("periodeFilter")
.addEventListener(
"change",
()=>{

activePeriode =
document.getElementById("periodeFilter").value;

sessionStorage.setItem(
"activePeriode",
activePeriode
);

loadDashboard();

}
);
   
/* =========================
   AUTO REFRESH 30 DETIK
========================= */

setInterval(()=>{

loadDashboard();

},30000);

/* =========================
   LOGOUT
========================= */

function logout(){

sessionStorage.removeItem(
"activePeriode"
);

localStorage.removeItem("user");

window.location.href="login.html";

}

async function showCalendar(nik,nama){

document
.getElementById("calendarModal")
.classList.add("show");

document
.getElementById("calNama")
.innerText = nama;

document
.getElementById("calNik")
.innerText = nik;

const periode =
document.getElementById("periodeFilter").value;

const res =
await fetch(
API_URL +
"?action=getUserMonthData" +
"&nik=" + encodeURIComponent(nik) +
"&periode=" + encodeURIComponent(periode)
);

const data =
await res.json();

const days =
data.days || {};

let green=0;
let yellow=0;
let red=0;

const grid =
document.getElementById("calendarGrid");

grid.innerHTML = "";

const now = new Date();

const firstDay =
new Date(
now.getFullYear(),
now.getMonth(),
1
);

let startDay =
firstDay.getDay();

startDay =
startDay===0 ? 6 : startDay-1;

for(let i=0;i<startDay;i++){

const empty =
document.createElement("div");

grid.appendChild(empty);

}

const totalDays =
new Date(
now.getFullYear(),
now.getMonth()+1,
0
).getDate();

for(let i=1;i<=totalDays;i++){

const div =
document.createElement("div");

div.className =
"calendar-day";

let badge="";

if(days[i]){

badge =
`<div class="calendar-badge ${days[i]}"></div>`;

if(days[i]==="green") green++;
if(days[i]==="yellow") yellow++;
if(days[i]==="red") red++;

}

div.innerHTML = `
<div class="calendar-date">${i}</div>
${badge}
`;

grid.appendChild(div);

}

document
.getElementById("calGreen")
.innerText = green;

document
.getElementById("calYellow")
.innerText = yellow;

document
.getElementById("calRed")
.innerText = red;

}

function closeCalendar(){

document
.getElementById("calendarModal")
.classList.remove("show");

}   
/* =========================
   START
========================= */

loadPeriods();

</script>

<div id="calendarModal" class="calendar-modal">

<div class="calendar-box">

<button class="calendar-close"
onclick="closeCalendar()">
✕
</button>

<div class="calendar-header">

<h2 id="calNama">Nama Staff</h2>

<div id="calNik">
NIK
</div>

</div>

<div class="calendar-stats">

<div class="stat green-stat">
🟢 <span id="calGreen">0</span>
</div>

<div class="stat yellow-stat">
🟡 <span id="calYellow">0</span>
</div>

<div class="stat red-stat">
🔴 <span id="calRed">0</span>
</div>

</div>

<div class="weekdays-cal">
<div>Sen</div>
<div>Sel</div>
<div>Rab</div>
<div>Kam</div>
<div>Jum</div>
<div>Sab</div>
<div>Min</div>
</div>

<div id="calendarGrid"
class="calendar-grid">
</div>

</div>

</div>   
</body>
</html>
