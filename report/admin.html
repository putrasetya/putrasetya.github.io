<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#fff;
}

.container{
width:100%;
max-width:900px;
}

.header{
text-align:center;
margin-bottom:35px;
padding-top:10px;
}

h1{
font-size:30px;
margin-bottom:5px;
}

.subtitle{
color:#94a3b8;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.menu-card{
background:#1e293b;
border-radius:20px;
padding:25px;
cursor:pointer;
transition:.25s;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.menu-card:hover{
transform:translateY(-6px);
}

.icon{
font-size:48px;
margin-bottom:15px;
}

.card-title{
font-size:20px;
font-weight:700;
margin-bottom:8px;
}

.card-desc{
font-size:14px;
color:#cbd5e1;
line-height:1.5;
}

.logout-btn{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.logout-btn:hover{
opacity:.9;
}

.footer{
text-align:center;
margin-top:20px;
color:#64748b;
font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1 id="welcome">Halo Admin</h1>

<div class="subtitle">
Selamat datang di Dashboard Monitoring
</div>

</div>

<div class="menu-grid">

<div class="menu-card"
onclick="window.location.href='monitoringsalescontroldaily.html'">

<div class="icon">📊</div>

<div class="card-title">
Monitoring Sales Control Daily
</div>

<div class="card-desc">
Monitoring perolehan Green, Yellow dan Red seluruh staff berdasarkan periode yang dipilih.
</div>

</div>

</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

<div class="footer">
Sales Control Dashboard
</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.status !== "admin"){
window.location.href = "login.html";
}

document.getElementById("welcome").innerText =
`Halo, ${user.nama}`;

function logout(){
localStorage.removeItem("user");
window.location.href = "login.html";
}

</script>

</body>
</html>
