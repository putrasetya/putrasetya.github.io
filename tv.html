<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AZKO TV LEADERBOARD</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:15px;
    font-size:28px;
    font-weight:bold;
    background:#22c55e;
}

/* SECTION TITLE */
h2{
    text-align:center;
    margin:15px 0;
}

/* TOP 3 LIST (VERTICAL) */
.top3-list{
    padding:20px;
    font-size:24px;
}

/* ITEM */
.item{
    display:flex;
    justify-content:space-between;
    padding:12px 10px;
    border-bottom:1px solid #334155;
}

/* RANK COLORS */
.rank-1{
    background:rgba(251,191,36,0.15);
    color:#fbbf24;
    font-weight:bold;
}

.rank-2{
    background:rgba(148,163,184,0.15);
    color:#cbd5e1;
    font-weight:bold;
}

.rank-3{
    background:rgba(180,83,9,0.15);
    color:#d97706;
    font-weight:bold;
}

/* SLIDE */
.slide{display:none;}
.active{display:block;}

/* RESPONSIVE */
@media (max-width:768px){
    .top3-list{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="header">🔥 AZKO PERFORMANCE LEADERBOARD</div>

<!-- SALES -->
<div class="slide active">
<h2>TOP SALES</h2>
<div id="salesList" class="top3-list"></div>
</div>

<!-- PROTEKSI -->
<div class="slide">
<h2>TOP PROTEKSI</h2>
<div id="proteksiList" class="top3-list"></div>
</div>

<!-- TRX -->
<div class="slide">
<h2>TOP TRX</h2>
<div id="trxList" class="top3-list"></div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

function clean(v){
    return parseInt((v||"0").toString().replace(/[^\d]/g,'')) || 0;
}

/* DATA */
async function getData(){
    let res = await fetch(URL);
    let data = await res.json();

    return data.map(r=>({
        name: r["EMPLOYEE NAME"] || "Unknown",
        sales: clean(r["SALES MTD"]),
        proteksi: clean(r["PROTEKSI"]),
        trx: clean(r["TRX"])
    }));
}

/* RENDER TOP 3 LIST ONLY */
function renderTop3(data,key,id){

    let top3 = data
        .filter(d=>d[key]>0)
        .sort((a,b)=>b[key]-a[key])
        .slice(0,3);

    let html="";

    top3.forEach((d,i)=>{

        let cls = "";
        if(i===0) cls="rank-1";
        if(i===1) cls="rank-2";
        if(i===2) cls="rank-3";

        html+=`
        <div class="item ${cls}">
            <div>#${i+1} ${d.name}</div>
            <div>${d[key].toLocaleString()}</div>
        </div>`;
    });

    document.getElementById(id).innerHTML = html;
}

/* UPDATE */
async function update(){
    let data = await getData();

    renderTop3(data,"sales","salesList");
    renderTop3(data,"proteksi","proteksiList");
    renderTop3(data,"trx","trxList");
}

/* SLIDE */
let i=0;
setInterval(()=>{
    let slides=document.querySelectorAll(".slide");
    slides[i].classList.remove("active");
    i=(i+1)%slides.length;
    slides[i].classList.add("active");
},6000);

/* AUTO REFRESH */
setInterval(update,15000);

update();

/* FULLSCREEN */
document.body.onclick=()=>{
    document.documentElement.requestFullscreen();
}

</script>

</body>
</html>
