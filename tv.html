<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AZKO TV TOP 3</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:15px;
    font-size:28px;
    font-weight:bold;
    background:#22c55e;
}

/* TOP 3 WRAP */
.hero-wrap{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    flex-wrap:wrap;
}

/* CARD TOP 3 */
.hero-card{
    border-radius:18px;
    padding:20px;
    text-align:center;
    width:30%;
    min-width:240px;
}

/* 🥇 */
.rank-1{
    background:linear-gradient(145deg,#fbbf24,#f59e0b);
    box-shadow:0 0 25px rgba(251,191,36,0.6);
}

/* 🥈 */
.rank-2{
    background:linear-gradient(145deg,#cbd5e1,#94a3b8);
}

/* 🥉 */
.rank-3{
    background:linear-gradient(145deg,#d97706,#b45309);
}

/* AVATAR */
.avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#0f172a;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    font-weight:bold;
}

/* FULL LIST (NO CARD) */
.list{
    padding:20px;
    font-size:22px;
    line-height:2;
}

.list-item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #334155;
    padding:8px 0;
}

/* SLIDE */
.slide{display:none;}
.active{display:block;}

/* RESPONSIVE */
@media (max-width:768px){

    .hero-wrap{
        flex-direction:column;
        align-items:center;
    }

    .hero-card{
        width:90%;
    }

    .list{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="header">🔥 AZKO PERFORMANCE TOP 3</div>

<!-- SALES -->
<div class="slide active">
<h2 style="text-align:center;">TOP SALES</h2>

<div id="salesHero" class="hero-wrap"></div>
<div id="salesList" class="list"></div>
</div>

<!-- PROTEKSI -->
<div class="slide">
<h2 style="text-align:center;">TOP PROTEKSI</h2>

<div id="proteksiHero" class="hero-wrap"></div>
<div id="proteksiList" class="list"></div>
</div>

<!-- TRX -->
<div class="slide">
<h2 style="text-align:center;">TOP TRX</h2>

<div id="trxHero" class="hero-wrap"></div>
<div id="trxList" class="list"></div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

function clean(v){
    return parseInt((v||"0").toString().replace(/[^\d]/g,'')) || 0;
}

function avatar(name){
    return name ? name.split(" ").map(n=>n[0]).join("").substring(0,2).toUpperCase() : "NA";
}

/* DATA */
async function getData(){
    let res = await fetch(URL);
    let data = await res.json();

    return data.map(r=>({
        name: r["EMPLOYEE NAME"] || "Unknown",
        sales: clean(r["SALES MTD"]),
        proteksi: clean(r["PROTEKSI"]),
        trx: clean(r["TRX"])
    }));
}

/* TOP 3 */
function renderHero(data,key,id){

    let top3 = data
        .filter(d=>d[key]>0)
        .sort((a,b)=>b[key]-a[key])
        .slice(0,3);

    let html="";

    top3.forEach((d,i)=>{

        let cls = i===0 ? "rank-1" : i===1 ? "rank-2" : "rank-3";

        html+=`
        <div class="hero-card ${cls}">
            <div style="font-size:18px;font-weight:bold;">🏆 #${i+1}</div>
            <div class="avatar">${avatar(d.name)}</div>
            <h2>${d.name}</h2>
            <h1>${d[key].toLocaleString()}</h1>
        </div>`;
    });

    document.getElementById(id).innerHTML = html;
}

/* FULL LIST (TEXT SIMPLE) */
function renderList(data,key,id){

    let list = data
        .filter(d=>d[key]>0)
        .sort((a,b)=>b[key]-a[key]);

    let html="";

    list.forEach((d,i)=>{
        html+=`
        <div class="list-item">
            <div>#${i+1} ${d.name}</div>
            <div>${d[key].toLocaleString()}</div>
        </div>`;
    });

    document.getElementById(id).innerHTML = html;
}

/* UPDATE */
async function update(){
    let data = await getData();

    renderHero(data,"sales","salesHero");
    renderList(data,"sales","salesList");

    renderHero(data,"proteksi","proteksiHero");
    renderList(data,"proteksi","proteksiList");

    renderHero(data,"trx","trxHero");
    renderList(data,"trx","trxList");
}

/* SLIDE */
let i=0;
setInterval(()=>{
    let slides=document.querySelectorAll(".slide");
    slides[i].classList.remove("active");
    i=(i+1)%slides.length;
    slides[i].classList.add("active");
},6000);

/* AUTO REFRESH */
setInterval(update,15000);

update();

/* FULLSCREEN */
document.body.onclick=()=>{
    document.documentElement.requestFullscreen();
}

</script>

</body>
</html>
