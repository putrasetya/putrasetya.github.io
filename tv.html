<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AZKO TV RESPONSIVE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:15px;
    font-size:28px;
    font-weight:bold;
    background:#22c55e;
}

/* HERO TOP 3 */
.hero-wrap{
    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    flex-wrap:wrap;
}

/* CARD BESAR (TOP 3) */
.hero-card{
    background:#1e293b;
    border-radius:18px;
    padding:20px;
    text-align:center;
    width:30%;
    min-width:250px;
    box-shadow:0 0 15px rgba(34,197,94,0.3);
}

.hero-card h1{
    font-size:22px;
    margin:10px 0;
}

.hero-card h2{
    color:#22c55e;
}

/* AVATAR */
.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#334155;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
}

/* LIST RANK 4-5 */
.container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:15px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    text-align:center;
}

/* SLIDE */
.slide{display:none;}
.active{display:block;}

/* ========================= */
/* 📱 MOBILE RESPONSIVE */
/* ========================= */
@media (max-width:768px){

    .hero-wrap{
        flex-direction:column;
        align-items:center;
    }

    .hero-card{
        width:90%;
    }

    .container{
        grid-template-columns:1fr;
    }

    .header{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="header">🔥 AZKO PERFORMANCE DASHBOARD</div>

<!-- SLIDE 1 -->
<div class="slide active">
<h2 style="text-align:center;">TOP SALES</h2>

<div id="salesHero" class="hero-wrap"></div>
<div id="salesList" class="container"></div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<h2 style="text-align:center;">TOP PROTEKSI</h2>

<div id="proteksiHero" class="hero-wrap"></div>
<div id="proteksiList" class="container"></div>
</div>

<!-- SLIDE 3 -->
<div class="slide">
<h2 style="text-align:center;">TOP TRX</h2>

<div id="trxHero" class="hero-wrap"></div>
<div id="trxList" class="container"></div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

function clean(v){
    return parseInt((v||"0").toString().replace(/[^\d]/g,'')) || 0;
}

function avatar(name){
    return name ? name.split(" ").map(n=>n[0]).join("").substring(0,2).toUpperCase() : "NA";
}

async function getData(){
    let res = await fetch(URL);
    let data = await res.json();

    return data.map(r=>({
        name: r["EMPLOYEE NAME"] || "Unknown",
        sales: clean(r["SALES MTD"]),
        proteksi: clean(r["PROTEKSI"]),
        trx: clean(r["TRX"])
    }));
}

/* RENDER TOP 3 HERO */
function renderHero(data,key,containerId){

    let top3 = data
        .filter(d=>d[key]>0)
        .sort((a,b)=>b[key]-a[key])
        .slice(0,3);

    let html="";

    top3.forEach((d,i)=>{
        html+=`
        <div class="hero-card">
            <div style="font-size:18px;font-weight:bold;">#${i+1}</div>
            <div class="avatar">${avatar(d.name)}</div>
            <h1>${d.name}</h1>
            <h2>${d[key].toLocaleString()}</h2>
        </div>`;
    });

    document.getElementById(containerId).innerHTML = html;
}

/* RENDER RANK 4-5 */
function renderList(data,key,containerId){

    let list = data
        .filter(d=>d[key]>0)
        .sort((a,b)=>b[key]-a[key])
        .slice(3,5);

    let html="";

    list.forEach((d,i)=>{
        html+=`
        <div class="card">
            <div>#${i+4}</div>
            <div class="avatar">${avatar(d.name)}</div>
            <h3>${d.name}</h3>
            <h2 style="color:#22c55e">${d[key].toLocaleString()}</h2>
        </div>`;
    });

    document.getElementById(containerId).innerHTML = html;
}

async function update(){
    let data = await getData();

    renderHero(data,"sales","salesHero");
    renderList(data,"sales","salesList");

    renderHero(data,"proteksi","proteksiHero");
    renderList(data,"proteksi","proteksiList");

    renderHero(data,"trx","trxHero");
    renderList(data,"trx","trxList");
}

/* SLIDE AUTO */
let i=0;
setInterval(()=>{
    let slides=document.querySelectorAll(".slide");
    slides[i].classList.remove("active");
    i=(i+1)%slides.length;
    slides[i].classList.add("active");
},6000);

/* AUTO REFRESH */
setInterval(update,15000);

update();

document.body.onclick=()=>document.documentElement.requestFullscreen();

</script>

</body>
</html>
