<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AZKO TV DISPLAY FINAL</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
    overflow:hidden;
}

.header{
    text-align:center;
    padding:20px;
    font-size:32px;
    font-weight:bold;
    background:#22c55e;
}

.hero{
    text-align:center;
    margin-top:20px;
}

.avatar{
    width:140px;height:140px;
    border-radius:50%;
    background:#334155;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.slide{display:none;}
.active{display:block;}
</style>
</head>

<body>

<div class="header">🔥 AZKO PERFORMANCE</div>

<div class="slide active">
<h1 style="text-align:center;">TOP SALES</h1>
<div id="salesHero" class="hero"></div>
<div id="salesList" class="container"></div>
</div>

<div class="slide">
<h1 style="text-align:center;">TOP PROTEKSI</h1>
<div id="proteksiHero" class="hero"></div>
<div id="proteksiList" class="container"></div>
</div>

<div class="slide">
<h1 style="text-align:center;">TOP TRX</h1>
<div id="trxHero" class="hero"></div>
<div id="trxList" class="container"></div>
</div>

<script>

// 🔥 PAKAI JSON (ANTI ERROR CSV)
const SHEET_ID = "2PACX-1vTBNQ3XNfghYuCjCb9yCmeikdYd7QBYr_FKYKNpdQbSx0Vz6J1uVkW_EfEV529fMoyNCI0IYyFZzQix";
const URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/gviz/tq?tqx=out:json`;

// CLEAN ANGKA
function clean(val){
    if(!val) return 0;
    return parseInt(val.toString().replace(/[^\d]/g,'')) || 0;
}

// AVATAR
function avatar(name){
    return name.split(" ").map(n=>n[0]).join("").substring(0,2).toUpperCase();
}

// 🔥 AMBIL DATA (FIX 18 KOLOM)
async function getData(){
    let res = await fetch(URL);
    let text = await res.text();

    // parsing aneh dari Google
    let jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/)[1];
let json = JSON.parse(jsonText);

console.log("JSON:", json);
console.log("ROWS:", json.table.rows);

    let rows = json.table.rows;

    let data = [];

    rows.forEach(r=>{
        let c = r.c;

        if(!c || !c[2]) return;

        data.push({
            name: c[2]?.v || "Unknown",   // EMPLOYEE NAME
            sales: clean(c[6]?.v),        // SALES MTD
            proteksi: clean(c[11]?.v),    // PROTEKSI
            trx: clean(c[15]?.v)          // TRX
        });
    });

    console.log("DATA FIX:", data);

    return data;
}

// RENDER
function render(data,key,heroId,listId){

    let sorted = data
        .filter(d=>d[key] > 0)
        .sort((a,b)=>b[key]-a[key])
        .slice(0,5);

    if(sorted.length === 0) return;

    let top = sorted[0];

    document.getElementById(heroId).innerHTML=`
        <div class="avatar">${avatar(top.name)}</div>
        <h1>👑 ${top.name}</h1>
        <h2 style="color:#22c55e">${top[key].toLocaleString()}</h2>
    `;

    let html="";
    sorted.slice(1).forEach((d,i)=>{
        html+=`
        <div class="card">
            <h2>#${i+2}</h2>
            <div style="font-size:30px">${avatar(d.name)}</div>
            <h3>${d.name}</h3>
            <h2 style="color:#22c55e">${d[key].toLocaleString()}</h2>
        </div>`;
    });

    document.getElementById(listId).innerHTML=html;
}

// UPDATE
async function update(){
    let data = await getData();

    render(data,"sales","salesHero","salesList");
    render(data,"proteksi","proteksiHero","proteksiList");
    render(data,"trx","trxHero","trxList");
}

// SLIDE
let i=0;
setInterval(()=>{
    let slides=document.querySelectorAll(".slide");
    slides[i].classList.remove("active");
    i=(i+1)%slides.length;
    slides[i].classList.add("active");
},6000);

// AUTO REFRESH
setInterval(update,15000);

// LOAD
update();

// FULLSCREEN
document.body.onclick=()=>{
    document.documentElement.requestFullscreen();
}

</script>

</body>
</html>
