<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;800;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:340px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:28px;
}

/* 🔥 TITLE BARU */
.panel-title{
    font-family:'Anton',sans-serif;
    font-size:34px;
    text-align:center;
    margin-bottom:20px;

    color:#ffd400;

    letter-spacing:3px;

    text-shadow:
    0 0 10px rgba(255,210,0,0.6),
    0 0 20px rgba(255,210,0,0.3);
}

/* INPUT */
.form-group{margin-top:18px;}

label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    opacity:0.7;
}

.input-box input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.06);
    color:#fff;
    padding:0 16px;
    font-size:16px;
    border-radius:14px;
}

/* SALES */
.sales-box{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.sales-prefix{
    font-size:11px;
    font-style:italic;
    opacity:0.6;
}

.sales-input-wrap{
    display:flex;
    align-items:center;
    height:55px;
    border-radius:14px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
}

.rp{
    padding:0 12px;
    background:rgba(255,255,255,0.08);
    font-weight:700;
}

/* BUTTON */
.download-btn{
    width:100%;
    height:55px;
    margin-top:20px;

    border:none;
    border-radius:14px;

    background:linear-gradient(135deg,#ff1a1a,#8b0000);
    color:#fff;

    font-weight:800;
    cursor:pointer;
}

/* POSTER */
.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* FOTO */
.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    width:100%;
    height:70%;
    z-index:10;
}

.foto-inner{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
}

.foto-orang{
    height:100%;
    width:auto;
    object-fit:contain;

    -webkit-mask-image: linear-gradient(
        to top,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 30%,
        rgba(0,0,0,1) 100%
    );

    mask-image: linear-gradient(
        to top,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 30%,
        rgba(0,0,0,1) 100%
    );
}

/* NAMA */
.nama-putih{
    position:absolute;
    top:150px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;

    font-family:'Anton',sans-serif;
    font-size:76px;
    letter-spacing:3px;
    color:#fff;
    z-index:4;
}

.nama-outline{
    position:absolute;
    top:230px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;

    font-family:'Anton',sans-serif;
    font-size:72px;
    color:transparent;
    -webkit-text-stroke:1.5px #fff;
    z-index:3;
}

/* NAMA BAWAH */
.nama-bawah{
    position:absolute;
    bottom:42px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;

    font-family:'Roboto Condensed',sans-serif;
    font-size:22px;
    font-weight:700;
}

/* SALES */
.sales-bawah{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
}

.sales-label{
    font-size:12px;
    font-style:italic;
    opacity:0.75;
}

.sales-value{
    font-family:'Roboto Mono',monospace;
    font-size:20px;
    font-weight:700;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

    <!-- 🔥 JUDUL BARU -->
    <div class="panel-title">MENYALA</div>

    <div class="form-group">
        <label>Nama</label>
        <div class="input-box">
            <input id="namaInput" type="text">
        </div>
    </div>

    <div class="form-group">
        <label>Sales</label>

        <div class="sales-box">
            <span class="sales-prefix">sales</span>

            <div class="sales-input-wrap">
                <span class="rp">Rp</span>
                <input id="salesInput" type="text">
            </div>
        </div>

    </div>

    <button class="download-btn" onclick="downloadPoster()">
        DOWNLOAD POSTER
    </button>

</div>

<div class="poster-wrapper" id="poster">

    <img class="poster-template" src="https://putrasetya.github.io/template_posterhero1.png">

    <div class="foto-wrap">
        <div class="foto-inner">
            <img id="fotoOrang" class="foto-orang">
        </div>
    </div>

    <div class="nama-putih" id="namaPutih">NAMA</div>
    <div class="nama-outline" id="namaOutline">NAMA</div>
    <div class="nama-bawah" id="namaBawah">NAMA</div>

    <div class="sales-bawah">
        <span class="sales-label">sales</span>
        <span class="sales-value" id="salesBawah">Rp 0</span>
    </div>

</div>

</div>

<script>

/* INPUT NAMA */
document.getElementById("namaInput").addEventListener("input",e=>{
    let n=e.target.value.toUpperCase()||"NAMA";

    document.getElementById("namaPutih").innerText=n;
    document.getElementById("namaOutline").innerText=n;
    document.getElementById("namaBawah").innerText=n;
});

/* SALES */
document.getElementById("salesInput").addEventListener("input",e=>{
    let v=e.target.value.replace(/[^0-9]/g,"")||"0";
    let f=new Intl.NumberFormat("id-ID").format(v);

    e.target.value=f;
    document.getElementById("salesBawah").innerText="Rp "+f;
});

/* DOWNLOAD */
async function downloadPoster(){

    const canvas=await html2canvas(document.getElementById("poster"),{
        scale:3,
        useCORS:true
    });

    const nama=document.getElementById("namaInput").value.toUpperCase()||"NAMA";
    const sales=document.getElementById("salesInput").value.replace(/[^0-9]/g,"")||"0";

    const filename=`${nama}_${sales}.png`;

    const link=document.createElement("a");
    link.download=filename;
    link.href=canvas.toDataURL("image/png");
    link.click();
}

</script>

</body>
</html>
