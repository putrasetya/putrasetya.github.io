<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster Pahlawan Hari Ini</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#101010;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

/* =========================
   LAYOUT
========================= */

.wrapper{
    display:flex;
    gap:30px;
    align-items:flex-start;
    justify-content:center;
    flex-wrap:wrap;
}

/* =========================
   FORM
========================= */

.form-box{
    width:380px;
    background:#1b1b1b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.form-box h2{
    margin-bottom:25px;
    font-size:28px;
    font-weight:800;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
}

.form-group input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#2a2a2a;
    color:#fff;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#ff0019;
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
    margin-top:10px;
}

button:hover{
    transform:translateY(-2px);
    background:#ff2237;
}

.download-btn{
    background:#ffffff;
    color:#111;
    margin-top:15px;
}

/* =========================
   POSTER
========================= */

.poster{
    position:relative;
    width:430px;
    height:765px;
    overflow:hidden;
    background:
    radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 20%),
    linear-gradient(180deg,#f10518 0%,#d30014 45%,#cf0012 100%);
}

/* DOT TEXTURE */
.poster::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
    radial-gradient(rgba(255,255,255,.20) 1px, transparent 1px);
    background-size:8px 8px;
    opacity:.10;
}

/* =========================
   HEADER
========================= */

.header{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:220px;
    height:80px;
    background:#fff;
    border-radius:0 0 28px 28px;
    z-index:20;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    text-align:center;
}

.logo-top{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:5px;
}

.azko{
    font-size:30px;
    font-weight:900;
    color:#d91c23;
}

.citimall{
    font-size:25px;
    font-weight:800;
    color:#f2d300;
}

.tuban{
    display:block;
    text-align:right;
    padding-right:8px;
    margin-top:2px;
    font-size:16px;
    font-weight:800;
    color:#111;
    font-style:italic;
}

/* =========================
   TITLE BAR
========================= */

.title-bar{
    position:absolute;
    top:115px;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    height:42px;
    background:#fff;
    z-index:10;
    display:flex;
    justify-content:center;
    align-items:center;
}

.title-bar::before,
.title-bar::after{
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    background:#d70016;
    top:50%;
    transform:translateY(-50%);
}

.title-bar::before{
    left:14px;
}

.title-bar::after{
    right:14px;
}

.title-bar span{
    color:#d70016;
    font-size:18px;
    font-weight:700;
    letter-spacing:3px;
}

/* =========================
   BIG TEXT
========================= */

.big-text{
    position:absolute;
    top:170px;
    width:100%;
    text-align:center;
    z-index:2;
    line-height:.86;
}

.big-text .solid{
    font-size:110px;
    font-weight:900;
    color:#fff;
}

.big-text .outline{
    font-size:100px;
    font-weight:900;
    color:transparent;
    -webkit-text-stroke:3px rgba(255,255,255,.95);
}

/* =========================
   MODEL
========================= */

.model{
    position:absolute;
    bottom:130px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
    width:320px;
}

.model img{
    width:100%;
    display:block;
    object-fit:contain;
    filter:
    drop-shadow(0 10px 30px rgba(0,0,0,.4));
}

/* =========================
   BOTTOM
========================= */

.bottom{
    position:absolute;
    bottom:45px;
    width:100%;
    text-align:center;
    z-index:10;
}

.divider{
    width:180px;
    height:2px;
    background:#fff;
    margin:0 auto 15px;
    position:relative;
}

.divider::before{
    content:"✦";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:#d10013;
    color:#fff;
    padding:0 10px;
    font-size:20px;
}

.nama{
    font-size:54px;
    line-height:1;
    color:#fff;
    font-weight:900;
}

.role{
    margin-top:8px;
    color:#fff;
    font-size:22px;
    font-weight:300;
}

.role b{
    font-weight:800;
}

/* =========================
   SIDE ZIGZAG
========================= */

.zig-left,
.zig-right{
    position:absolute;
    width:40px;
    height:170px;
    z-index:1;
}

.zig-left{
    left:-5px;
    top:180px;
}

.zig-right{
    right:-5px;
    top:380px;
    transform:rotate(180deg);
}

.zig{
    width:100%;
    height:100%;
    background:
    linear-gradient(135deg, transparent 74%, #fff 74%) 0 0/20px 20px,
    linear-gradient(225deg, transparent 74%, #fff 74%) 0 0/20px 20px;
}

/* =========================
   CORNER
========================= */

.corner-left,
.corner-right{
    position:absolute;
    width:100px;
    height:100px;
    background:#fff;
    bottom:-50px;
    transform:rotate(45deg);
    z-index:1;
}

.corner-left{
    left:-50px;
}

.corner-right{
    right:-50px;
}

.line-left,
.line-right{
    position:absolute;
    width:100px;
    height:2px;
    background:rgba(255,255,255,.7);
    bottom:55px;
    z-index:3;
}

.line-left{
    left:-10px;
    transform:rotate(45deg);
}

.line-right{
    right:-10px;
    transform:rotate(-45deg);
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    body{
        padding:15px;
    }

    .wrapper{
        flex-direction:column;
        align-items:center;
    }

    .form-box{
        width:100%;
        max-width:430px;
    }

}

</style>
</head>

<body>

<div class="wrapper">

    <!-- ================= FORM ================= -->

    <div class="form-box">

        <h2>Generator Poster</h2>

        <div class="form-group">
            <label>Nama</label>
            <input type="text" id="inputNama" placeholder="Masukkan nama">
        </div>

        <div class="form-group">
            <label>Jumlah Sales</label>
            <input type="text" id="inputSales" placeholder="Contoh: 15.000.000">
        </div>

        <button onclick="generatePoster()">
            GENERATE POSTER
        </button>

        <button class="download-btn" onclick="downloadPoster()">
            DOWNLOAD POSTER
        </button>

    </div>

    <!-- ================= POSTER ================= -->

    <div class="poster" id="poster">

        <!-- HEADER -->
        <div class="header">
            <div class="logo">

                <div class="logo-top">
                    <div class="azko">az•KO</div>
                    <div class="citimall">Citimall</div>
                </div>

                <div class="tuban">Tuban</div>

            </div>
        </div>

        <!-- ZIG -->
        <div class="zig-left">
            <div class="zig"></div>
        </div>

        <div class="zig-right">
            <div class="zig"></div>
        </div>

        <!-- TITLE -->
        <div class="title-bar">
            <span>PAHLAWAN HARI INI</span>
        </div>

        <!-- BIG TEXT -->
        <div class="big-text">
            <div class="solid" id="bigNama1">NAMA</div>
            <div class="outline" id="bigNama2">NAMA</div>
        </div>

        <!-- FOTO -->
        <div class="model">
            <img id="fotoUser"
            src="https://i.imgur.com/7D7I6dI.png">
        </div>

        <!-- BOTTOM -->
        <div class="bottom">

            <div class="divider"></div>

            <div class="nama" id="namaText">
                NAMA
            </div>

            <div class="role">
                sales <b id="salesText">Rp....</b>
            </div>

        </div>

        <!-- CORNER -->
        <div class="corner-left"></div>
        <div class="corner-right"></div>

        <div class="line-left"></div>
        <div class="line-right"></div>

    </div>

</div>

<script>

/* =========================================
   DATABASE FOTO USER
   GANTI DENGAN LINK FOTO GDRIVE
========================================= */

const databaseFoto = {

    "PUTRA":
    "https://drive.google.com/thumbnail?id=FILE_ID_1",

    "MARIA":
    "https://drive.google.com/thumbnail?id=FILE_ID_2",

    "BUDI":
    "https://drive.google.com/thumbnail?id=FILE_ID_3"

};

/* =========================================
   GENERATE POSTER
========================================= */

function generatePoster(){

    const namaInput =
    document.getElementById("inputNama")
    .value
    .trim();

    const salesInput =
    document.getElementById("inputSales")
    .value
    .trim();

    if(namaInput === ""){

        alert("Masukkan nama!");
        return;

    }

    // UBAH NAMA
    document.getElementById("namaText")
    .innerText = namaInput.toUpperCase();

    document.getElementById("bigNama1")
    .innerText = namaInput.toUpperCase();

    document.getElementById("bigNama2")
    .innerText = namaInput.toUpperCase();

    // UBAH SALES
    document.getElementById("salesText")
    .innerText = "Rp " + salesInput;

    // CARI FOTO DARI DATABASE
    const key = namaInput.toUpperCase();

    if(databaseFoto[key]){

        document.getElementById("fotoUser")
        .src = databaseFoto[key];

    }

}

/* =========================================
   DOWNLOAD POSTER
========================================= */

function downloadPoster(){

    html2canvas(document.getElementById("poster"),{
        scale:3,
        useCORS:true
    }).then(canvas=>{

        const link = document.createElement("a");

        link.download = "poster-pahlawan.png";

        link.href = canvas.toDataURL();

        link.click();

    });

}

</script>

</body>
</html>
