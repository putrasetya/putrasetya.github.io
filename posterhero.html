<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;800;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* ===== PANEL ===== */
.panel{
    width:340px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:28px;
}

.panel-title{
    font-family:'Anton',sans-serif;
    font-size:34px;
    text-align:center;
    margin-bottom:22px;
    color:#ffd400;
}

/* INPUT */
input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.04);
    color:#fff;
    padding:0 10px;
    font-size:16px;
    border-bottom:1px solid rgba(255,255,255,0.15);
}

/* SALES */
.sales-wrap{
    display:flex;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.sales-wrap span{
    padding:0 12px;
    opacity:0.7;
}

/* BUTTON */
button{
    width:100%;
    height:52px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ff1a1a,#7a0000);
    color:#fff;
    font-weight:800;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #fff;
    border-radius:50%;
    display:none;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* ===== POSTER ===== */
.poster{
    width:430px;
    position:relative;
    overflow:hidden;
    border-radius:28px;
}

/* BACKGROUND */
.poster img.bg{
    width:100%;
    display:block;
}

/* ===== FOTO ===== */
.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    height:70%;
    display:flex;
    align-items:flex-end;
}

/* FOTO */
.foto-wrap img{
    height:100%;
    width:auto;
    object-fit:cover;
}

/* 🔥 GRADIENT REAL (DOM SAFE, EXPORT STABLE) */
.foto-fade{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:60%;
    pointer-events:none;

    background:linear-gradient(
        to top,
        rgba(0,0,0,0.85),
        rgba(0,0,0,0.35),
        transparent
    );
}

/* ===== TEXT ===== */
.nama1,.nama2,.nama3{
    position:absolute;
    width:100%;
    text-align:center;
}

.nama1{
    top:150px;
    font-family:'Anton';
    font-size:76px;
}

.nama2{
    top:230px;
    font-family:'Anton';
    font-size:72px;
    color:transparent;
    -webkit-text-stroke:1.5px #fff;
}

.nama3{
    bottom:42px;
    font-family:'Roboto Condensed';
}

.sales{
    position:absolute;
    bottom:14px;
    width:100%;
    text-align:center;
    font-family:'Roboto Mono';
    white-space:nowrap;
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

<div class="panel-title">MENYALA</div>

<input id="namaInput" placeholder="Nama">

<div class="sales-wrap">
<span>Rp</span>
<input id="salesInput">
</div>

<button onclick="downloadPoster()">
<div class="spinner" id="spinner"></div>
DOWNLOAD
</button>

</div>

<!-- POSTER -->
<div class="poster" id="poster">

<img class="bg" src="https://putrasetya.github.io/template_posterhero1.png">

<!-- FOTO -->
<div class="foto-wrap">
    <img id="foto">
    <div class="foto-fade"></div>
</div>

<!-- TEXT -->
<div class="nama1" id="n1">NAMA</div>
<div class="nama2" id="n2">NAMA</div>
<div class="nama3" id="n3">NAMA</div>

<div class="sales" id="s">Rp 0</div>

</div>

</div>

<script>

/* FOTO DATA */
const people=[
{keywords:["AFIF"],photo:"https://lh3.googleusercontent.com/d/12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7=w1000"},
{keywords:["PUTRA"],photo:"https://lh3.googleusercontent.com/d/1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2=w1000"}
];

/* FOTO MATCH */
function updatePhoto(n){
let up=n.toUpperCase();
let img=document.getElementById("foto");

let found=null;

people.forEach(p=>{
if(p.keywords.some(k=>up.includes(k))) found=p.photo;
});

img.src=found||"";
}

/* INPUT */
document.getElementById("namaInput").oninput=(e)=>{
let v=e.target.value||"NAMA";
updatePhoto(v);
n1.innerText=v;
n2.innerText=v;
n3.innerText=v;
};

/* SALES */
document.getElementById("salesInput").oninput=(e)=>{
let v=e.target.value.replace(/[^0-9]/g,"")||"0";
let f=new Intl.NumberFormat("id-ID").format(v);
e.target.value=f;
s.innerText="Rp "+f;
};

/* DOWNLOAD STABLE (CLONE RENDER) */
async function downloadPoster(){

spinner.style.display="inline-block";

let poster=document.getElementById("poster");
let clone=poster.cloneNode(true);

clone.style.position="absolute";
clone.style.left="-9999px";
document.body.appendChild(clone);

let canvas=await html2canvas(clone,{
scale:3,
useCORS:true,
backgroundColor:null
});

document.body.removeChild(clone);

let a=document.createElement("a");
a.download="poster.png";
a.href=canvas.toDataURL("image/png");
a.click();

spinner.style.display="none";
}

</script>

</body>
</html>
