<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;800;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

/* ================= BASE ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:340px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:28px;
}

.panel-title{
    font-family:'Anton',sans-serif;
    font-size:34px;
    text-align:center;
    margin-bottom:22px;
    color:#ffd400;
}

/* INPUT */
.form-group{margin-top:18px;}

label{
    display:block;
    margin-bottom:8px;
    font-size:12px;
    opacity:0.6;
}

.input-box input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.04);
    color:#fff;
    padding:0 10px;
    font-size:16px;
    border-bottom:1px solid rgba(255,255,255,0.15);
}

/* SALES */
.sales-input-wrap{
    display:flex;
    align-items:center;
    height:52px;
    border-bottom:1px solid rgba(255,255,255,0.18);
}

.sales-input-wrap input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
    font-size:16px;
    padding:0 10px;
}

.rp{
    padding:0 12px;
    font-weight:800;
    opacity:0.7;
}

/* BUTTON */
.download-btn{
    width:100%;
    height:52px;
    margin-top:24px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ff1a1a,#7a0000);
    color:#fff;
    font-weight:800;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #fff;
    border-radius:50%;
    display:none;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* ================= POSTER ================= */

.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* ================= FOTO (FIX FINAL STABLE) ================= */

.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    width:100%;
    height:70%;
    z-index:50;
}

.foto-inner{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
}

/* FOTO UTAMA */
.foto-orang{
    height:100%;
    width:auto;
    object-fit:cover;
    display:block;
}

/* 🔥 GRADIENT HALUS (TIDAK KOTAK, EXPORT SAFE) */
.foto-fade{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    height:60%;
    pointer-events:none;

    background:radial-gradient(
        ellipse at bottom,
        rgba(0,0,0,0.70) 0%,
        rgba(0,0,0,0.35) 45%,
        rgba(0,0,0,0) 100%
    );
}

/* ================= NAMA ================= */

.nama-putih{
    position:absolute;
    top:150px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;
    font-family:'Anton',sans-serif;
    font-size:76px;
    color:#fff;
}

.nama-outline{
    position:absolute;
    top:230px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;
    font-family:'Anton',sans-serif;
    font-size:72px;
    color:transparent;
    -webkit-text-stroke:1.5px #fff;
}

.nama-bawah{
    position:absolute;
    bottom:42px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Roboto Condensed',sans-serif;
    font-size:22px;
}

/* SALES */
.sales-bawah{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
}

.sales-value{
    font-family:'Roboto Mono',monospace;
    font-size:20px;
    font-weight:700;
    white-space:nowrap;
}

/* LOADING */
.spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #fff;
    border-radius:50%;
    display:none;
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

    <div class="panel-title">MENYALA</div>

    <input id="namaInput" placeholder="Nama">

    <div class="sales-input-wrap">
        <span class="rp">Rp</span>
        <input id="salesInput">
    </div>

    <button class="download-btn" onclick="downloadPoster()">
        <div class="spinner" id="spinner"></div>
        DOWNLOAD
    </button>

</div>

<!-- POSTER -->
<div class="poster-wrapper" id="poster">

    <img class="poster-template" src="https://putrasetya.github.io/template_posterhero1.png">

    <!-- FOTO -->
    <div class="foto-wrap">
        <div class="foto-inner">

            <img id="fotoOrang" class="foto-orang">

            <!-- GRADIENT SAFE -->
            <div class="foto-fade"></div>

        </div>
    </div>

    <!-- NAMA -->
    <div class="nama-putih" id="namaPutih">NAMA</div>
    <div class="nama-outline" id="namaOutline">NAMA</div>
    <div class="nama-bawah" id="namaBawah">NAMA</div>

</div>

</div>

<script>

/* FOTO SYSTEM */
const people=[
 {keywords:["AFIF"],photo:"https://lh3.googleusercontent.com/d/12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7=w1000"},
 {keywords:["PUTRA"],photo:"https://lh3.googleusercontent.com/d/1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2=w1000"}
];

function updatePhoto(n){
 const img=document.getElementById("fotoOrang");
 const up=n.toUpperCase();
 let found=null;

 for(const p of people){
  if(p.keywords.some(k=>up.includes(k))){
   found=p.photo;
   break;
  }
 }

 img.src=found||"";
}

/* INPUT */
document.getElementById("namaInput").addEventListener("input",e=>{
 let n=e.target.value||"NAMA";
 updatePhoto(n);
 document.getElementById("namaPutih").innerText=n;
 document.getElementById("namaOutline").innerText=n;
 document.getElementById("namaBawah").innerText=n;
});

/* SALES FORMAT */
document.getElementById("salesInput").addEventListener("input",e=>{
 let v=e.target.value.replace(/[^0-9]/g,"")||"0";
 let f=new Intl.NumberFormat("id-ID").format(v);
 e.target.value=f;
});

/* DOWNLOAD */
async function downloadPoster(){

 document.getElementById("spinner").style.display="inline-block";

 const canvas=await html2canvas(document.getElementById("poster"),{
  scale:3,
  useCORS:true,
  backgroundColor:null
 });

 const a=document.createElement("a");
 a.download="poster.png";
 a.href=canvas.toDataURL("image/png");
 a.click();

 document.getElementById("spinner").style.display="none";
}

</script>

</body>
</html>
