<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700;800;900&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:340px;
    background:#070707;
    border:1px solid #ff1a1a;
    border-radius:28px;
    padding:28px;
}

/* INPUT */
.form-group{margin-top:20px;}
label{display:block;margin-bottom:10px;font-weight:600;}

.input-box input{
    width:100%;
    height:60px;
    border:none;
    outline:none;
    background:#121212;
    color:#fff;
    padding:0 18px;
    font-size:18px;
    border-radius:16px;
}

/* SALES */
.sales-box{display:flex;flex-direction:column;gap:8px;}

.sales-prefix{
    font-size:12px;
    font-style:italic;
    opacity:0.7;
}

.sales-input-wrap{
    display:flex;
    align-items:center;
    height:60px;
    border-radius:16px;
    background:#121212;
    border:1px solid #333;
    overflow:hidden;
}

.rp{
    padding:0 14px;
    background:#1b1b1b;
    font-weight:800;
    border-right:1px solid #2a2a2a;
}

.sales-input-wrap input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:#fff;
    font-size:18px;
    font-weight:700;
    padding:0 14px;
}

/* BUTTON */
.btn{
    width:100%;
    height:60px;
    margin-top:18px;
    border:none;
    border-radius:16px;
    font-weight:800;
    background:#00c853;
    color:#fff;
}

/* POSTER */
.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* =========================
   FOTO FIX MASK OBJECT ONLY
========================= */

.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    width:100%;
    height:70%;
    z-index:15;
}

.foto-inner{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    overflow:hidden;
}

/* FOTO TANPA DISTORT + MASK OBJEK */
.foto-orang{
    height:100%;
    width:auto;
    max-width:100%;
    object-fit:cover;
    object-position:center bottom;

    /* 🔥 GRADASI HANYA DI OBJEK FOTO */
    -webkit-mask-image: linear-gradient(
        to top,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 30%,
        rgba(0,0,0,1) 100%
    );

    mask-image: linear-gradient(
        to top,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 30%,
        rgba(0,0,0,1) 100%
    );
}

/* NAMA */
.nama-putih{
    position:absolute;
    top:170px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;
    font-family:'Anton',sans-serif;
    font-size:72px;
    color:#fff;
    font-weight:900;
}

.nama-outline{
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;
    font-family:'Anton',sans-serif;
    font-size:68px;
    color:transparent;
    -webkit-text-stroke:1.5px #fff;
    font-weight:900;
}

/* SALES */
.sales-bawah{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    color:#fff;
}

.sales-label{
    font-size:13px;
    font-style:italic;
    opacity:0.75;
}

.sales-value{
    font-family:'Poppins',sans-serif;
    font-size:22px;
    font-weight:700;
    text-shadow:0 2px 6px rgba(0,0,0,0.35);
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

    <div class="form-group">
        <label>Nama</label>
        <div class="input-box">
            <input type="text" id="namaInput">
        </div>
    </div>

    <div class="form-group">
        <label>Sales</label>

        <div class="sales-box">
            <span class="sales-prefix">sales</span>

            <div class="sales-input-wrap">
                <span class="rp">Rp</span>
                <input type="text" id="salesInput">
            </div>
        </div>

    </div>

    <button class="btn" onclick="downloadPoster()">DOWNLOAD</button>

</div>

<!-- POSTER -->
<div class="poster-wrapper" id="poster">

    <img src="https://putrasetya.github.io/template_posterhero1.png" class="poster-template">

    <div class="foto-wrap">
        <div class="foto-inner">
            <img id="fotoOrang" class="foto-orang">
        </div>
    </div>

    <div class="nama-putih" id="namaPutih">NAMA</div>
    <div class="nama-outline" id="namaOutline">NAMA</div>

    <div class="sales-bawah">
        <span class="sales-label">sales</span>
        <span class="sales-value" id="salesBawah">Rp 0</span>
    </div>

</div>

</div>

<script>

/* FOTO DB */
const people=[
{keywords:["AFIF","AFI"],photo:"12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7"},
{keywords:["PUTRA"],photo:"1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2"}
];

/* FOTO */
function updatePhoto(nama){
    const img=document.getElementById("fotoOrang");
    let found=false;

    for(const p of people){
        for(const k of p.keywords){
            if(nama.includes(k)){
                img.src="https://lh3.googleusercontent.com/d/"+p.photo+"=w1000";
                found=true;
                break;
            }
        }
        if(found) break;
    }

    if(!found) img.src="";
}

/* NAMA */
document.getElementById("namaInput").addEventListener("input",function(){
    let n=this.value.toUpperCase();
    if(!n) n="NAMA";
    updatePhoto(n);
    document.getElementById("namaPutih").innerText=n;
    document.getElementById("namaOutline").innerText=n;
});

/* SALES */
document.getElementById("salesInput").addEventListener("input",function(){
    let v=this.value.replace(/[^0-9]/g,"");
    if(!v) v="0";
    this.value=new Intl.NumberFormat("id-ID").format(v);
    document.getElementById("salesBawah").innerText="Rp "+new Intl.NumberFormat("id-ID").format(v);
});

/* DOWNLOAD */
function downloadPoster(){
    html2canvas(document.getElementById("poster"),{
        scale:3,
        useCORS:true,
        backgroundColor:null
    }).then(canvas=>{
        let a=document.createElement("a");
        a.download="poster.png";
        a.href=canvas.toDataURL("image/png");
        a.click();
    });
}

</script>

</body>
</html>
