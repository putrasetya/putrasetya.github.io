<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;800;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<style>

/* BASE */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:360px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:28px;
}

.panel-title{
    font-family:'Anton';
    font-size:34px;
    text-align:center;
    margin-bottom:22px;
    color:#ffd400;
}

/* INPUT */
.form-group{
    margin-bottom:14px;
}

label{
    font-size:11px;
    opacity:0.7;
    display:block;
    margin-bottom:6px;
}

.input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.05);
    color:#fff;
    padding:0 12px;
    border-radius:10px;
}

/* RUPIAH */
.rupiah{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
}

.rp{
    padding:0 12px;
    opacity:0.7;
}

.rupiah input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
}

/* BUTTON */
button{
    width:100%;
    height:52px;
    margin-top:10px;
    background:red;
    border:none;
    color:#fff;
    font-weight:800;
    border-radius:12px;
    cursor:pointer;
}

/* ================= POSTER ================= */
.poster{
    width:430px;
    position:relative;
    border-radius:28px;
    overflow:hidden;
}

.poster img.bg{
    width:100%;
    display:block;
}

/* FOTO ORANG */
.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    height:70%;
    display:flex;
    align-items:flex-end;
    z-index:50;
}

.foto-wrap img{
    height:100%;
}

/* UPLOAD FOTO */
.upload-layer{
    position:absolute;
    bottom:110px;
    left:50%;
    transform:translateX(-50%);
    z-index:60;
}

.upload-layer img{
    width:140px;
    height:140px;
    object-fit:cover;
    border-radius:12px;
}

/* NAMA */
.nama1,.nama2,.nama3{
    position:absolute;
    width:100%;
    text-align:center;
    z-index:10;
}

.nama1{
    top:120px;
    font-family:'Anton';
    font-size:76px;
}

.nama2{
    top:200px;
    font-family:'Anton';
    font-size:72px;
    color:transparent;
    -webkit-text-stroke:1.5px #fff;
}

/* 🔥 PERUBAHAN DI SINI */
.nama3{
    bottom:42px;
    font-family:'Poppins',sans-serif;
    font-weight:900; /* sebelumnya 600 → sekarang BOLD */
    font-size:18px;
}

/* SALES */
.sales{
    position:absolute;
    bottom:14px;
    width:100%;
    text-align:center;
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:18px;
    white-space:nowrap;
}

/* MODAL CROPPER */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.modal-box{
    width:92%;
    max-width:420px;
    background:#111;
    padding:14px;
    border-radius:14px;
}

#cropImage{
    width:100%;
    max-height:420px;
}

.modal-actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.modal-actions button{
    flex:1;
    height:46px;
    border:none;
    border-radius:10px;
    font-weight:800;
    cursor:pointer;
}

.modal-actions button:first-child{background:#00c853;}
.modal-actions button:last-child{background:#d50000;}

/* LOADING */
.spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #fff;
    border-radius:50%;
    display:none;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.download-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

<div class="panel-title">MENYALA</div>

<div class="form-group">
    <label>Nama Sales</label>
    <input class="input" id="namaInput">
</div>

<div class="form-group">
    <label>Nominal</label>
    <div class="rupiah">
        <span class="rp">Rp</span>
        <input id="salesInput">
    </div>
</div>

<div class="form-group">
    <label>Upload Foto Struk</label>
    <input type="file" id="uploadInput">
</div>

<button id="downloadBtn" onclick="downloadPoster()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">DOWNLOAD POSTER</span>
</button>

</div>

<!-- POSTER -->
<div class="poster" id="poster">

<img class="bg" src="https://putrasetya.github.io/template_posterhero1.png">

<div class="foto-wrap">
<img id="foto">
</div>

<div class="upload-layer">
<img id="uploadPreview">
</div>

<div class="nama1" id="n1">NAMA</div>
<div class="nama2" id="n2">NAMA</div>
<div class="nama3" id="n3">NAMA</div>

<div class="sales" id="s">Rp 0</div>

</div>

</div>

<script>

/* FOTO SYSTEM */
const people=[
{keywords:["AFIF"],photo:"https://lh3.googleusercontent.com/d/12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7=w1000"},
{keywords:["PUTRA"],photo:"https://lh3.googleusercontent.com/d/1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2=w1000"}
];

function updatePhoto(n){
let up=n.toUpperCase();
let img=document.getElementById("foto");
let found=null;

people.forEach(p=>{
if(p.keywords.some(k=>up.includes(k))) found=p.photo;
});

img.src=found||"";
}

/* INPUT */
namaInput.oninput=(e)=>{
let v=e.target.value||"NAMA";
updatePhoto(v);
n1.innerText=v;
n2.innerText=v;
n3.innerText=v;
};

salesInput.oninput=(e)=>{
let v=e.target.value.replace(/[^0-9]/g,"")||"0";
let f=new Intl.NumberFormat("id-ID").format(v);
e.target.value=f;
s.innerText="Rp "+f;
};

/* CROPPER */
let cropper;

uploadInput.onchange=(e)=>{
let file=e.target.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=(ev)=>{
modal.style.display="flex";
cropImage.src=ev.target.result;

setTimeout(()=>{
cropper=new Cropper(cropImage,{
aspectRatio:1,
viewMode:1
});
},200);
};
reader.readAsDataURL(file);
};

function cropSave(){
let canvas=cropper.getCroppedCanvas({width:300,height:300});
uploadPreview.src=canvas.toDataURL("image/png");
cropper.destroy();
modal.style.display="none";
}

function closeModal(){
cropper.destroy();
modal.style.display="none";
}

/* DOWNLOAD */
async function downloadPoster(){

const btn=document.getElementById("downloadBtn");
const spinner=document.getElementById("spinner");
const text=document.getElementById("btnText");

btn.disabled=true;
spinner.style.display="inline-block";
text.innerText="PROCESSING...";

await new Promise(r=>setTimeout(r,300));

const canvas=await html2canvas(document.getElementById("poster"),{
scale:3,
useCORS:true,
backgroundColor:null
});

const nama=document.getElementById("namaInput").value||"NAMA";
const sales=document.getElementById("salesInput").value.replace(/[^0-9]/g,"")||"0";

const a=document.createElement("a");
a.download=`${nama}_${sales}.png`;
a.href=canvas.toDataURL("image/png");
a.click();

setTimeout(()=>{
btn.disabled=false;
spinner.style.display="none";
text.innerText="DOWNLOAD POSTER";
},800);

}

</script>

</body>
</html>
