function updatePhoto(n){

let up=n.toUpperCase();

let img=document.getElementById("foto");

let found=null;

for(let p of people){

if(
p.keywords.some(
k=>up.includes(k.toUpperCase())
)
){
found=p.photo;
break;
}

}

img.src=found||"";

}

/* INPUT */

namaInput.oninput=(e)=>{

let v=e.target.value||"NAMA";

updatePhoto(v);

n1.innerText=v;
n2.innerText=v;
n3.innerText=v;

};

salesInput.oninput=(e)=>{

let v=e.target.value.replace(/[^0-9]/g,"")||"0";

let f=new Intl.NumberFormat("id-ID").format(v);

e.target.value=f;

s.innerText="Rp "+f;

};

/* CROPPER */

let cropper;

uploadInput.onchange=(e)=>{

let file=e.target.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=(ev)=>{

document.getElementById("modal").style.display="flex";

document.getElementById("cropImage").src=ev.target.result;

setTimeout(()=>{

if(cropper) cropper.destroy();

cropper=new Cropper(
document.getElementById("cropImage"),
{
aspectRatio:1,
viewMode:1
}
);

},200);

};

reader.readAsDataURL(file);

};

function cropSave(){

let canvas=cropper.getCroppedCanvas({
width:300,
height:300
});

document.getElementById("uploadPreview").src=
canvas.toDataURL("image/png");

if(cropper) cropper.destroy();

document.getElementById("modal").style.display="none";

}

function closeModal(){

if(cropper) cropper.destroy();

document.getElementById("modal").style.display="none";

}

/* DOWNLOAD */

async function downloadPoster(){

const btn=document.getElementById("downloadBtn");

const spinner=document.getElementById("spinner");

const text=document.getElementById("btnText");

btn.disabled=true;

spinner.style.display="inline-block";

text.innerText="PROCESSING...";

await new Promise(r=>setTimeout(r,300));

const canvas=await html2canvas(
document.getElementById("poster"),
{
scale:3,
useCORS:true,
backgroundColor:null
}
);

const nama=
document.getElementById("namaInput").value||"NAMA";

const sales=
document.getElementById("salesInput")
.value.replace(/[^0-9]/g,"")||"0";

const a=document.createElement("a");

a.download=`${nama}_${sales}.png`;

a.href=canvas.toDataURL("image/png");

a.click();

setTimeout(()=>{

btn.disabled=false;

spinner.style.display="none";

text.innerText="DOWNLOAD POSTER";

},800);

}
