<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:320px;
    background:#070707;
    border:1px solid #ff1a1a;
    border-radius:28px;
    padding:28px;
}

.form-group{
    margin-top:20px;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:600;
}

.input-box{
    width:100%;
    height:65px;
    border-radius:18px;
    border:1px solid #444;
    background:#121212;
    display:flex;
    align-items:center;
}

.input-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
    padding:0 20px;
    font-size:18px;
}

.btn{
    width:100%;
    height:60px;
    border:none;
    border-radius:18px;
    margin-top:15px;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    background:#ff1a1a;
    color:#fff;
}

.download-btn{
    background:#00c853;
}

/* POSTER */
.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* =========================
   FOTO FIX (ANTI KETARIK)
========================= */

.foto-orang{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);

    height:70%;
    width:auto;
    max-width:120%;

    object-fit:cover;
    object-position:center bottom;

    z-index:15;
    pointer-events:none;

    filter: drop-shadow(0 18px 28px rgba(0,0,0,.45));
}

/* NAMA */
.nama-putih,
.nama-outline{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:84%;
    text-align:center;
    font-family:'Anton',sans-serif;
    text-transform:uppercase;
    letter-spacing:2px;
    white-space:nowrap;
    overflow:hidden;
}

.nama-putih{
    top:165px;
    color:#fff;
    z-index:10;
}

.nama-outline{
    top:288px;
    color:transparent;
    -webkit-text-stroke:2.5px #fff;
    z-index:9;
}

/* BAWAH */
.nama-bawah{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;
    font-size:32px;
    font-weight:900;
    color:#fff;
    z-index:20;
}

.sales-bawah{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    z-index:20;
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

    <div class="form-group">
        <label>Nama</label>
        <div class="input-box">
            <input type="text" id="namaInput" placeholder="Masukkan nama">
        </div>
    </div>

    <div class="form-group">
        <label>Sales</label>
        <div class="input-box">
            <input type="text" id="salesInput" placeholder="Masukkan sales">
        </div>
    </div>

    <button class="btn" onclick="generatePoster()">GENERATE</button>

    <button class="btn download-btn" onclick="downloadPoster()">
        DOWNLOAD POSTER
    </button>

</div>

<!-- POSTER -->
<div class="poster-wrapper" id="poster">

    <img src="https://putrasetya.github.io/template_posterhero1.png" class="poster-template">

    <img id="fotoOrang" class="foto-orang" src="">

    <div class="nama-putih" id="namaPutih">NAMA</div>
    <div class="nama-outline" id="namaOutline">NAMA</div>

    <div class="nama-bawah" id="namaBawah"></div>

    <div class="sales-bawah">
        <span id="salesBawah">Rp0</span>
    </div>

</div>

</div>

<script>

/* DATABASE FOTO */
const people = [
{
    keywords:["AFIF","AFI","APIP"],
    photo:"12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7"
},
{
    keywords:["PUTRA","PUT"],
    photo:"1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2"
},
{
    keywords:["BUDI"],
    photo:"1s3OEJyXr-_i5p8D0hKw-aCCbcgLQwWxi"
}
];

/* FOTO FIX */
function updatePhoto(nama){

    const foto = document.getElementById("fotoOrang");
    let found = false;

    for(const person of people){
        for(const key of person.keywords){

            if(nama.includes(key)){

                foto.src =
                "https://lh3.googleusercontent.com/d/"
                + person.photo
                + "=w1000";

                found = true;
                break;
            }
        }
        if(found) break;
    }

    if(!found){
        foto.src = "";
    }
}

/* GENERATE */
function generatePoster(){

    let nama = document.getElementById("namaInput").value.trim().toUpperCase();
    let sales = document.getElementById("salesInput").value.trim();

    if(!nama) nama="NAMA";
    if(!sales) sales="0";

    updatePhoto(nama);

    document.getElementById("namaPutih").innerText = nama;
    document.getElementById("namaOutline").innerText = nama;
    document.getElementById("namaBawah").innerText = nama;
    document.getElementById("salesBawah").innerText = "Rp" + sales;
}

/* DOWNLOAD FIX HD */
function downloadPoster(){

    const poster = document.getElementById("poster");

    html2canvas(poster, {
        useCORS: true,
        allowTaint: false,
        scale: 3,
        backgroundColor: null,
        imageTimeout: 0
    }).then(canvas => {

        const link = document.createElement("a");
        link.download = "poster.png";
        link.href = canvas.toDataURL("image/png");
        link.click();

    });

}

/* AUTO UPDATE */
document.getElementById("namaInput").addEventListener("input", generatePoster);
document.getElementById("salesInput").addEventListener("input", generatePoster);

</script>

</body>
</html>
