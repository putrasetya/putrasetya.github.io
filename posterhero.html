<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:320px;
    background:#070707;
    border:1px solid #ff1a1a;
    border-radius:28px;
    padding:28px;
}

.form-group{
    margin-top:20px;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:600;
}

.input-box input{
    width:100%;
    height:60px;
    border:none;
    outline:none;
    background:#121212;
    color:#fff;
    padding:0 20px;
    font-size:18px;
    border-radius:16px;
}

/* BUTTON */
.btn{
    width:100%;
    height:60px;
    margin-top:15px;
    border:none;
    border-radius:16px;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    background:#00c853;
    color:#fff;
}

/* =========================
   POSTER
========================= */

.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* =========================
   FOTO FIX ANTI STRETCH
========================= */

.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    width:100%;
    height:70%;
    z-index:15;
}

/* penting: wrapper stabil */
.foto-inner{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    overflow:hidden;
}

/* FOTO ANTI KETARIK */
.foto-orang{
    height:100%;
    width:auto;        /* KUNCI FIX */
    max-width:100%;

    object-fit:cover;
    object-position:center bottom;

    display:block;
}

/* =========================
   NAMA (RAPAT + CLEAN)
========================= */

.nama-putih{
    position:absolute;
    top:170px;
    left:50%;
    transform:translateX(-50%) scaleY(1.05);

    width:92%;
    text-align:center;

    font-family:'Anton',sans-serif;
    font-size:72px;

    font-weight:900;
    color:#fff;

    text-transform:uppercase;
    line-height:0.95;
    letter-spacing:2px;

    z-index:8;

    white-space:nowrap;
    overflow:hidden;
}

.nama-outline{
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%) scaleY(1.05);

    width:92%;
    text-align:center;

    font-family:'Anton',sans-serif;
    font-size:68px;

    font-weight:900;

    color:transparent;
    -webkit-text-stroke:1.5px #fff; /* TIPIS */

    text-transform:uppercase;
    line-height:0.95;
    letter-spacing:2px;

    z-index:7;

    white-space:nowrap;
    overflow:hidden;
}

/* NAMA BAWAH */
.nama-bawah{
    position:absolute;
    bottom:42px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;

    font-size:30px;
    font-weight:900;
    color:#fff;
}

/* =========================
   SALES
========================= */

.sales-bawah{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);

    width:100%;
    text-align:center;

    font-size:18px;
    font-weight:800;
    color:#fff;

    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:6px;
}

.sales-label{
    font-style:italic;
    font-size:13px;
    opacity:0.85;
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

    <div class="form-group">
        <label>Nama</label>
        <input type="text" id="namaInput" placeholder="Masukkan nama">
    </div>

    <div class="form-group">
        <label>Sales</label>
        <input type="text" id="salesInput" placeholder="Masukkan sales">
    </div>

    <button class="btn" onclick="downloadPoster()">
        DOWNLOAD POSTER
    </button>

</div>

<!-- POSTER -->
<div class="poster-wrapper" id="poster">

    <img src="https://putrasetya.github.io/template_posterhero1.png" class="poster-template">

    <!-- FOTO FIX -->
    <div class="foto-wrap">
        <div class="foto-inner">
            <img id="fotoOrang" class="foto-orang" src="">
        </div>
    </div>

    <!-- NAMA -->
    <div class="nama-putih" id="namaPutih">NAMA</div>
    <div class="nama-outline" id="namaOutline">NAMA</div>

    <div class="nama-bawah" id="namaBawah"></div>

    <!-- SALES -->
    <div class="sales-bawah">
        <span class="sales-label">sales</span>
        <span id="salesBawah">Rp0</span>
    </div>

</div>

</div>

<script>

/* FOTO DATABASE */
const people=[
{
    keywords:["AFIF","AFI","APIP"],
    photo:"12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7"
},
{
    keywords:["PUTRA","PUT"],
    photo:"1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2"
},
{
    keywords:["BUDI"],
    photo:"1s3OEJyXr-_i5p8D0hKw-aCCbcgLQwWxi"
}
];

/* FOTO */
function updatePhoto(nama){

    const foto=document.getElementById("fotoOrang");
    let found=false;

    for(const p of people){
        for(const k of p.keywords){
            if(nama.includes(k)){
                foto.src="https://lh3.googleusercontent.com/d/"+p.photo+"=w1000";
                found=true;
                break;
            }
        }
        if(found) break;
    }

    if(!found) foto.src="";
}

/* SALES */
function animateSales(val){

    const el=document.getElementById("salesBawah");

    let start=0;
    let end=parseInt(val)||0;
    let duration=700;
    let t0=null;

    function step(t){

        if(!t0) t0=t;

        let p=Math.min((t-t0)/duration,1);
        let v=Math.floor(p*end);

        el.innerText="Rp "+new Intl.NumberFormat("id-ID").format(v);

        if(p<1) requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
}

/* INPUT NAMA */
document.getElementById("namaInput").addEventListener("input",function(){

    let nama=this.value.trim().toUpperCase();
    if(!nama) nama="NAMA";

    updatePhoto(nama);

    document.getElementById("namaPutih").innerText=nama;
    document.getElementById("namaOutline").innerText=nama;
    document.getElementById("namaBawah").innerText=nama;
});

/* INPUT SALES */
document.getElementById("salesInput").addEventListener("input",function(){

    let val=this.value.replace(/[^0-9]/g,"");
    if(!val) val="0";

    this.value=new Intl.NumberFormat("id-ID").format(val);

    animateSales(val);
});

/* DOWNLOAD FIX ANTI STRETCH */
function downloadPoster(){

    const poster=document.getElementById("poster");

    html2canvas(poster,{
        useCORS:true,
        scale:3,
        backgroundColor:null,
        imageTimeout:0,
        onclone: function(doc){

            const img=doc.getElementById("fotoOrang");

            if(img){
                img.style.width="auto";
                img.style.height="100%";
            }

        }
    }).then(canvas=>{

        const link=document.createElement("a");
        link.download="poster.png";
        link.href=canvas.toDataURL("image/png");
        link.click();

    });
}

</script>

</body>
</html>
