<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;800;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:340px;
    background:#070707;
    border-radius:28px;
    padding:28px;
}

.form-group{margin-top:20px;}
label{display:block;margin-bottom:10px;font-weight:600;}

.input-box input{
    width:100%;
    height:60px;
    border:none;
    outline:none;
    background:#121212;
    color:#fff;
    padding:0 18px;
    font-size:18px;
    border-radius:16px;
}

/* SALES INPUT */
.sales-box{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.sales-prefix{
    font-size:12px;
    font-style:italic;
    opacity:0.7;
}

.sales-input-wrap{
    display:flex;
    align-items:center;
    height:60px;
    border-radius:16px;
    background:#121212;
    border:1px solid #333;
    overflow:hidden;
}

.rp{
    padding:0 14px;
    background:#1b1b1b;
    font-weight:800;
}

/* POSTER */
.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* FOTO */
.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    width:100%;
    height:70%;
    z-index:10;
}

.foto-inner{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
}

.foto-orang{
    height:100%;
    width:auto;
    object-fit:cover;

    -webkit-mask-image: linear-gradient(
        to top,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 30%,
        rgba(0,0,0,1) 100%
    );

    mask-image: linear-gradient(
        to top,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 30%,
        rgba(0,0,0,1) 100%
    );
}

/* =========================
   NAMA
========================= */

.nama-putih{
    position:absolute;
    top:170px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;

    font-family:'Anton',sans-serif;
    font-size:76px;
    letter-spacing:3px;
    color:#fff;

    z-index:4;
}

.nama-outline{
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;

    font-family:'Anton',sans-serif;
    font-size:72px;
    letter-spacing:3px;

    color:transparent;
    -webkit-text-stroke:1.5px #fff;

    z-index:3;
}

/* NAMA BAWAH */
.nama-bawah{
    position:absolute;
    bottom:42px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;

    font-family:'Roboto Condensed',sans-serif;
    font-size:24px;
    font-weight:700;
    letter-spacing:1px;
}

/* =========================
   SALES (FIX ANTI WRAP)
========================= */

.sales-bawah{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    align-items:baseline;
    justify-content:center;
    gap:8px;

    max-width:90%;
}

.sales-label{
    font-size:12px;
    font-style:italic;
    opacity:0.75;
    white-space:nowrap;
}

.sales-value{
    font-family:'Roboto Mono',monospace;
    font-size:20px;
    font-weight:700;

    white-space:nowrap;   /* 🔥 STOP TURUN BARIS */
    overflow:hidden;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

    <div class="form-group">
        <label>Nama</label>
        <div class="input-box">
            <input id="namaInput" type="text">
        </div>
    </div>

    <div class="form-group">
        <label>Sales</label>

        <div class="sales-box">
            <span class="sales-prefix">sales</span>

            <div class="sales-input-wrap">
                <span class="rp">Rp</span>
                <input id="salesInput" type="text">
            </div>
        </div>

    </div>

</div>

<div class="poster-wrapper">

    <img class="poster-template" src="https://putrasetya.github.io/template_posterhero1.png">

    <div class="foto-wrap">
        <div class="foto-inner">
            <img id="fotoOrang" class="foto-orang">
        </div>
    </div>

    <div class="nama-putih" id="namaPutih">NAMA</div>
    <div class="nama-outline" id="namaOutline">NAMA</div>

    <div class="nama-bawah" id="namaBawah">NAMA</div>

    <div class="sales-bawah">
        <span class="sales-label">sales</span>
        <span class="sales-value" id="salesBawah">Rp 0</span>
    </div>

</div>

</div>

<script>

/* FOTO */
const people=[
{keywords:["AFIF"],photo:"12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7"},
{keywords:["PUTRA"],photo:"1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2"}
];

function updatePhoto(nama){
    const img=document.getElementById("fotoOrang");
    let found=false;

    for(const p of people){
        for(const k of p.keywords){
            if(nama.includes(k)){
                img.src="https://lh3.googleusercontent.com/d/"+p.photo+"=w1000";
                found=true;
                break;
            }
        }
        if(found) break;
    }

    if(!found) img.src="";
}

/* NAMA */
document.getElementById("namaInput").addEventListener("input",e=>{
    let n=e.target.value.toUpperCase()||"NAMA";

    updatePhoto(n);

    document.getElementById("namaPutih").innerText=n;
    document.getElementById("namaOutline").innerText=n;
    document.getElementById("namaBawah").innerText=n;
});

/* SALES + AUTO SHRINK */
document.getElementById("salesInput").addEventListener("input",e=>{
    let v=e.target.value.replace(/[^0-9]/g,"")||"0";

    let formatted = new Intl.NumberFormat("id-ID").format(v);

    e.target.value = formatted;

    const el = document.getElementById("salesBawah");

    el.innerText = "Rp " + formatted;

    // 🔥 AUTO SHRINK BIAR TIDAK TURUN BARIS
    let size = 20;
    el.style.fontSize = size + "px";

    while(el.scrollWidth > el.parentElement.offsetWidth){
        size--;
        el.style.fontSize = size + "px";
        if(size <= 12) break;
    }
});

</script>

</body>
</html>
