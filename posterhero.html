<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;800;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- CROPPER JS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<style>

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:340px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:28px;
}

.panel-title{
    font-family:'Anton',sans-serif;
    font-size:34px;
    text-align:center;
    margin-bottom:22px;
    color:#ffd400;
}

/* INPUT */
input{
    width:100%;
    height:52px;
    margin-top:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.04);
    color:#fff;
    padding:0 10px;
}

/* SALES */
.sales-wrap{
    display:flex;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.sales-wrap span{
    padding:0 12px;
    opacity:0.7;
}

/* BUTTON */
button{
    width:100%;
    height:52px;
    margin-top:15px;
    background:red;
    border:none;
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

/* ===== POSTER ===== */
.poster{
    width:430px;
    position:relative;
    border-radius:28px;
    overflow:hidden;
}

.poster img.bg{
    width:100%;
    display:block;
}

/* ===== FOTO SYSTEM LAMA (TETAP) ===== */
.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    height:70%;
    display:flex;
    align-items:flex-end;
    z-index:1;
}

.foto-wrap img{
    height:100%;
}

/* gradient tetap */
.foto-gradient{
    position:absolute;
    bottom:0;
    width:100%;
    height:60%;
    background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
    z-index:2;
}

/* ===== CROPPED UPLOAD (NEW LAYER) ===== */
.upload-layer{
    position:absolute;
    bottom:110px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
}

.upload-layer img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:12px;
    border:2px solid #fff;
}

/* ===== TEXT ===== */
.nama1,.nama2,.nama3{
    position:absolute;
    width:100%;
    text-align:center;
}

.nama1{top:150px;font-family:'Anton';font-size:76px;}
.nama2{top:230px;font-family:'Anton';font-size:72px;color:transparent;-webkit-text-stroke:1.5px #fff;}
.nama3{bottom:42px;font-family:'Roboto Condensed';}

.sales{
    position:absolute;
    bottom:14px;
    width:100%;
    text-align:center;
    font-family:'Roboto Mono';
    white-space:nowrap;
}

/* ===== MODAL CROPPER ===== */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-box{
    width:90%;
    max-width:400px;
    background:#111;
    padding:15px;
    border-radius:15px;
}

.modal-box img{
    width:100%;
    max-height:400px;
}

.modal-actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.modal-actions button{
    flex:1;
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

<div class="panel-title">MENYALA</div>

<input id="namaInput" placeholder="Nama">

<div class="sales-wrap">
<span>Rp</span>
<input id="salesInput" placeholder="Sales">
</div>

<!-- UPLOAD BARU -->
<input type="file" id="uploadInput" accept="image/*">

<button onclick="downloadPoster()">DOWNLOAD</button>

</div>

<!-- POSTER -->
<div class="poster" id="poster">

<img class="bg" src="https://putrasetya.github.io/template_posterhero1.png">

<!-- FOTO SISTEM LAMA -->
<div class="foto-wrap">
    <img id="foto">
    <div class="foto-gradient"></div>
</div>

<!-- FOTO UPLOAD (DEPAN) -->
<div class="upload-layer">
    <img id="uploadPreview">
</div>

<!-- TEXT -->
<div class="nama1" id="n1">NAMA</div>
<div class="nama2" id="n2">NAMA</div>
<div class="nama3" id="n3">NAMA</div>

<div class="sales" id="s">Rp 0</div>

</div>

</div>

<!-- MODAL CROPPER -->
<div class="modal" id="modal">
    <div class="modal-box">
        <img id="cropImage">
        <div class="modal-actions">
            <button onclick="cropSave()">OK</button>
            <button onclick="closeModal()">BATAL</button>
        </div>
    </div>
</div>

<script>

/* ===== FOTO SYSTEM LAMA (AMAN) ===== */
const people=[
{keywords:["AFIF"],photo:"https://lh3.googleusercontent.com/d/12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7=w1000"},
{keywords:["PUTRA"],photo:"https://lh3.googleusercontent.com/d/1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2=w1000"}
];

function updatePhoto(n){
let up=n.toUpperCase();
let img=document.getElementById("foto");

let found=null;

people.forEach(p=>{
if(p.keywords.some(k=>up.includes(k))) found=p.photo;
});

img.src=found||"";
}

/* INPUT */
document.getElementById("namaInput").oninput=(e)=>{
let v=e.target.value||"NAMA";
updatePhoto(v);
n1.innerText=v;
n2.innerText=v;
n3.innerText=v;
};

document.getElementById("salesInput").oninput=(e)=>{
let v=e.target.value.replace(/[^0-9]/g,"")||"0";
s.innerText="Rp "+new Intl.NumberFormat("id-ID").format(v);
};

/* ===== CROPPER ===== */
let cropper;

document.getElementById("uploadInput").onchange=(e)=>{
let file=e.target.files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=(ev)=>{

document.getElementById("modal").style.display="flex";
document.getElementById("cropImage").src=ev.target.result;

setTimeout(()=>{
cropper=new Cropper(document.getElementById("cropImage"),{
aspectRatio:1,
viewMode:1
});
},200);

};

reader.readAsDataURL(file);
};

function cropSave(){
let canvas=cropper.getCroppedCanvas({
width:300,
height:300
});

document.getElementById("uploadPreview").src=canvas.toDataURL();

cropper.destroy();
document.getElementById("modal").style.display="none";
}

function closeModal(){
cropper.destroy();
document.getElementById("modal").style.display="none";
}

/* ===== DOWNLOAD (CLONE STABLE) ===== */
async function downloadPoster(){

let poster=document.getElementById("poster");
let clone=poster.cloneNode(true);

clone.style.position="absolute";
clone.style.left="-9999px";

document.body.appendChild(clone);

let canvas=await html2canvas(clone,{
scale:3,
useCORS:true,
backgroundColor:null
});

document.body.removeChild(clone);

let a=document.createElement("a");
a.download="poster.png";
a.href=canvas.toDataURL("image/png");
a.click();

}

</script>

</body>
</html>
