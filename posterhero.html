<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;800;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<style>

/* ===== BASE (TETAP) ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:360px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:28px;
}

.panel-title{
    font-family:'Anton';
    font-size:34px;
    text-align:center;
    margin-bottom:22px;
    color:#ffd400;
}

/* INPUT */
.form-group{margin-bottom:14px;}

label{
    font-size:11px;
    opacity:0.6;
    display:block;
    margin-bottom:6px;
}

.input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.05);
    color:#fff;
    padding:0 12px;
    border-radius:10px;
}

/* RUPIAH */
.rupiah{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
}

.rp{padding:0 12px;opacity:0.7;}

.rupiah input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
}

/* BUTTON + LOADING */
button{
    width:100%;
    height:52px;
    margin-top:10px;
    background:red;
    border:none;
    color:#fff;
    font-weight:800;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #fff;
    border-radius:50%;
    display:none;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* ===== POSTER ===== */
.poster{
    width:430px;
    position:relative;
    border-radius:28px;
    overflow:hidden;
}

.poster img.bg{
    width:100%;
}

/* FOTO ORANG (DI DEPAN TEKS) */
.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    height:70%;
    display:flex;
    align-items:flex-end;
    z-index:20; /* 🔥 DI DEPAN TEKS */
}

.foto-wrap img{
    height:100%;
}

/* UPLOAD */
.upload-layer{
    position:absolute;
    bottom:110px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
}

.upload-layer img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:12px;
}

/* ===== TEXT (DI BELAKANG FOTO) ===== */
.nama1,.nama2,.nama3{
    position:absolute;
    width:100%;
    text-align:center;
    z-index:10; /* 🔥 DI BAWAH FOTO */
}

.nama1{
    top:150px;
    font-family:'Anton';
    font-size:76px;
}

.nama2{
    top:230px;
    font-family:'Anton';
    font-size:72px;
    color:transparent;
    -webkit-text-stroke:1.5px #fff;
}

.nama3{
    bottom:42px;
    font-family:'Roboto Condensed';
}

/* SALES */
.sales{
    position:absolute;
    bottom:14px;
    width:100%;
    text-align:center;
    font-family:'Roboto Mono';
    white-space:nowrap;
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

<div class="panel-title">MENYALA</div>

<div class="form-group">
<input class="input" id="namaInput" placeholder="Nama Sales">
</div>

<div class="form-group">
<div class="rupiah">
<span class="rp">Rp</span>
<input id="salesInput" placeholder="Nominal">
</div>
</div>

<button id="downloadBtn" onclick="downloadPoster()">
<div class="spinner" id="spinner"></div>
<span id="btnText">DOWNLOAD</span>
</button>

</div>

<!-- POSTER -->
<div class="poster" id="poster">

<img class="bg" src="https://putrasetya.github.io/template_posterhero1.png">

<div class="foto-wrap">
<img id="foto">
</div>

<div class="upload-layer">
<img id="uploadPreview">
</div>

<div class="nama1" id="n1">NAMA</div>
<div class="nama2" id="n2">NAMA</div>
<div class="nama3" id="n3">NAMA</div>

<div class="sales" id="s">Rp 0</div>

</div>

</div>

<script>

/* FOTO SYSTEM */
const people=[
{keywords:["AFIF"],photo:"https://lh3.googleusercontent.com/d/12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7=w1000"},
{keywords:["PUTRA"],photo:"https://lh3.googleusercontent.com/d/1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2=w1000"}
];

function updatePhoto(n){
let up=n.toUpperCase();
let img=document.getElementById("foto");
let found=null;

people.forEach(p=>{
if(p.keywords.some(k=>up.includes(k))) found=p.photo;
});

img.src=found||"";
}

/* INPUT */
namaInput.oninput=(e)=>{
let v=e.target.value||"NAMA";
updatePhoto(v);
n1.innerText=v;
n2.innerText=v;
n3.innerText=v;
};

salesInput.oninput=(e)=>{
let v=e.target.value.replace(/[^0-9]/g,"")||"0";
let f=new Intl.NumberFormat("id-ID").format(v);
e.target.value=f;
s.innerText="Rp "+f;
};

/* DOWNLOAD + LOADING */
async function downloadPoster(){

const btn=document.getElementById("downloadBtn");
const spinner=document.getElementById("spinner");
const text=document.getElementById("btnText");

btn.disabled=true;
spinner.style.display="inline-block";
text.innerText="LOADING...";

await new Promise(r=>setTimeout(r,300));

let poster=document.getElementById("poster");
let clone=poster.cloneNode(true);

clone.style.position="absolute";
clone.style.left="-9999px";

document.body.appendChild(clone);

let canvas=await html2canvas(clone,{
scale:3,
useCORS:true,
backgroundColor:null
});

document.body.removeChild(clone);

let a=document.createElement("a");
a.download="poster.png";
a.href=canvas.toDataURL("image/png");
a.click();

spinner.style.display="none";
text.innerText="DOWNLOAD";
btn.disabled=false;

}

</script>

</body>
</html>
