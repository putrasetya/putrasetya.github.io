<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    padding:30px;
    color:#fff;
}

/* =========================
   LAYOUT
========================= */

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:35px;
    flex-wrap:wrap;
}

/* =========================
   PANEL
========================= */

.panel{
    width:320px;
    background:#070707;
    border:1px solid #ff1a1a;
    border-radius:28px;
    padding:28px;
    box-shadow:
    0 0 25px rgba(255,0,0,.18),
    inset 0 0 30px rgba(255,255,255,.02);
}

.logo-title{
    margin-bottom:30px;
}

.logo-title h1{
    font-size:34px;
    line-height:1;
    font-weight:900;
}

.logo-title span{
    color:#ff1d25;
    display:block;
    font-size:62px;
    margin-top:4px;
}

.line{
    width:100%;
    height:1px;
    background:#333;
    margin-top:22px;
}

/* =========================
   INPUT
========================= */

.form-group{
    margin-top:28px;
}

.form-group label{
    display:block;
    margin-bottom:12px;
    font-size:15px;
    font-weight:600;
}

.input-box{
    width:100%;
    height:68px;
    border-radius:18px;
    border:1px solid #444;
    background:#121212;
    overflow:hidden;
    display:flex;
    align-items:center;
}

.input-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
    padding:0 20px;
    font-size:18px;
    font-family:'Montserrat',sans-serif;
}

.input-box:focus-within{
    border:1px solid #ff1a1a;
    box-shadow:0 0 15px rgba(255,0,0,.25);
}

.rp{
    width:75px;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    border-right:1px solid #333;
    font-size:22px;
    color:#fff;
}

/* =========================
   INFO BOX
========================= */

.info-box{
    margin-top:22px;
    background:#151515;
    border:1px solid #333;
    border-radius:18px;
    padding:18px;
    font-size:14px;
    line-height:1.8;
    color:#d8d8d8;
}

.info-box b{
    color:#fff;
}

/* =========================
   BUTTON
========================= */

.btn{
    width:100%;
    height:66px;
    border:none;
    border-radius:18px;
    margin-top:22px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
    font-family:'Montserrat',sans-serif;
}

.btn-generate{
    background:#ff1a1a;
    color:#fff;
    box-shadow:0 10px 25px rgba(255,0,0,.3);
}

.btn-generate:hover{
    transform:translateY(-2px);
}

.btn-download{
    background:#141414;
    color:#fff;
    border:1px solid #333;
}

/* =========================
   TIPS
========================= */

.tips{
    margin-top:28px;
    background:#121212;
    border:1px solid #333;
    border-radius:18px;
    padding:20px;
}

.tips h3{
    color:#ff1a1a;
    margin-bottom:12px;
}

.tips p{
    line-height:1.8;
    color:#d5d5d5;
}

/* =========================
   POSTER
========================= */

.poster-wrapper{
    position:relative;
    width:430px;
}

.poster-template{
    width:100%;
    display:block;
    border-radius:28px;
    box-shadow:
    0 0 35px rgba(255,0,0,.18);
}

/* =========================
   NAMA PUTIH
========================= */

.nama-putih{
    position:absolute;

    top:168px;
    left:50%;

    transform:
    translateX(-50%)
    scaleY(1.12);

    width:90%;

    text-align:center;

    font-weight:900;

    color:#fff;

    text-transform:uppercase;

    line-height:.88;

    letter-spacing:1px;

    z-index:10;

    white-space:nowrap;
}

/* =========================
   NAMA OUTLINE
========================= */

.nama-outline{
    position:absolute;

    top:255px;
    left:50%;

    transform:
    translateX(-50%)
    scaleY(1.12);

    width:90%;

    text-align:center;

    font-weight:900;

    color:transparent;

    -webkit-text-stroke:3px #fff;

    text-transform:uppercase;

    line-height:.88;

    letter-spacing:1px;

    z-index:9;

    white-space:nowrap;
}

/* =========================
   NAMA BAWAH
========================= */

.nama-bawah{
    position:absolute;

    bottom:58px;
    left:50%;

    transform:translateX(-50%);

    width:100%;

    text-align:center;

    font-size:52px;
    font-weight:900;

    color:#fff;

    text-transform:uppercase;
}

/* =========================
   SALES
========================= */

.sales-bawah{
    position:absolute;

    bottom:28px;
    left:50%;

    transform:translateX(-50%);

    width:100%;

    text-align:center;

    color:#fff;
}

.sales-bawah i{
    font-size:16px;
    font-weight:400;
    margin-right:6px;
}

.sales-bawah span{
    font-size:18px;
    font-weight:800;
}

/* =========================
   FOOTER
========================= */

.footer-box{
    width:100%;
    max-width:620px;
    margin:35px auto 0;
    background:#0d0d0d;
    border:1px solid #222;
    border-radius:22px;
    padding:24px;
    text-align:center;
    color:#f2f2f2;
    font-size:16px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    body{
        padding:15px;
    }

    .container{
        flex-direction:column;
        align-items:center;
    }

    .panel{
        width:100%;
        max-width:430px;
    }

    .poster-wrapper{
        width:100%;
        max-width:430px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- =========================
         PANEL
    ========================== -->

    <div class="panel">

        <div class="logo-title">
            <h1>
                GENERATOR
                <span>POSTER</span>
            </h1>

            <div class="line"></div>
        </div>

        <!-- NAMA -->
        <div class="form-group">

            <label>Nama</label>

            <div class="input-box">

                <input
                type="text"
                id="namaInput"
                placeholder="Masukkan nama">

            </div>

        </div>

        <!-- SALES -->
        <div class="form-group">

            <label>Jumlah Sales</label>

            <div class="input-box">

                <div class="rp">
                    Rp
                </div>

                <input
                type="text"
                id="salesInput"
                placeholder="Masukkan jumlah sales">

            </div>

        </div>

        <!-- INFO -->
        <div class="info-box">

            <b>• Masukkan angka saja.</b><br>

            Contoh: 15000000<br>

            Akan otomatis menjadi:
            15.000.000

        </div>

        <!-- BUTTON -->
        <button
        class="btn btn-generate"
        onclick="generatePoster()">

            ✨ GENERATE POSTER

        </button>

        <button
        class="btn btn-download">

            ⬇ DOWNLOAD POSTER

        </button>

        <!-- TIPS -->
        <div class="tips">

            <h3>💡 Tips</h3>

            <p>
                Nama akan otomatis menyesuaikan ukuran agar tetap proporsional dan tidak terpotong.
            </p>

        </div>

    </div>

    <!-- =========================
         POSTER
    ========================== -->

    <div class="poster-wrapper">

        <!-- TEMPLATE -->
        <img
        src="https://putrasetya.github.io/template_posterhero.png"
        class="poster-template">

        <!-- NAMA PUTIH -->
        <div
        class="nama-putih"
        id="namaPutih">

            NAMA

        </div>

        <!-- NAMA OUTLINE -->
        <div
        class="nama-outline"
        id="namaOutline">

            NAMA

        </div>

        <!-- NAMA BAWAH -->
        <div
        class="nama-bawah"
        id="namaBawah">

        </div>

        <!-- SALES -->
        <div class="sales-bawah">

            <i>sales</i>

            <span id="salesBawah">
                Rp0
            </span>

        </div>

    </div>

</div>

<!-- FOOTER -->
<div class="footer-box">

    🛡 Poster siap! Silakan download atau screenshot.

</div>

<script>

/* =========================
   FORMAT RUPIAH
========================= */

const salesInput =
document.getElementById("salesInput");

salesInput.addEventListener("input", function(){

    let angka =
    this.value.replace(/[^,\d]/g,'');

    let split =
    angka.split(',');

    let sisa =
    split[0].length % 3;

    let rupiah =
    split[0].substr(0, sisa);

    let ribuan =
    split[0].substr(sisa)
    .match(/\d{3}/gi);

    if(ribuan){

        let separator =
        sisa ? '.' : '';

        rupiah +=
        separator +
        ribuan.join('.');

    }

    this.value = rupiah;

});

/* =========================
   AUTO FONT SIZE
========================= */

function setAutoSize(text){

    let length = text.length;

    if(length <= 6) return 120;

    if(length <= 8) return 102;

    if(length <= 10) return 88;

    if(length <= 12) return 76;

    if(length <= 14) return 64;

    if(length <= 16) return 54;

    return 46;

}

/* =========================
   GENERATE
========================= */

function generatePoster(){

    let nama =
    document.getElementById("namaInput")
    .value
    .trim();

    let sales =
    document.getElementById("salesInput")
    .value
    .trim();

    if(nama == ""){

        nama = "NAMA";

    }

    if(sales == ""){

        sales = "0";

    }

    nama = nama.toUpperCase();

    // AUTO SIZE
    let size =
    setAutoSize(nama);

    // NAMA PUTIH
    const putih =
    document.getElementById("namaPutih");

    putih.innerText = nama;

    putih.style.fontSize =
    size + "px";

    // NAMA OUTLINE
    const outline =
    document.getElementById("namaOutline");

    outline.innerText = nama;

    outline.style.fontSize =
    (size - 6) + "px";

    // NAMA BAWAH
    document.getElementById("namaBawah")
    .innerText = nama;

    // SALES
    document.getElementById("salesBawah")
    .innerText = "Rp" + sales;

}

/* AUTO GENERATE SAAT KETIK */

document.getElementById("namaInput")
.addEventListener("input", generatePoster);

document.getElementById("salesInput")
.addEventListener("input", generatePoster);

</script>

</body>
</html>
