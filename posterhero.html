<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:320px;
    background:#070707;
    border:1px solid #ff1a1a;
    border-radius:28px;
    padding:28px;
}

.form-group{
    margin-top:20px;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:600;
}

.input-box{
    width:100%;
    height:65px;
    border-radius:18px;
    border:1px solid #444;
    background:#121212;
    display:flex;
    align-items:center;
}

.input-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
    padding:0 20px;
    font-size:18px;
}

.btn{
    width:100%;
    height:60px;
    border:none;
    border-radius:18px;
    margin-top:15px;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    background:#ff1a1a;
    color:#fff;
}

.download-btn{
    background:#00c853;
}

/* =========================
   POSTER
========================= */

.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* =========================
   NAMA BESAR (2 BARIS)
========================= */

.nama-putih{
    position:absolute;
    top:165px;
    left:50%;
    transform:translateX(-50%) scaleY(1.1);

    width:90%;
    text-align:center;

    font-family:'Anton',sans-serif;
    font-size:88px;
    font-weight:900;

    color:#fff;
    text-transform:uppercase;
    line-height:0.9;
    letter-spacing:3px;

    z-index:8;
    white-space:nowrap;
    overflow:hidden;
}

.nama-outline{
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%) scaleY(1.1);

    width:90%;
    text-align:center;

    font-family:'Anton',sans-serif;
    font-size:78px;
    font-weight:900;

    color:transparent;
    -webkit-text-stroke:3px #fff;

    text-transform:uppercase;
    line-height:0.9;
    letter-spacing:3px;

    z-index:7;
    white-space:nowrap;
    overflow:hidden;
}

/* =========================
   FOTO (ANTI KETARIK)
========================= */

.foto-orang{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);

    height:70%;
    width:auto;
    max-width:120%;

    object-fit:cover;
    object-position:center bottom;

    z-index:15;
    pointer-events:none;

    filter: drop-shadow(0 18px 28px rgba(0,0,0,.45));
}

/* =========================
   NAMA BAWAH
========================= */

.nama-bawah{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;
    font-size:32px;
    font-weight:900;
    color:#fff;
    z-index:20;
}

/* =========================
   SALES ANIMASI
========================= */

.sales-bawah{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    z-index:20;

    font-size:18px;
    font-weight:800;
}

/* POP EFFECT */
@keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.25); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); }
}

.sales-pop {
    animation: pop 0.35s ease;
    color:#00ff88;
    text-shadow:0 0 12px rgba(0,255,136,.6);
}

</style>
</head>

<body>

<div class="container">

<!-- PANEL -->
<div class="panel">

    <div class="form-group">
        <label>Nama</label>
        <div class="input-box">
            <input type="text" id="namaInput" placeholder="Masukkan nama">
        </div>
    </div>

    <div class="form-group">
        <label>Sales</label>
        <div class="input-box">
            <input type="text" id="salesInput" placeholder="Masukkan sales">
        </div>
    </div>

    <button class="btn" onclick="generatePoster()">GENERATE</button>

    <button class="btn download-btn" onclick="downloadPoster()">
        DOWNLOAD POSTER
    </button>

</div>

<!-- POSTER -->
<div class="poster-wrapper" id="poster">

    <img src="https://putrasetya.github.io/template_posterhero1.png" class="poster-template">

    <img id="fotoOrang" class="foto-orang" src="">

    <div class="nama-putih" id="namaPutih">NAMA</div>
    <div class="nama-outline" id="namaOutline">NAMA</div>

    <div class="nama-bawah" id="namaBawah"></div>

    <div class="sales-bawah" id="salesBawah">Rp0</div>

</div>

</div>

<!-- AUDIO (opsional) -->
<audio id="cashSound" src="https://assets.mixkit.co/sfx/preview/mixkit-coins-handling-1939.mp3" preload="auto"></audio>

<script>

/* DATABASE FOTO */
const people = [
{
    keywords:["AFIF","AFI","APIP"],
    photo:"12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7"
},
{
    keywords:["PUTRA","PUT"],
    photo:"1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2"
},
{
    keywords:["BUDI"],
    photo:"1s3OEJyXr-_i5p8D0hKw-aCCbcgLQwWxi"
}
];

/* FOTO */
function updatePhoto(nama){

    const foto = document.getElementById("fotoOrang");
    let found = false;

    for(const person of people){
        for(const key of person.keywords){

            if(nama.includes(key)){

                foto.src =
                "https://lh3.googleusercontent.com/d/"
                + person.photo
                + "=w1000";

                found = true;
                break;
            }
        }
        if(found) break;
    }

    if(!found) foto.src = "";
}

/* FORMAT RUPIAH INPUT */
document.getElementById("salesInput").addEventListener("input", function(){

    let value = this.value.replace(/[^0-9]/g,"");

    if(!value){
        this.value="";
        return;
    }

    this.value = new Intl.NumberFormat("id-ID").format(value);
});

/* SALES ANIMASI */
function animateSales(target){

    const el = document.getElementById("salesBawah");
    const sound = document.getElementById("cashSound");

    let start = 0;
    let end = parseInt(target) || 0;
    let duration = 900;
    let startTime = null;

    function step(t){

        if(!startTime) startTime = t;

        let progress = t - startTime;
        let percent = Math.min(progress/duration,1);

        let value = Math.floor(percent * end);

        el.innerText = "Rp " + new Intl.NumberFormat("id-ID").format(value);

        if(value % Math.ceil(end/20) === 0){
            el.classList.remove("sales-pop");
            void el.offsetWidth;
            el.classList.add("sales-pop");
        }

        if(percent < 1){
            requestAnimationFrame(step);
        } else {

            el.classList.add("sales-pop");

            if(sound){
                sound.currentTime = 0;
                sound.play();
            }

            setTimeout(()=>{
                el.classList.remove("sales-pop");
            },800);
        }
    }

    requestAnimationFrame(step);
}

/* GENERATE */
function generatePoster(){

    let nama = document.getElementById("namaInput").value.trim().toUpperCase();
    let sales = document.getElementById("salesInput").value.trim();

    if(!nama) nama="NAMA";
    if(!sales) sales="0";

    updatePhoto(nama);

    document.getElementById("namaPutih").innerText = nama;
    document.getElementById("namaOutline").innerText = nama;
    document.getElementById("namaBawah").innerText = nama;

    let cleanSales = sales.replace(/[^0-9]/g,"");
    animateSales(cleanSales);
}

/* DOWNLOAD */
function downloadPoster(){

    const poster = document.getElementById("poster");

    html2canvas(poster,{
        useCORS:true,
        allowTaint:false,
        scale:3,
        backgroundColor:null,
        imageTimeout:0
    }).then(canvas=>{

        const link = document.createElement("a");
        link.download="poster.png";
        link.href=canvas.toDataURL("image/png");
        link.click();

    });

}

/* AUTO UPDATE */
document.getElementById("namaInput").addEventListener("input", generatePoster);
document.getElementById("salesInput").addEventListener("input", generatePoster);

</script>

</body>
</html>
