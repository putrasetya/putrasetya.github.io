<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:35px;
    flex-wrap:wrap;
}

/* =========================
   PANEL
========================= */

.panel{
    width:320px;
    background:#070707;
    border:1px solid #ff1a1a;
    border-radius:28px;
    padding:28px;
    box-shadow:
    0 0 25px rgba(255,0,0,.18),
    inset 0 0 30px rgba(255,255,255,.02);
}

.logo-title h1{
    font-size:34px;
    line-height:1;
    font-weight:900;
}

.logo-title span{
    color:#ff1d25;
    display:block;
    font-size:62px;
    margin-top:4px;
}

.line{
    width:100%;
    height:1px;
    background:#333;
    margin:22px 0;
}

/* =========================
   INPUT
========================= */

.form-group{
    margin-top:20px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:600;
}

.input-box{
    width:100%;
    height:65px;
    border-radius:18px;
    border:1px solid #444;
    background:#121212;
    overflow:hidden;
    display:flex;
    align-items:center;
}

.input-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    background:transparent;
    color:#fff;
    padding:0 20px;
    font-size:18px;
    font-family:'Montserrat',sans-serif;
}

.input-box:focus-within{
    border:1px solid #ff1a1a;
}

.rp{
    width:75px;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    border-right:1px solid #333;
    font-size:22px;
}

/* =========================
   BUTTON
========================= */

.btn{
    width:100%;
    height:64px;
    border:none;
    border-radius:18px;
    margin-top:22px;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    background:#ff1a1a;
    color:#fff;
}

/* =========================
   POSTER
========================= */

.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* =========================
   BARIS 1
========================= */

.nama-putih{
    position:absolute;

    top:165px;
    left:50%;

    transform:
    translateX(-50%)
    scaleY(1.08);

    width:84%;

    text-align:center;

    font-family:'Anton',sans-serif;

    font-weight:400;

    color:#fff;

    text-transform:uppercase;

    line-height:1;

    letter-spacing:2px;

    z-index:10;

    white-space:nowrap;

    overflow:hidden;
}

/* =========================
   BARIS 2 OUTLINE ONLY
========================= */

.nama-outline{

    position:absolute;

    top:288px;

    left:50%;

    transform:
    translateX(-50%)
    scaleY(1.08);

    width:84%;

    text-align:center;

    font-family:'Anton',sans-serif;

    font-weight:400;

    /* BENAR-BENAR TRANSPARAN */
    color:transparent;

    /* OUTLINE PUTIH */
    -webkit-text-stroke:2.5px #fff;

    text-transform:uppercase;

    line-height:1;

    letter-spacing:2px;

    z-index:9;

    white-space:nowrap;

    overflow:hidden;

    /* HILANGKAN EFEK ANEH */
    text-shadow:none;

    filter:none;

    paint-order:stroke fill;

    /* AGAR TIDAK DOUBLE */
    -webkit-font-smoothing:antialiased;

    text-rendering:geometricPrecision;
}

/* =========================
   NAMA BAWAH
========================= */

.nama-bawah{
    position:absolute;

    bottom:40px;

    left:50%;

    transform:translateX(-50%);

    width:90%;

    text-align:center;

    font-size:32px;

    font-weight:900;

    color:#fff;

    text-transform:uppercase;

    white-space:nowrap;

    overflow:hidden;
}

/* =========================
   SALES
========================= */

.sales-bawah{
    position:absolute;

    bottom:14px;

    left:50%;

    transform:translateX(-50%);

    width:100%;

    text-align:center;

    color:#fff;
}

.sales-bawah i{
    font-size:13px;
    font-style:italic;
    margin-right:5px;
    font-weight:400;
}

.sales-bawah span{
    font-size:15px;
    font-weight:700;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    body{
        padding:15px;
    }

    .container{
        flex-direction:column;
        align-items:center;
    }

    .panel{
        width:100%;
        max-width:430px;
    }

    .poster-wrapper{
        width:100%;
        max-width:430px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- PANEL -->

    <div class="panel">

        <div class="logo-title">

            <h1>
                GENERATOR
                <span>POSTER</span>
            </h1>

            <div class="line"></div>

        </div>

        <!-- NAMA -->

        <div class="form-group">

            <label>Nama</label>

            <div class="input-box">

                <input
                type="text"
                id="namaInput"
                placeholder="Masukkan nama">

            </div>

        </div>

        <!-- SALES -->

        <div class="form-group">

            <label>Jumlah Sales</label>

            <div class="input-box">

                <div class="rp">
                    Rp
                </div>

                <input
                type="text"
                id="salesInput"
                placeholder="Masukkan sales">

            </div>

        </div>

        <button
        class="btn"
        onclick="generatePoster()">

            GENERATE POSTER

        </button>

    </div>

    <!-- POSTER -->

    <div class="poster-wrapper">

        <!-- TEMPLATE -->
        <img
        src="https://putrasetya.github.io/template_posterhero1.png"
        class="poster-template">

        <!-- BARIS 1 -->
        <div
        class="nama-putih"
        id="namaPutih">

            NAMA

        </div>

        <!-- BARIS 2 -->
        <div
        class="nama-outline"
        id="namaOutline">

            NAMA

        </div>

        <!-- NAMA BAWAH -->
        <div
        class="nama-bawah"
        id="namaBawah">

        </div>

        <!-- SALES -->
        <div class="sales-bawah">

            <i>sales</i>

            <span id="salesBawah">
                Rp0
            </span>

        </div>

    </div>

</div>

<script>

/* =========================
   FORMAT RUPIAH
========================= */

const salesInput =
document.getElementById("salesInput");

salesInput.addEventListener("input", function(){

    let angka =
    this.value.replace(/[^,\d]/g,'');

    let split =
    angka.split(',');

    let sisa =
    split[0].length % 3;

    let rupiah =
    split[0].substr(0, sisa);

    let ribuan =
    split[0]
    .substr(sisa)
    .match(/\d{3}/gi);

    if(ribuan){

        let separator =
        sisa ? '.' : '';

        rupiah +=
        separator +
        ribuan.join('.');

    }

    this.value = rupiah;

});

/* =========================
   AUTO FIT TEXT
========================= */

function fitText(element, text, maxSize){

    element.innerText = text;

    let size = maxSize;

    element.style.fontSize =
    size + "px";

    while(
        element.scrollWidth >
        element.clientWidth
    ){

        size--;

        element.style.fontSize =
        size + "px";

        if(size <= 18){
            break;
        }

    }

}

/* =========================
   SPLIT NAMA
========================= */

function splitName(nama){

    let words =
    nama.split(" ");

    if(words.length <= 1){

        return [nama, nama];

    }

    let tengah =
    Math.ceil(words.length / 2);

    let baris1 =
    words.slice(0, tengah).join(" ");

    let baris2 =
    words.slice(tengah).join(" ");

    return [baris1, baris2];

}

/* =========================
   GENERATE
========================= */

function generatePoster(){

    let nama =
    document.getElementById("namaInput")
    .value
    .trim();

    let sales =
    document.getElementById("salesInput")
    .value
    .trim();

    if(nama == ""){

        nama = "NAMA";

    }

    if(sales == ""){

        sales = "0";

    }

    nama = nama.toUpperCase();

    // SPLIT
    let hasil =
    splitName(nama);

    let nama1 =
    hasil[0];

    let nama2 =
    hasil[1];

    // ELEMENT
    const putih =
    document.getElementById("namaPutih");

    const outline =
    document.getElementById("namaOutline");

    const bawah =
    document.getElementById("namaBawah");

    // AUTO FIT
    fitText(putih, nama1, 110);

    fitText(outline, nama2, 100);

    fitText(bawah, nama, 32);

    // SALES
    document.getElementById("salesBawah")
    .innerText = "Rp" + sales;

}

/* =========================
   AUTO UPDATE
========================= */

document
.getElementById("namaInput")
.addEventListener(
    "input",
    generatePoster
);

document
.getElementById("salesInput")
.addEventListener(
    "input",
    generatePoster
);

</script>

</body>
</html>
