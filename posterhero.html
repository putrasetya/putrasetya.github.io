<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster Pahlawan</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    padding:30px;
    color:#fff;
}

/* =========================
   LAYOUT
========================= */

.container{
    display:flex;
    gap:30px;
    justify-content:center;
    align-items:flex-start;
    flex-wrap:wrap;
}

/* =========================
   FORM
========================= */

.form-box{
    width:370px;
    background:#1a1a1a;
    border-radius:24px;
    padding:28px;
    box-shadow:0 15px 50px rgba(0,0,0,.45);
}

.form-box h2{
    font-size:30px;
    font-weight:900;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-size:14px;
    font-weight:700;
}

.form-group input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#2a2a2a;
    color:#fff;
    font-size:18px;
    font-family:'Montserrat',sans-serif;
}

.form-group input:focus{
    border:2px solid #ff0019;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#ff0019;
    color:#fff;
    font-size:17px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
    margin-top:10px;
}

button:hover{
    transform:translateY(-2px);
    background:#ff2238;
}

/* =========================
   POSTER
========================= */

.poster{
    position:relative;
    width:430px;
    height:765px;
    overflow:hidden;
    background:
    radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 20%),
    linear-gradient(180deg,#f10518 0%,#d30014 45%,#cf0012 100%);
}

/* TEXTURE */
.poster::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
    radial-gradient(rgba(255,255,255,.18) 1px, transparent 1px);
    background-size:8px 8px;
    opacity:.10;
}

/* =========================
   HEADER LOGO
========================= */

.header{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:220px;
    height:80px;
    background:#fff;
    border-radius:0 0 28px 28px;
    z-index:20;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    text-align:center;
}

.logo-top{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:5px;
}

.azko{
    font-size:30px;
    font-weight:900;
    color:#d91c23;
}

.citimall{
    font-size:25px;
    font-weight:800;
    color:#f2d300;
}

.tuban{
    display:block;
    text-align:right;
    padding-right:8px;
    margin-top:2px;
    font-size:16px;
    font-weight:800;
    color:#111;
    font-style:italic;
}

/* =========================
   TITLE
========================= */

.title-bar{
    position:absolute;
    top:115px;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    height:42px;
    background:#fff;
    z-index:10;
    display:flex;
    justify-content:center;
    align-items:center;
}

.title-bar::before,
.title-bar::after{
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    background:#d70016;
    top:50%;
    transform:translateY(-50%);
}

.title-bar::before{
    left:14px;
}

.title-bar::after{
    right:14px;
}

.title-bar span{
    color:#d70016;
    font-size:18px;
    font-weight:700;
    letter-spacing:3px;
}

/* =========================
   BIG NAME
========================= */

.big-text{
    position:absolute;
    top:175px;
    width:100%;
    text-align:center;
    line-height:.88;
    z-index:2;
}

.big-white{
    font-size:100px;
    font-weight:900;
    color:#fff;
    letter-spacing:2px;
    text-transform:uppercase;
}

.big-outline{
    font-size:92px;
    font-weight:900;
    color:#d30014;
    -webkit-text-stroke:3px #fff;
    text-transform:uppercase;
}

/* =========================
   FOTO
========================= */

.model{
    position:absolute;
    bottom:135px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
    width:320px;
}

.model img{
    width:100%;
    display:block;
    object-fit:contain;
    filter:
    drop-shadow(0 10px 30px rgba(0,0,0,.4));
}

/* =========================
   BOTTOM
========================= */

.bottom{
    position:absolute;
    bottom:45px;
    width:100%;
    text-align:center;
    z-index:10;
}

.divider{
    width:190px;
    height:2px;
    background:#fff;
    margin:0 auto 18px;
    position:relative;
}

.divider::before{
    content:"✦";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:#d10013;
    color:#fff;
    padding:0 10px;
    font-size:20px;
}

.nama-bawah{
    font-size:50px;
    line-height:1;
    color:#fff;
    font-weight:900;
    text-transform:uppercase;
}

.sales-bawah{
    margin-top:10px;
    color:#fff;
    font-size:24px;
    font-weight:700;
}

/* =========================
   ZIGZAG
========================= */

.zig-left,
.zig-right{
    position:absolute;
    width:40px;
    height:170px;
    z-index:1;
}

.zig-left{
    left:-5px;
    top:180px;
}

.zig-right{
    right:-5px;
    top:380px;
    transform:rotate(180deg);
}

.zig{
    width:100%;
    height:100%;
    background:
    linear-gradient(135deg, transparent 74%, #fff 74%) 0 0/20px 20px,
    linear-gradient(225deg, transparent 74%, #fff 74%) 0 0/20px 20px;
}

/* =========================
   CORNER
========================= */

.corner-left,
.corner-right{
    position:absolute;
    width:100px;
    height:100px;
    background:#fff;
    bottom:-50px;
    transform:rotate(45deg);
    z-index:1;
}

.corner-left{
    left:-50px;
}

.corner-right{
    right:-50px;
}

.line-left,
.line-right{
    position:absolute;
    width:100px;
    height:2px;
    background:rgba(255,255,255,.7);
    bottom:55px;
    z-index:3;
}

.line-left{
    left:-10px;
    transform:rotate(45deg);
}

.line-right{
    right:-10px;
    transform:rotate(-45deg);
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    body{
        padding:15px;
    }

    .container{
        flex-direction:column;
        align-items:center;
    }

    .form-box{
        width:100%;
        max-width:430px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- ================= FORM ================= -->

    <div class="form-box">

        <h2>Generator Poster</h2>

        <div class="form-group">
            <label>Nama</label>
            <input
            type="text"
            id="namaInput"
            placeholder="Masukkan nama">
        </div>

        <div class="form-group">
            <label>Jumlah Sales</label>
            <input
            type="text"
            id="salesInput"
            placeholder="Masukkan jumlah sales">
        </div>

        <button onclick="generatePoster()">
            GENERATE POSTER
        </button>

    </div>

    <!-- ================= POSTER ================= -->

    <div class="poster">

        <!-- HEADER -->
        <div class="header">

            <div class="logo">

                <div class="logo-top">
                    <div class="azko">az•KO</div>
                    <div class="citimall">Citimall</div>
                </div>

                <div class="tuban">Tuban</div>

            </div>

        </div>

        <!-- ZIG -->
        <div class="zig-left">
            <div class="zig"></div>
        </div>

        <div class="zig-right">
            <div class="zig"></div>
        </div>

        <!-- TITLE -->
        <div class="title-bar">
            <span>PAHLAWAN HARI INI</span>
        </div>

        <!-- BIG NAME -->
        <div class="big-text">

            <div class="big-white" id="namaAtas1">
                NAMA
            </div>

            <div class="big-outline" id="namaAtas2">
                NAMA
            </div>

        </div>

        <!-- FOTO -->
        <div class="model">

            <!-- GANTI FOTO -->
            <img
            src="https://putrasetya.github.io/poster.png"
            id="fotoUser">

        </div>

        <!-- BOTTOM -->
        <div class="bottom">

            <div class="divider"></div>

            <div class="nama-bawah" id="namaBawah">
                NAMA
            </div>

            <div class="sales-bawah" id="salesBawah">
                Rp 0
            </div>

        </div>

        <!-- CORNER -->
        <div class="corner-left"></div>
        <div class="corner-right"></div>

        <div class="line-left"></div>
        <div class="line-right"></div>

    </div>

</div>

<script>

/* ======================================
   FORMAT RUPIAH OTOMATIS
====================================== */

const salesInput =
document.getElementById("salesInput");

salesInput.addEventListener("input", function(e){

    let angka =
    this.value.replace(/[^,\d]/g,'');

    let split =
    angka.split(',');

    let sisa =
    split[0].length % 3;

    let rupiah =
    split[0].substr(0, sisa);

    let ribuan =
    split[0].substr(sisa)
    .match(/\d{3}/gi);

    if(ribuan){

        let separator =
        sisa ? '.' : '';

        rupiah +=
        separator +
        ribuan.join('.');

    }

    this.value = rupiah;

});

/* ======================================
   GENERATE POSTER
====================================== */

function generatePoster(){

    let nama =
    document.getElementById("namaInput")
    .value
    .trim();

    let sales =
    document.getElementById("salesInput")
    .value
    .trim();

    if(nama == ""){

        nama = "NAMA";

    }

    if(sales == ""){

        sales = "0";

    }

    // UPDATE TEXT

    document.getElementById("namaAtas1")
    .innerText = nama;

    document.getElementById("namaAtas2")
    .innerText = nama;

    document.getElementById("namaBawah")
    .innerText = nama;

    document.getElementById("salesBawah")
    .innerText = "Rp " + sales;

}

</script>

</body>
</html>
