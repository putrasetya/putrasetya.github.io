<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poster Pahlawan Hari Ini</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Montserrat',sans-serif;
    overflow-x:hidden;
}

/* =========================
   POSTER
========================= */

.poster{
    position:relative;
    width:1080px;
    height:1920px;
    overflow:hidden;

    background:
    radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 20%),
    linear-gradient(180deg,#f10518 0%,#d30014 45%,#cf0012 100%);
}

/* DOT TEXTURE */
.poster::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
    radial-gradient(rgba(255,255,255,.20) 1px, transparent 1px);
    background-size:10px 10px;
    opacity:.12;
}

/* =========================
   HEADER
========================= */

.header{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    height:180px;
    background:#fff;
    border-radius:0 0 60px 60px;
    z-index:20;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    text-align:center;
}

.logo-top{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:15px;
}

.azko{
    font-size:72px;
    font-weight:900;
    color:#d91c23;
    line-height:1;
}

.citimall{
    font-size:62px;
    font-weight:800;
    color:#f2d300;
    line-height:1;
}

.tuban{
    display:block;
    margin-top:5px;
    text-align:right;
    padding-right:20px;
    font-size:42px;
    font-weight:800;
    color:#111;
    font-style:italic;
}

/* =========================
   TITLE BAR
========================= */

.title-bar{
    position:absolute;
    top:260px;
    left:50%;
    transform:translateX(-50%);
    width:720px;
    height:80px;
    background:#fff;
    z-index:10;
    display:flex;
    justify-content:center;
    align-items:center;
}

.title-bar::before,
.title-bar::after{
    content:"";
    position:absolute;
    width:26px;
    height:26px;
    border-radius:50%;
    background:#d70016;
    top:50%;
    transform:translateY(-50%);
}

.title-bar::before{
    left:25px;
}

.title-bar::after{
    right:25px;
}

.title-bar span{
    color:#d70016;
    font-size:42px;
    font-weight:700;
    letter-spacing:6px;
}

/* =========================
   BIG TEXT
========================= */

.big-text{
    position:absolute;
    top:390px;
    width:100%;
    text-align:center;
    z-index:2;
    line-height:.85;
}

.big-text .solid{
    font-size:280px;
    font-weight:900;
    color:#fff;
    letter-spacing:5px;
}

.big-text .outline{
    margin-top:-10px;
    font-size:255px;
    font-weight:900;
    color:transparent;
    -webkit-text-stroke:6px rgba(255,255,255,.9);
}

/* =========================
   MODEL
========================= */

.model{
    position:absolute;
    bottom:320px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
    width:780px;
}

.model img{
    width:100%;
    display:block;
    object-fit:contain;

    filter:
    drop-shadow(0 30px 50px rgba(0,0,0,.45));
}

/* =========================
   BOTTOM
========================= */

.bottom{
    position:absolute;
    bottom:110px;
    width:100%;
    text-align:center;
    z-index:10;
}

.divider{
    width:460px;
    height:4px;
    background:#fff;
    margin:0 auto 35px;
    position:relative;
}

.divider::before{
    content:"✦";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:#d10013;
    color:#fff;
    padding:0 20px;
    font-size:44px;
}

.nama{
    font-size:120px;
    line-height:1;
    color:#fff;
    font-weight:900;
    letter-spacing:4px;
}

.role{
    margin-top:15px;
    color:#fff;
    font-size:52px;
    font-weight:300;
}

.role b{
    font-weight:800;
}

/* =========================
   SIDE ZIGZAG
========================= */

.zig-left,
.zig-right{
    position:absolute;
    width:90px;
    height:350px;
    z-index:1;
}

.zig-left{
    left:-10px;
    top:420px;
}

.zig-right{
    right:-10px;
    top:870px;
    transform:rotate(180deg);
}

.zig{
    width:100%;
    height:100%;
    background:
    linear-gradient(135deg, transparent 74%, #fff 74%) 0 0/45px 45px,
    linear-gradient(225deg, transparent 74%, #fff 74%) 0 0/45px 45px;
}

/* =========================
   CORNER
========================= */

.corner-left,
.corner-right{
    position:absolute;
    width:240px;
    height:240px;
    background:#fff;
    bottom:-120px;
    transform:rotate(45deg);
    z-index:1;
}

.corner-left{
    left:-120px;
}

.corner-right{
    right:-120px;
}

.line-left,
.line-right{
    position:absolute;
    width:220px;
    height:4px;
    background:rgba(255,255,255,.7);
    bottom:120px;
    z-index:3;
}

.line-left{
    left:-10px;
    transform:rotate(45deg);
}

.line-right{
    right:-10px;
    transform:rotate(-45deg);
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1100px){

    body{
        padding:0;
    }

    .poster{
        width:100vw;
        height:177.77vw;
    }

    .header{
        width:46.3vw;
        height:16.6vw;
        border-radius:0 0 5.5vw 5.5vw;
    }

    .azko{
        font-size:6.6vw;
    }

    .citimall{
        font-size:5.7vw;
    }

    .tuban{
        font-size:3.8vw;
    }

    .title-bar{
        top:24vw;
        width:66vw;
        height:7.4vw;
    }

    .title-bar span{
        font-size:3.8vw;
    }

    .big-text{
        top:36vw;
    }

    .big-text .solid{
        font-size:26vw;
    }

    .big-text .outline{
        font-size:23.5vw;
    }

    .model{
        width:72vw;
        bottom:29vw;
    }

    .divider{
        width:42vw;
    }

    .nama{
        font-size:11vw;
    }

    .role{
        font-size:4.8vw;
    }

}

</style>
</head>

<body>

<div class="poster">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">

            <div class="logo-top">
                <div class="azko">az•KO</div>
                <div class="citimall">Citimall</div>
            </div>

            <div class="tuban">Tuban</div>

        </div>
    </div>

    <!-- ZIGZAG -->
    <div class="zig-left">
        <div class="zig"></div>
    </div>

    <div class="zig-right">
        <div class="zig"></div>
    </div>

    <!-- TITLE -->
    <div class="title-bar">
        <span>PAHLAWAN HARI INI</span>
    </div>

    <!-- BIG TEXT -->
    <div class="big-text">
        <div class="solid">NAMA</div>
        <div class="outline">NAMA</div>
    </div>

    <!-- MODEL -->
    <div class="model">
        <!-- GANTI FOTO -->
        <img src="foto.png">
    </div>

    <!-- BOTTOM -->
    <div class="bottom">

        <div class="divider"></div>

        <div class="nama">NAMA</div>

        <div class="role">
            sales <b>Rp....</b>
        </div>

    </div>

    <!-- CORNER -->
    <div class="corner-left"></div>
    <div class="corner-right"></div>

    <div class="line-left"></div>
    <div class="line-right"></div>

</div>

</body>
</html>
