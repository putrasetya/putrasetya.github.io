<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;800;900&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Montserrat',sans-serif;
    padding:30px;
    color:#fff;
}

.container{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
}

/* PANEL */
.panel{
    width:340px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:28px;
}

.panel-title{
    font-family:'Anton',sans-serif;
    font-size:34px;
    text-align:center;
    margin-bottom:22px;
    color:#ffd400;
}

/* INPUT */
.form-group{margin-top:18px;}

.input-box input,
.sales-input-wrap input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.04);
    color:#fff;
    padding:0 10px;
    font-size:16px;
}

.sales-input-wrap{
    display:flex;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.rp{
    padding:0 12px;
    opacity:0.7;
}

/* BUTTON */
.download-btn{
    width:100%;
    height:52px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ff1a1a,#7a0000);
    color:#fff;
    font-weight:800;
    cursor:pointer;
}

.spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #fff;
    border-radius:50%;
    display:none;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* POSTER */
.poster-wrapper{
    position:relative;
    width:430px;
    overflow:hidden;
    border-radius:28px;
}

.poster-template{
    width:100%;
    display:block;
}

/* =========================
   FOTO FIX (FULL COMPATIBLE EXPORT)
========================= */

.foto-wrap{
    position:absolute;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    width:100%;
    height:70%;
    z-index:50;
}

.foto-inner{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
}

/* FOTO */
.foto-orang{
    height:100%;
    width:auto;
    object-fit:cover;
    display:block;
}

/* 🔥 FIX GRADIENT (EXPORT SAFE, NO MASK, NO BUG) */
.foto-shadow{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    height:55%;
    pointer-events:none;

    /* ini dibuat natural supaya tidak terlihat kotak */
    background:radial-gradient(
        ellipse at bottom,
        rgba(0,0,0,0.65) 0%,
        rgba(0,0,0,0.35) 45%,
        rgba(0,0,0,0) 100%
    );
}

/* NAMA */
.nama-putih{
    position:absolute;
    top:150px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;
    font-family:'Anton',sans-serif;
    font-size:76px;
}

.nama-outline{
    position:absolute;
    top:230px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    text-align:center;
    font-family:'Anton',sans-serif;
    font-size:72px;
    color:transparent;
    -webkit-text-stroke:1.5px #fff;
}

.nama-bawah{
    position:absolute;
    bottom:42px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Roboto Condensed',sans-serif;
}

/* SALES */
.sales-bawah{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
}

.sales-value{
    font-family:'Roboto Mono',monospace;
    font-weight:700;
    white-space:nowrap;
}

/* LOADING */
.spinner{
    width:16px;
    height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top:2px solid #fff;
    border-radius:50%;
    display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

    <div class="panel-title">MENYALA</div>

    <input id="namaInput" placeholder="Nama">

    <div class="sales-input-wrap">
        <span class="rp">Rp</span>
        <input id="salesInput">
    </div>

    <button class="download-btn" onclick="downloadPoster()">
        <div class="spinner" id="spinner"></div>
        DOWNLOAD
    </button>

</div>

<div class="poster-wrapper" id="poster">

    <img class="poster-template" src="https://putrasetya.github.io/template_posterhero1.png">

    <div class="foto-wrap">
        <div class="foto-inner">
            <img id="fotoOrang" class="foto-orang">
            <div class="foto-shadow"></div>
        </div>
    </div>

    <div class="nama-putih" id="namaPutih">NAMA</div>
    <div class="nama-outline" id="namaOutline">NAMA</div>
    <div class="nama-bawah" id="namaBawah">NAMA</div>

</div>

</div>

<script>

const people=[
 {keywords:["AFIF"],photo:"https://lh3.googleusercontent.com/d/12pjk_-ZJhbqbPZDzdH4sJSkE5qWwzrf7=w1000"},
 {keywords:["PUTRA"],photo:"https://lh3.googleusercontent.com/d/1Pxw-wIUKTcyA_inIcqpYY833f_3AtZe2=w1000"}
];

function updatePhoto(n){
 const img=document.getElementById("fotoOrang");
 const up=n.toUpperCase();
 let found=null;

 for(const p of people){
  if(p.keywords.some(k=>up.includes(k))){
   found=p.photo;
   break;
  }
 }

 img.src=found||"";
}

document.getElementById("namaInput").addEventListener("input",e=>{
 let n=e.target.value||"NAMA";
 updatePhoto(n);
 document.getElementById("namaPutih").innerText=n;
 document.getElementById("namaOutline").innerText=n;
 document.getElementById("namaBawah").innerText=n;
});

async function downloadPoster(){

 document.getElementById("spinner").style.display="inline-block";

 const canvas=await html2canvas(document.getElementById("poster"),{
  scale:3,
  useCORS:true,
  backgroundColor:null
 });

 const a=document.createElement("a");
 a.download="poster.png";
 a.href=canvas.toDataURL("image/png");
 a.click();

 document.getElementById("spinner").style.display="none";
}

</script>

</body>
</html>
