<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Template Poster</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    padding:20px;
}

/* CONTAINER */
.poster-box{
    width:430px;
    max-width:100%;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 50px rgba(0,0,0,.5);
}

/* GAMBAR POSTER */
.poster-box img{
    width:100%;
    display:block;
    object-fit:cover;
}

</style>
</head>

<body>

<div class="poster-box">

    <!-- GANTI LINK SESUAI FILE DI GITHUB -->
    <img src="https://putrasetya.github.io/template_posterhero.png">

</div>

</body>
</html>
