<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poster Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    padding:30px;
    color:#fff;
}

/* =========================
   LAYOUT
========================= */

.container{
    display:flex;
    gap:30px;
    justify-content:center;
    align-items:flex-start;
    flex-wrap:wrap;
}

/* =========================
   FORM
========================= */

.form-box{
    width:360px;
    background:#1a1a1a;
    border-radius:24px;
    padding:28px;
    box-shadow:0 15px 50px rgba(0,0,0,.45);
}

.form-box h2{
    font-size:30px;
    font-weight:900;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-size:14px;
    font-weight:700;
}

.form-group input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#2a2a2a;
    color:#fff;
    font-size:18px;
    font-family:'Montserrat',sans-serif;
}

.form-group input:focus{
    border:2px solid #ff0019;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#ff0019;
    color:#fff;
    font-size:17px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
    margin-top:10px;
}

button:hover{
    transform:translateY(-2px);
    background:#ff2238;
}

/* =========================
   POSTER
========================= */

.poster-wrapper{
    position:relative;
    width:430px;
}

/* TEMPLATE */
.poster-template{
    width:100%;
    display:block;
}

/* =========================
   NAMA PUTIH
========================= */

.nama-putih{
    position:absolute;

    top:178px;
    left:50%;

    transform:
    translateX(-50%)
    scaleY(1.15);

    width:82%;

    text-align:center;

    font-weight:900;

    color:#fff;

    text-transform:uppercase;

    letter-spacing:1px;

    line-height:.9;

    font-family:'Montserrat',sans-serif;

    z-index:10;

    white-space:nowrap;

    overflow:hidden;
}

/* =========================
   NAMA OUTLINE
========================= */

.nama-outline{
    position:absolute;

    top:258px;
    left:50%;

    transform:
    translateX(-50%)
    scaleY(1.15);

    width:82%;

    text-align:center;

    font-weight:900;

    color:#d30014;

    -webkit-text-stroke:3px #fff;

    text-transform:uppercase;

    letter-spacing:1px;

    line-height:.9;

    font-family:'Montserrat',sans-serif;

    z-index:9;

    white-space:nowrap;

    overflow:hidden;
}

/* =========================
   NAMA BAWAH
========================= */

.nama-bawah{
    position:absolute;

    bottom:64px;
    left:50%;

    transform:translateX(-50%);

    width:100%;

    text-align:center;

    font-size:46px;
    font-weight:900;

    color:#fff;

    text-transform:uppercase;
}

/* =========================
   SALES
========================= */

.sales-bawah{
    position:absolute;

    bottom:28px;
    left:50%;

    transform:translateX(-50%);

    width:100%;

    text-align:center;

    font-size:24px;
    font-weight:700;

    color:#fff;
}

.sales-label{
    font-style:italic;
    font-weight:500;
    margin-right:6px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    body{
        padding:15px;
    }

    .container{
        flex-direction:column;
        align-items:center;
    }

    .form-box{
        width:100%;
        max-width:430px;
    }

    .poster-wrapper{
        width:100%;
        max-width:430px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- ================= FORM ================= -->

    <div class="form-box">

        <h2>Editin dong.</h2>

        <div class="form-group">

            <label>Nama</label>

            <input
            type="text"
            id="namaInput"
            placeholder="Masukkan nama">

        </div>

        <div class="form-group">

            <label>Jumlah Sales</label>

            <input
            type="text"
            id="salesInput"
            placeholder="Masukkan sales">

        </div>

        <button onclick="generatePoster()">
            GENERATE POSTER
        </button>

    </div>

    <!-- ================= POSTER ================= -->

    <div class="poster-wrapper">

        <!-- TEMPLATE ASLI -->
        <img
        src="https://putrasetya.github.io/template_posterhero.png"
        class="poster-template">

        <!-- NAMA PUTIH -->
        <div
        class="nama-putih"
        id="namaPutih">

            NAMA

        </div>

        <!-- NAMA OUTLINE -->
        <div
        class="nama-outline"
        id="namaOutline">

            NAMA

        </div>

        <!-- NAMA BAWAH -->
        <div
        class="nama-bawah"
        id="namaBawah">

            NAMA

        </div>

        <!-- SALES -->
        <div
        class="sales-bawah">

            <span class="sales-label">
                sales
            </span>

            <span id="salesBawah">
                Rp 0
            </span>

        </div>

    </div>

</div>

<script>

/* ======================================
   FORMAT RUPIAH
====================================== */

const salesInput =
document.getElementById("salesInput");

salesInput.addEventListener("input", function(){

    let angka =
    this.value.replace(/[^,\d]/g,'');

    let split =
    angka.split(',');

    let sisa =
    split[0].length % 3;

    let rupiah =
    split[0].substr(0, sisa);

    let ribuan =
    split[0].substr(sisa)
    .match(/\d{3}/gi);

    if(ribuan){

        let separator =
        sisa ? '.' : '';

        rupiah +=
        separator +
        ribuan.join('.');

    }

    this.value = rupiah;

});

/* ======================================
   AUTO FONT SIZE
====================================== */

function autoResizeText(element, text){

    element.innerText = text;

    let length = text.length;

    let size = 92;

    if(length > 8) size = 82;
    if(length > 10) size = 72;
    if(length > 12) size = 62;
    if(length > 15) size = 54;
    if(length > 18) size = 46;

    element.style.fontSize = size + "px";

}

/* ======================================
   GENERATE POSTER
====================================== */

function generatePoster(){

    let nama =
    document.getElementById("namaInput")
    .value
    .trim();

    let sales =
    document.getElementById("salesInput")
    .value
    .trim();

    if(nama == ""){

        nama = "NAMA";

    }

    if(sales == ""){

        sales = "0";

    }

    nama = nama.toUpperCase();

    // UPDATE NAMA
    autoResizeText(
        document.getElementById("namaPutih"),
        nama
    );

    autoResizeText(
        document.getElementById("namaOutline"),
        nama
    );

    document.getElementById("namaBawah")
    .innerText = nama;

    // UPDATE SALES
    document.getElementById("salesBawah")
    .innerText = "Rp " + sales;

}

</script>

</body>
</html>
