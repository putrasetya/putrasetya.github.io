<style>

/* =========================
PHOTO FULL TRANSPARENT
========================= */

.photo-box{

    position:relative;

    width:20%;

    height:100%;

    overflow:hidden;

    flex-shrink:0;

    display:flex;

    align-items:flex-end;

    justify-content:center;
}

/* =========================
PHOTO IMAGE
========================= */

.photo-box img{

    width:100%;
    height:100%;

    object-fit:contain;

    object-position:bottom center;

    background:transparent;

    mix-blend-mode:screen;

    filter:
        drop-shadow(0 0 18px rgba(255,255,255,.18))
        contrast(1.08)
        saturate(1.1);

    opacity:.96;

    /* transparan menyatu ke card */

    -webkit-mask-image:
        linear-gradient(
            to right,
            rgba(0,0,0,1) 45%,
            rgba(0,0,0,.75) 70%,
            rgba(0,0,0,.25) 90%,
            transparent 100%
        );

    mask-image:
        linear-gradient(
            to right,
            rgba(0,0,0,1) 45%,
            rgba(0,0,0,.75) 70%,
            rgba(0,0,0,.25) 90%,
            transparent 100%
        );
}

/* =========================
GLOW EFFECT
========================= */

.photo-box::after{

    content:"";

    position:absolute;

    inset:0;

    background:
        linear-gradient(
            to right,
            rgba(255,255,255,.12),
            transparent 60%
        );

    pointer-events:none;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    .photo-box{

        width:110px;
        min-width:110px;
    }

    .photo-box img{

        object-fit:contain;
    }
}

/* =========================
TV 4K
========================= */

@media(min-width:1920px){

    .photo-box{

        width:320px;
        min-width:320px;
    }
}

</style>
