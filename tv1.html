<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO ULTRA TV DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================================
   BODY
========================================= */

body{

    font-family:'Poppins',sans-serif;

    overflow:hidden;

    color:white;

    background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
        radial-gradient(circle at top right,#facc15 0%,transparent 25%),
        radial-gradient(circle at bottom,#0f172a 0%,#020617 70%);
}

/* =========================================
   BACKGROUND EFFECT
========================================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.03),
            transparent 35%,
            rgba(255,255,255,.02)
        );

    pointer-events:none;
}

body::after{

    content:"";

    position:fixed;

    width:200%;
    height:200%;

    top:-50%;
    left:-50%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.05),
            transparent
        );

    transform:rotate(25deg);

    animation:bgMove 12s linear infinite;

    pointer-events:none;
}

@keyframes bgMove{

    0%{
        transform:
            translateX(-20%)
            rotate(25deg);
    }

    100%{
        transform:
            translateX(20%)
            rotate(25deg);
    }
}

/* =========================================
   SLIDE
========================================= */

.slide{

    width:100vw;
    height:100vh;

    padding:
        1vh
        2vw
        2vh
        2vw;

    display:none;

    flex-direction:column;
}

.active{
    display:flex;
}

/* =========================================
   HEADER
========================================= */

.header{

    text-align:center;

    margin-bottom:1vh;
}

.header h1{

    font-size:4vw;

    font-weight:900;

    letter-spacing:6px;

    text-transform:uppercase;

    text-shadow:
        0 0 20px rgba(255,255,255,.2);
}

.header p{

    margin-top:.3vh;

    font-size:1.1vw;

    opacity:.9;

    letter-spacing:4px;

    text-transform:uppercase;
}

/* =========================================
   UPDATE TIME
========================================= */

.update-time{

    margin:
        .8vh auto 0 auto;

    width:fit-content;

    padding:
        .9vh
        2vw;

    border-radius:999px;

    background:
        rgba(255,255,255,.12);

    border:
        2px solid rgba(255,255,255,.18);

    font-size:1.4vw;

    font-weight:800;

    letter-spacing:2px;

    color:white;

    text-shadow:
        0 0 10px rgba(255,255,255,.25);

    box-shadow:
        0 0 25px rgba(255,255,255,.08);
}

/* =========================================
   LIST
========================================= */

.rank-list{

    display:flex;

    flex-direction:column;

    gap:1.4vh;

    flex:1;

    justify-content:flex-start;
}

/* =========================================
   CARD
========================================= */

.rank-card{

    position:relative;

    display:flex;

    align-items:center;

    min-height:21vh;

    border-radius:34px;

    overflow:hidden;

    border:
        1px solid rgba(255,255,255,.08);

    opacity:0;

    transform:
        translateX(-100px);

    animation:
        slideRight .8s forwards;

    padding:
        1vh
        1vw;

    flex-shrink:0;
}

/* =========================================
   ANIMATION DELAY
========================================= */

.rank-card:nth-child(1){
    animation-delay:.2s;
}

.rank-card:nth-child(2){
    animation-delay:.5s;
}

.rank-card:nth-child(3){
    animation-delay:.8s;
}

/* =========================================
   ANIMATION
========================================= */

@keyframes slideRight{

    from{

        opacity:0;

        transform:
            translateX(-100px)
            scale(.95);
    }

    to{

        opacity:1;

        transform:
            translateX(0)
            scale(1);
    }
}

/* =========================================
   SHINE CARD
========================================= */

.rank-card::before{

    content:"";

    position:absolute;

    top:0;
    left:-40%;

    width:30%;
    height:200%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.25),
            transparent
        );

    transform:rotate(25deg);

    animation:shine 5s linear infinite;
}

@keyframes shine{

    0%{
        left:-40%;
    }

    100%{
        left:130%;
    }
}

/* =========================================
   GOLD
========================================= */

.gold{

    background:
        linear-gradient(
            135deg,
            #6b5300 0%,
            #d4a514 18%,
            #fff0a6 50%,
            #d4a514 82%,
            #6b5300 100%
        );

    box-shadow:
        0 0 40px rgba(250,204,21,.35);
}

/* =========================================
   SILVER
========================================= */

.silver{

    background:
        linear-gradient(
            135deg,
            #737373 0%,
            #cfcfcf 18%,
            #ffffff 50%,
            #cfcfcf 82%,
            #737373 100%
        );

    box-shadow:
        0 0 30px rgba(255,255,255,.2);
}

/* =========================================
   BRONZE
========================================= */

.bronze{

    background:
        linear-gradient(
            135deg,
            #6d3f1d 0%,
            #c87c3d 18%,
            #efc08c 50%,
            #c87c3d 82%,
            #6d3f1d 100%
        );

    box-shadow:
        0 0 30px rgba(200,124,61,.28);
}

/* =========================================
   RANK NUMBER ULTRA
========================================= */

.rank-number{

    position:relative;

    width:16%;

    min-width:150px;

    height:100%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:10vw;

    font-weight:900;

    line-height:1;

    transform:
        skew(-12deg);

    overflow:hidden;

    border-right:
        2px solid rgba(255,255,255,.15);

    text-shadow:
        0 10px 25px rgba(0,0,0,.35);
}

/* GOLD NUMBER */

.gold .rank-number{

    background:
        linear-gradient(
            180deg,
            #fff9d7 0%,
            #ffe066 20%,
            #facc15 45%,
            #ca8a04 70%,
            #78350f 100%
        );

    color:white;
}

/* SILVER NUMBER */

.silver .rank-number{

    background:
        linear-gradient(
            180deg,
            #ffffff 0%,
            #e5e7eb 20%,
            #cbd5e1 45%,
            #94a3b8 70%,
            #475569 100%
        );

    color:white;
}

/* BRONZE NUMBER */

.bronze .rank-number{

    background:
        linear-gradient(
            180deg,
            #fed7aa 0%,
            #fdba74 20%,
            #fb923c 45%,
            #c2410c 70%,
            #7c2d12 100%
        );

    color:white;
}

/* NUMBER SHINE */

.rank-number::before{

    content:"";

    position:absolute;

    top:-20%;

    left:-50%;

    width:40%;

    height:150%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.45),
            transparent
        );

    transform:
        rotate(20deg);

    animation:
        rankShine 4s linear infinite;
}

@keyframes rankShine{

    0%{
        left:-50%;
    }

    100%{
        left:140%;
    }
}

/* =========================================
   PHOTO
========================================= */

.photo-box{

    width:11vw;
    height:11vw;

    max-width:150px;
    max-height:150px;

    min-width:90px;
    min-height:90px;

    background:white;

    border-radius:24px;

    overflow:hidden;

    flex-shrink:0;

    margin-left:1vw;

    border:
        4px solid rgba(255,255,255,.6);

    box-shadow:
        0 10px 25px rgba(0,0,0,.25);
}

.photo-box img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* =========================================
   EMPLOYEE
========================================= */

.employee{

    flex:1;

    padding-left:2vw;

    overflow:hidden;
}

.employee-name{

    font-size:2.4vw;

    font-weight:900;

    color:#111827;

    text-transform:uppercase;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

    line-height:1.1;
}

.employee-label{

    margin-top:.7vh;

    font-size:1vw;

    font-weight:800;

    color:#111827;

    opacity:.75;

    letter-spacing:2px;

    text-transform:uppercase;
}

/* =========================================
   SCORE
========================================= */

.score{

    width:24%;

    padding-right:2vw;

    text-align:right;
}

.score-value{

    font-size:3vw;

    font-weight:900;

    color:#111827;

    line-height:1;
}

.score-label{

    margin-top:.6vh;

    font-size:.9vw;

    font-weight:700;

    color:#111827;

    opacity:.65;

    letter-spacing:2px;
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:768px){

    body{
        overflow:auto;
    }

    .slide{

        min-height:100vh;

        height:auto;

        padding:14px;
    }

    .header h1{
        font-size:34px;
    }

    .header p{
        font-size:12px;
    }

    .update-time{

        font-size:12px;

        padding:
            10px
            18px;
    }

    .rank-list{
        gap:14px;
    }

    .rank-card{

        min-height:110px;

        border-radius:22px;
    }

    .rank-number{

        width:70px;

        min-width:70px;

        font-size:58px;
    }

    .photo-box{

        width:68px;
        height:68px;

        min-width:68px;
        min-height:68px;

        border-radius:16px;
    }

    .employee{

        padding-left:12px;
    }

    .employee-name{
        font-size:18px;
    }

    .employee-label{
        font-size:10px;
    }

    .score{

        width:auto;

        padding-right:10px;
    }

    .score-value{
        font-size:20px;
    }

    .score-label{
        font-size:10px;
    }
}

/* =========================================
   TV 4K
========================================= */

@media(min-width:1920px){

    .header h1{
        font-size:74px;
    }

    .header p{
        font-size:22px;
    }

    .update-time{

        font-size:28px;

        padding:
            18px
            38px;
    }

    .employee-name{
        font-size:48px;
    }

    .employee-label{
        font-size:20px;
    }

    .score-value{
        font-size:56px;
    }

    .score-label{
        font-size:18px;
    }

    .rank-number{
        font-size:180px;
    }
}

</style>
</head>

<body>

<!-- SALES -->

<div class="slide active">

    <div class="header">

        <h1>TOP SALES</h1>

        <p>AZKO CITIMALL TUBAN</p>

        <div class="update-time" id="updateTimeSales">
            UPDATE AT : -
        </div>

    </div>

    <div class="rank-list" id="salesList"></div>

</div>

<!-- PROTEKSI -->

<div class="slide">

    <div class="header">

        <h1>TOP PROTEKSI</h1>

        <p>AZKO CITIMALL TUBAN</p>

        <div class="update-time" id="updateTimeProteksi">
            UPDATE AT : -
        </div>

    </div>

    <div class="rank-list" id="proteksiList"></div>

</div>

<!-- TRX -->

<div class="slide">

    <div class="header">

        <h1>TOP TRX</h1>

        <p>AZKO CITIMALL TUBAN</p>

        <div class="update-time" id="updateTimeTrx">
            UPDATE AT : -
        </div>

    </div>

    <div class="rank-list" id="trxList"></div>

</div>

<script>

const URL =
"https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

/* =========================================
   CLEAN NUMBER
========================================= */

function clean(val){

    if(!val) return 0;

    return parseInt(
        val.toString().replace(/[^\d]/g,'')
    ) || 0;
}

/* =========================================
   AVATAR
========================================= */

function avatar(name){

    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff&size=512`;
}

/* =========================================
   UPDATE TIME
========================================= */

function updateTime(){

    const now = new Date();

    const options = {

        day:'2-digit',
        month:'long',
        year:'numeric',

        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit'
    };

    const formatted =
        now.toLocaleDateString(
            'id-ID',
            options
        );

    document.getElementById("updateTimeSales")
        .innerHTML =
        "UPDATE AT : " + formatted;

    document.getElementById("updateTimeProteksi")
        .innerHTML =
        "UPDATE AT : " + formatted;

    document.getElementById("updateTimeTrx")
        .innerHTML =
        "UPDATE AT : " + formatted;
}

/* =========================================
   GET DATA
========================================= */

async function getData(){

    try{

        const res = await fetch(URL);

        const json = await res.json();

        return json.map(row => ({

            name:
                row["EMPLOYEE NAME"] ||
                "UNKNOWN",

            dept:
                row["DEPT"] ||
                "-",

            sales:
                clean(row["SALES MTD"]),

            proteksi:
                clean(row["PROTEKSI"]),

            trx:
                clean(row["TRX"])

        }));

    }catch(err){

        console.log(err);

        return [];
    }
}

/* =========================================
   RENDER
========================================= */

function render(data,key,containerId){

    const styles = [
        "gold",
        "silver",
        "bronze"
    ];

    let sorted = data
        .filter(v => v[key] > 0)
        .sort((a,b)=>b[key]-a[key])
        .slice(0,3);

    let html = "";

    sorted.forEach((d,i)=>{

        html += `

        <div class="rank-card ${styles[i]}">

            <div class="rank-number">
                ${i+1}
            </div>

            <div class="photo-box">

                <img src="${avatar(d.name)}">

            </div>

            <div class="employee">

                <div class="employee-name">
                    ${d.name}
                </div>

                <div class="employee-label">
                    ${d.dept}
                </div>

            </div>

            <div class="score">

                <div class="score-value">
                    ${d[key].toLocaleString('id-ID')}
                </div>

                <div class="score-label">
                    TOTAL SCORE
                </div>

            </div>

        </div>

        `;
    });

    document.getElementById(containerId)
        .innerHTML = html;
}

/* =========================================
   UPDATE
========================================= */

async function update(){

    const data = await getData();

    render(data,"sales","salesList");

    render(data,"proteksi","proteksiList");

    render(data,"trx","trxList");

    updateTime();
}

/* =========================================
   AUTO SLIDE
========================================= */

let current = 0;

setInterval(()=>{

    const slides =
        document.querySelectorAll(".slide");

    slides[current]
        .classList.remove("active");

    current =
        (current + 1) % slides.length;

    slides[current]
        .classList.add("active");

},5000);

/* =========================================
   AUTO REFRESH
========================================= */

setInterval(update,15000);

/* =========================================
   LOAD
========================================= */

update();

/* =========================================
   FULLSCREEN
========================================= */

document.body.onclick = () => {

    if(!document.fullscreenElement){

        document.documentElement
            .requestFullscreen();
    }
};

</script>

</body>
</html>
