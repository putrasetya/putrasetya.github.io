<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO ULTRA TV DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
BODY
========================= */

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:'Poppins',sans-serif;

    color:white;

    background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
        radial-gradient(circle at top right,#facc15 0%,transparent 25%),
        radial-gradient(circle at bottom,#0f172a 0%,#020617 70%);
}

/* =========================
BACKGROUND FX
========================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.03),
            transparent 35%,
            rgba(255,255,255,.02)
        );

    pointer-events:none;
}

body::after{

    content:"";

    position:fixed;

    width:200%;
    height:200%;

    top:-50%;
    left:-50%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.04),
            transparent
        );

    transform:rotate(25deg);

    animation:bgMove 12s linear infinite;

    pointer-events:none;
}

@keyframes bgMove{

    0%{
        transform:
            translateX(-20%)
            rotate(25deg);
    }

    100%{
        transform:
            translateX(20%)
            rotate(25deg);
    }
}

/* =========================
SLIDE
========================= */

.slide{

    position:absolute;

    inset:0;

    width:100vw;
    height:100vh;

    padding:
        1vh
        2vw;

    display:flex;

    flex-direction:column;

    justify-content:flex-start;

    opacity:0;

    visibility:hidden;

    pointer-events:none;

    transition:
        opacity .8s ease,
        visibility .8s ease;

    will-change:opacity;

    transform:translateZ(0);
}

.slide.active{

    opacity:1;

    visibility:visible;

    pointer-events:auto;

    z-index:2;
}

/* =========================
ANTI FLICKER
========================= */

.rank-card,
.slide,
.photo-box img{

    backface-visibility:hidden;

    transform:translateZ(0);

    -webkit-font-smoothing:antialiased;
}

/* =========================
HEADER
========================= */

.header{

    text-align:center;

    margin-bottom:1vh;

    flex-shrink:0;
}

.header h1{

    font-size:3vw;

    font-weight:900;

    letter-spacing:6px;

    text-transform:uppercase;

    text-shadow:
        0 0 20px rgba(255,255,255,.25);
}

.header p{

    margin-top:.2vh;

    font-size:1vw;

    letter-spacing:4px;

    opacity:.9;
}

/* =========================
UPDATE TIME
========================= */

.update-time{

    margin:
        1vh auto 0 auto;

    width:fit-content;

    padding:
        1.1vh
        2.6vw;

    border-radius:18px;

    background:
        rgba(0,0,0,.55);

    border:
        2px solid rgba(255,255,255,.20);

    font-size:1.45vw;

    font-weight:700;

    letter-spacing:1px;

    color:#ffffff;

    line-height:1.6;

    text-transform:uppercase;

    text-shadow:
        0 2px 10px rgba(0,0,0,.9);

    box-shadow:
        0 0 25px rgba(0,0,0,.35);

    backdrop-filter:blur(10px);
}

/* =========================
LIST
========================= */

.rank-list{

    display:flex;

    flex-direction:column;

    gap:1.2vh;

    flex:1;

    justify-content:space-evenly;
}

/* =========================
CARD
========================= */

.rank-card{

    position:relative;

    display:flex;

    align-items:center;

    height:25vh;

    border-radius:34px;

    overflow:hidden;

    border:
        1px solid rgba(255,255,255,.08);

    transform:
        translateZ(0);

    transition:
        transform .35s ease,
        box-shadow .35s ease,
        filter .35s ease;

    animation:
        floatingCard 5s ease-in-out infinite;

    will-change:
        transform;
}

/* =========================
CARD SHINE
========================= */

.rank-card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
        linear-gradient(
            120deg,
            transparent 0%,
            rgba(255,255,255,.22) 45%,
            transparent 100%
        );

    transform:
        translateX(-140%);

    animation:
        shineMove 4.5s linear infinite;

    pointer-events:none;
}

/* =========================
CARD HOVER
========================= */

.rank-card:hover{

    transform:
        translateY(-4px)
        scale(1.01);

    box-shadow:
        0 18px 40px rgba(0,0,0,.35);

    filter:
        brightness(1.03);
}

/* =========================
FLOATING
========================= */

@keyframes floatingCard{

    0%{

        transform:
            translateY(0px)
            translateZ(0);
    }

    50%{

        transform:
            translateY(-5px)
            translateZ(0);
    }

    100%{

        transform:
            translateY(0px)
            translateZ(0);
    }
}

/* =========================
SHINE
========================= */

@keyframes shineMove{

    0%{

        transform:
            translateX(-140%);
    }

    100%{

        transform:
            translateX(140%);
    }
}

/* =========================
CARD COLOR
========================= */

.gold{

    background:
        linear-gradient(
            135deg,
            #6b5300,
            #d4a514,
            #fff0a6,
            #d4a514,
            #6b5300
        );

    animation-delay:0s;
}

.silver{

    background:
        linear-gradient(
            135deg,
            #737373,
            #d1d5db,
            #ffffff,
            #d1d5db,
            #737373
        );

    animation-delay:1s;
}

.bronze{

    background:
        linear-gradient(
            135deg,
            #6d3f1d,
            #c87c3d,
            #efc08c,
            #c87c3d,
            #6d3f1d
        );

    animation-delay:2s;
}

/* =========================
RANK NUMBER
========================= */

.rank-number{

    position:absolute;

    left:-.5vw;

    top:50%;

    transform:
        translateY(-50%)
        skew(-10deg);

    font-size:16vw;

    font-weight:900;

    opacity:.20;

    letter-spacing:-10px;

    line-height:1;
}

.gold .rank-number{
    color:#facc15;
}

.silver .rank-number{
    color:#e2e8f0;
}

.bronze .rank-number{
    color:#fb923c;
}

/* =========================
PHOTO
========================= */

.photo-box{

    width:20%;
    height:100%;

    display:flex;

    align-items:flex-end;

    justify-content:center;
}

.photo-box img{

    width:100%;
    height:100%;

    object-fit:contain;

    object-position:center bottom;

    filter:
        drop-shadow(0 10px 15px rgba(0,0,0,.28))
        contrast(1.08)
        saturate(1.08)
        brightness(1.03);
}

/* =========================
EMPLOYEE
========================= */

.employee{

    flex:1;

    padding-left:1.5vw;

    overflow:hidden;
}

.employee-name{

    font-size:2vw;

    font-weight:900;

    color:#111827;

    text-transform:uppercase;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;
}

.employee-label{

    margin-top:.5vh;

    font-size:1.15vw;

    font-weight:400;

    color:#111827;

    letter-spacing:3px;

    text-transform:uppercase;
}

/* =========================
SCORE
========================= */

.score{

    width:22%;

    padding-right:2vw;

    text-align:right;
}

.score-value{

    font-size:2.6vw;

    font-weight:900;

    color:#111827;
}

.score-label{

    margin-top:.4vh;

    font-size:.8vw;

    font-weight:700;

    color:#111827;

    opacity:.65;

    letter-spacing:2px;
}

/* =========================
FULLSCREEN HINT
========================= */

.fullscreen-hint{

    position:fixed;

    bottom:18px;

    right:22px;

    z-index:9999;

    background:rgba(0,0,0,.45);

    border:1px solid rgba(255,255,255,.15);

    padding:10px 18px;

    border-radius:14px;

    font-size:13px;

    font-weight:600;

    backdrop-filter:blur(10px);

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        opacity:.55;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.55;
    }
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    body{
        overflow:auto;
    }

    .slide{
        min-height:100vh;
        height:auto;
        padding:12px;
    }

    .header h1{
        font-size:30px;
    }

    .header p{
        font-size:11px;
    }

    .update-time{
        font-size:14px;
        padding:10px 16px;
    }

    .rank-card{
        height:118px;
        border-radius:22px;
    }

    .rank-number{
        font-size:95px;
    }

    .photo-box{
        width:100px;
        min-width:100px;
    }

    .employee-name{
        font-size:16px;
    }

    .employee-label{
        font-size:11px;
    }

    .score-value{
        font-size:20px;
    }

    .score-label{
        font-size:10px;
    }

    .fullscreen-hint{
        font-size:11px;
        padding:8px 12px;
    }
}

</style>
</head>

<body>

<div class="fullscreen-hint">
    TAP DIMANA SAJA UNTUK FULLSCREEN
</div>

<div class="slide active">

    <div class="header">

        <h1>TOP SALES</h1>

        <p>AZKO CITIMALL TUBAN</p>

        <div class="update-time" id="updateTimeSales">
            DATA UPDATE : -
        </div>

    </div>

    <div class="rank-list" id="salesList"></div>

</div>

<div class="slide">

    <div class="header">

        <h1>TOP PROTEKSI</h1>

        <p>AZKO CITIMALL TUBAN</p>

        <div class="update-time" id="updateTimeProteksi">
            DATA UPDATE : -
        </div>

    </div>

    <div class="rank-list" id="proteksiList"></div>

</div>

<div class="slide">

    <div class="header">

        <h1>TOP TRX</h1>

        <p>AZKO CITIMALL TUBAN</p>

        <div class="update-time" id="updateTimeTrx">
            DATA UPDATE : -
        </div>

    </div>

    <div class="rank-list" id="trxList"></div>

</div>

<audio
    id="bgm"
    loop
    autoplay
    playsinline
    preload="auto">

    <source
        src="https://putrasetya.github.io/223am.mp3"
        type="audio/mpeg">

</audio>

<script>

const URL =
"https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

let lastDataHash =
localStorage.getItem("lastDataHash") || "";

let lastUpdateText =
localStorage.getItem("lastUpdateText") || "-";

/* =========================
HELPER
========================= */

function clean(val){

    if(!val) return 0;

    return parseInt(
        val.toString().replace(/[^\d]/g,'')
    ) || 0;
}

function formatTanggalIndonesia(date){

    return date.toLocaleString('id-ID',{

        day:'2-digit',
        month:'long',
        year:'numeric',
        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit'
    });
}

function setUpdateTime(text){

    [
        "updateTimeSales",
        "updateTimeProteksi",
        "updateTimeTrx"
    ].forEach(id=>{

        const el =
        document.getElementById(id);

        if(el){

            el.innerHTML =
            "DATA UPDATE : " + text;
        }
    });
}

/* =========================
FETCH DATA
========================= */

async function getData(){

    try{

        const res =
        await fetch(
            URL + "?t=" + Date.now()
        );

        const json =
        await res.json();

        return json.map(row => ({

            name:
                row["EMPLOYEE NAME"] || "UNKNOWN",

            dept:
                row["DEPT"] || "-",

            sales:
                clean(row["SALES MTD"]),

            proteksi:
                clean(row["PROTEKSI"]),

            trx:
                clean(row["TRX"]),

            photo:
                row["PHOTO"] || ""

        }));

    }catch(err){

        console.log(err);

        return [];
    }
}

function render(data,key,containerId,label){

    const styles = [
        "gold",
        "silver",
        "bronze"
    ];

    let sorted = data
        .filter(v => v[key] > 0)
        .sort((a,b)=>b[key]-a[key])
        .slice(0,3);

    if(sorted.length === 0){

        document.getElementById(containerId)
        .innerHTML =

        `
        <div style="
            text-align:center;
            padding-top:10vh;
            opacity:.7;
            font-size:2vw;
            font-weight:600;
        ">
            DATA BELUM TERSEDIA
        </div>
        `;

        return;
    }

    let html = "";

    sorted.forEach((d,i)=>{

        const photoUrl =
        d.photo
        ?
        `https://drive.google.com/thumbnail?id=${d.photo}&sz=w1000`
        :
        `https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=random&color=fff&size=512`;

        html += `

        <div class="rank-card ${styles[i]}">

            <div class="rank-number">
                ${i+1}
            </div>

            <div class="photo-box">

                <img
                    loading="lazy"
                    src="${photoUrl}"

                    onerror="
                    this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=random&color=fff&size=512'
                    "
                >

            </div>

            <div class="employee">

                <div class="employee-name">
                    ${d.name}
                </div>

                <div class="employee-label">
                    ${d.dept}
                </div>

            </div>

            <div class="score">

                <div class="score-value">
                    ${d[key].toLocaleString('id-ID')}
                </div>

                <div class="score-label">
                    ${label}
                </div>

            </div>

        </div>
        `;
    });

    document.getElementById(containerId)
    .innerHTML = html;
}

async function update(){

    const data =
    await getData();

    const currentHash =
    JSON.stringify(data);

    if(currentHash !== lastDataHash){

        lastDataHash =
        currentHash;

        localStorage.setItem(
            "lastDataHash",
            currentHash
        );

        lastUpdateText =
        formatTanggalIndonesia(
            new Date()
        );

        localStorage.setItem(
            "lastUpdateText",
            lastUpdateText
        );
    }

    render(data,"sales","salesList","TOTAL SALES");

    render(data,"proteksi","proteksiList","TOTAL PROTEKSI");

    render(data,"trx","trxList","TOTAL TRX");

    setUpdateTime(lastUpdateText);
}

/* =========================
SLIDER
========================= */

let current = 0;

const slides =
document.querySelectorAll(".slide");

function showNextSlide(){

    const prev =
    slides[current];

    current =
        (current + 1) % slides.length;

    const next =
    slides[current];

    prev.classList.remove("active");

    next.classList.add("active");
}

/* =========================
FULLSCREEN
========================= */

async function enterFullscreen(){

    try{

        if(
            !document.fullscreenElement
        ){

            await document.documentElement
            .requestFullscreen();

            const hint =
            document.querySelector(
                ".fullscreen-hint"
            );

            if(hint){

                hint.style.display =
                "none";
            }
        }

    }catch(err){

        console.log(err);
    }
}

document.addEventListener(
    "click",
    enterFullscreen
);

document.addEventListener(
    "touchstart",
    enterFullscreen
);

/* =========================
START
========================= */

update();

setInterval(update,15000);

setInterval(showNextSlide,7000);

/* =========================
AUDIO
========================= */

window.addEventListener(
    "load",
    ()=>{

        const bgm =
        document.getElementById(
            "bgm"
        );

        if(!bgm) return;

        bgm.volume = 0.4;

        async function forcePlay(){

            try{

                await bgm.play();

            }catch(err){

                console.log(err);
            }
        }

        forcePlay();

        document.addEventListener(
            "click",
            forcePlay
        );

        document.addEventListener(
            "touchstart",
            forcePlay
        );

        setTimeout(forcePlay,1000);

        setTimeout(forcePlay,3000);
    }
);

</script>

</body>
</html>
