<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZKO PREMIUM TV DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --dark:#020617;
    --text:#ffffff;
}

body{
    font-family:'Poppins',sans-serif;
    background:
        radial-gradient(circle at top,#0f172a 0%,#020617 65%);
    overflow:hidden;
    color:white;
}

/* =========================================
   BACKGROUND EFFECT
========================================= */

.bg-glow{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:.25;
}

.glow1{
    width:500px;
    height:500px;
    background:#facc15;
    top:-100px;
    left:-100px;
}

.glow2{
    width:500px;
    height:500px;
    background:#60a5fa;
    bottom:-150px;
    right:-100px;
}

/* =========================================
   SLIDE
========================================= */

.slide{
    width:100vw;
    height:100vh;
    padding:2vh 2vw;
    display:none;
    flex-direction:column;
}

.active{
    display:flex;
}

/* =========================================
   HEADER
========================================= */

.header{
    text-align:center;
    margin-bottom:2vh;
}

.header h1{
    font-size:4vw;
    font-weight:900;
    letter-spacing:4px;
    text-transform:uppercase;
    text-shadow:
        0 0 20px rgba(255,255,255,.2);
}

.header p{
    font-size:1.2vw;
    opacity:.7;
    margin-top:.5vh;
}

/* =========================================
   LIST
========================================= */

.rank-list{
    display:flex;
    flex-direction:column;
    gap:2vh;
    flex:1;
}

/* =========================================
   CARD
========================================= */

.rank-card{
    position:relative;
    display:flex;
    align-items:center;
    height:28vh;
    border-radius:30px;
    overflow:hidden;
    backdrop-filter:blur(15px);
    transform:scale(1);
    transition:.3s;
    animation:fadeUp .6s ease;
}

.rank-card:hover{
    transform:scale(1.01);
}

/* =========================================
   GOLD
========================================= */

.gold{
    background:
        linear-gradient(
            135deg,
            #7a5b00 0%,
            #facc15 20%,
            #fff1a8 50%,
            #facc15 80%,
            #7a5b00 100%
        );

    box-shadow:
        0 0 40px rgba(250,204,21,.45);
}

/* =========================================
   SILVER
========================================= */

.silver{
    background:
        linear-gradient(
            135deg,
            #6b7280 0%,
            #d1d5db 20%,
            #ffffff 50%,
            #d1d5db 80%,
            #6b7280 100%
        );

    box-shadow:
        0 0 35px rgba(255,255,255,.18);
}

/* =========================================
   BRONZE
========================================= */

.bronze{
    background:
        linear-gradient(
            135deg,
            #6b3f1d 0%,
            #c97a3d 20%,
            #f3c08d 50%,
            #c97a3d 80%,
            #6b3f1d 100%
        );

    box-shadow:
        0 0 35px rgba(201,122,61,.35);
}

/* =========================================
   SHINE EFFECT
========================================= */

.rank-card::before{
    content:"";
    position:absolute;
    width:35%;
    height:200%;
    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.35),
            transparent
        );

    transform:rotate(20deg);
    animation:shine 5s linear infinite;
}

/* =========================================
   RANK
========================================= */

.rank-number{
    width:14%;
    min-width:120px;
    text-align:center;
    font-size:9vw;
    font-weight:900;
    color:white;
    text-shadow:
        0 6px 18px rgba(0,0,0,.35);
}

/* =========================================
   PHOTO
========================================= */

.photo-box{
    width:14vw;
    height:14vw;
    max-width:180px;
    max-height:180px;
    min-width:100px;
    min-height:100px;

    border-radius:24px;
    overflow:hidden;

    background:white;

    box-shadow:
        0 10px 25px rgba(0,0,0,.25);

    flex-shrink:0;
}

.photo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* =========================================
   NAME
========================================= */

.employee{
    flex:1;
    padding-left:2.5vw;
    overflow:hidden;
}

.employee-name{
    font-size:3vw;
    font-weight:900;
    color:#111827;
    text-transform:uppercase;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.employee-label{
    margin-top:.5vh;
    font-size:1vw;
    color:#111827;
    opacity:.7;
    font-weight:600;
    letter-spacing:2px;
}

/* =========================================
   SCORE
========================================= */

.score{
    width:28%;
    padding-right:3vw;
    text-align:right;
}

.score-value{
    font-size:3.5vw;
    font-weight:900;
    color:#111827;
}

.score-text{
    font-size:1vw;
    font-weight:700;
    color:#111827;
    opacity:.65;
    letter-spacing:2px;
}

/* =========================================
   ANIMATION
========================================= */

@keyframes shine{

    0%{
        left:-40%;
    }

    100%{
        left:120%;
    }
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:768px){

    body{
        overflow:auto;
    }

    .slide{
        height:auto;
        min-height:100vh;
        padding:15px;
    }

    .header h1{
        font-size:40px;
    }

    .header p{
        font-size:14px;
    }

    .rank-card{
        height:120px;
        border-radius:20px;
    }

    .rank-number{
        width:60px;
        min-width:60px;
        font-size:65px;
    }

    .photo-box{
        width:75px;
        height:75px;
        min-width:75px;
        min-height:75px;
        border-radius:14px;
    }

    .employee{
        padding-left:15px;
    }

    .employee-name{
        font-size:22px;
    }

    .employee-label{
        font-size:10px;
    }

    .score{
        width:auto;
        padding-right:15px;
    }

    .score-value{
        font-size:24px;
    }

    .score-text{
        font-size:10px;
    }
}

/* =========================================
   ULTRA TV
========================================= */

@media(min-width:1920px){

    .header h1{
        font-size:70px;
    }

    .employee-name{
        font-size:55px;
    }

    .score-value{
        font-size:65px;
    }
}

</style>
</head>

<body>

<div class="bg-glow">
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
</div>

<!-- =========================================
     SLIDE SALES
========================================= -->

<div class="slide active">

    <div class="header">
        <h1>TOP SALES</h1>
        <p>AZKO PERFORMANCE LEADERBOARD</p>
    </div>

    <div class="rank-list" id="salesList"></div>

</div>

<!-- =========================================
     SLIDE PROTEKSI
========================================= -->

<div class="slide">

    <div class="header">
        <h1>TOP PROTEKSI</h1>
        <p>AZKO PERFORMANCE LEADERBOARD</p>
    </div>

    <div class="rank-list" id="proteksiList"></div>

</div>

<!-- =========================================
     SLIDE TRX
========================================= -->

<div class="slide">

    <div class="header">
        <h1>TOP TRX</h1>
        <p>AZKO PERFORMANCE LEADERBOARD</p>
    </div>

    <div class="rank-list" id="trxList"></div>

</div>

<script>

/* =========================================
   APPS SCRIPT URL
========================================= */

const URL =
"https://script.google.com/macros/s/AKfycbzeehvUo6QYriMFJTR4A88lN6IIHV6Qop9UphkdOTMkRLVxhVuJ13y69momo6h1pn9dTQ/exec";

/* =========================================
   CLEAN NUMBER
========================================= */

function clean(val){

    if(!val) return 0;

    return parseInt(
        val.toString().replace(/[^\d]/g,'')
    ) || 0;
}

/* =========================================
   AVATAR
========================================= */

function avatar(name){

    return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&color=fff&size=512`;
}

/* =========================================
   GET DATA
========================================= */

async function getData(){

    try{

        const res = await fetch(URL);

        const json = await res.json();

        console.log(json);

        return json.map(row => ({

            name:
                row["EMPLOYEE NAME"] ||
                "UNKNOWN",

            sales:
                clean(row["SALES MTD"]),

            proteksi:
                clean(row["PROTEKSI"]),

            trx:
                clean(row["TRX"])

        }));

    }catch(err){

        console.log(err);

        return [];
    }
}

/* =========================================
   RENDER
========================================= */

function render(data,key,container){

    const styles = [
        "gold",
        "silver",
        "bronze"
    ];

    let sorted = data
        .filter(v => v[key] > 0)
        .sort((a,b)=>b[key]-a[key])
        .slice(0,3);

    let html = "";

    sorted.forEach((d,i)=>{

        html += `

        <div class="rank-card ${styles[i]}">

            <div class="rank-number">
                ${i+1}
            </div>

            <div class="photo-box">

                <img src="${avatar(d.name)}">

            </div>

            <div class="employee">

                <div class="employee-name">
                    ${d.name}
                </div>

                <div class="employee-label">
                    TOP PERFORMANCE EMPLOYEE
                </div>

            </div>

            <div class="score">

                <div class="score-value">
                    ${d[key].toLocaleString('id-ID')}
                </div>

                <div class="score-text">
                    TOTAL SCORE
                </div>

            </div>

        </div>

        `;
    });

    document.getElementById(container)
        .innerHTML = html;
}

/* =========================================
   UPDATE
========================================= */

async function update(){

    const data = await getData();

    render(data,"sales","salesList");
    render(data,"proteksi","proteksiList");
    render(data,"trx","trxList");
}

/* =========================================
   AUTO SLIDE
========================================= */

let current = 0;

setInterval(()=>{

    const slides =
        document.querySelectorAll(".slide");

    slides[current]
        .classList.remove("active");

    current =
        (current + 1) % slides.length;

    slides[current]
        .classList.add("active");

},7000);

/* =========================================
   AUTO REFRESH
========================================= */

setInterval(update,15000);

/* =========================================
   LOAD
========================================= */

update();

/* =========================================
   FULLSCREEN
========================================= */

document.body.onclick = () => {

    if(!document.fullscreenElement){

        document.documentElement
            .requestFullscreen();
    }
};

</script>

</body>
</html>
